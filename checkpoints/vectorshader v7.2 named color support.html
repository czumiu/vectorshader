    const p012 = Vec2.lerp(p01, p12, tt);
    return [
      { p0, p1: p01, p2: p012 },
      { p0: p012, p1: p12, p2 }
    ];
  },

  splitCubic(p0, p1, p2, p3) {
    const p01 = Vec2.lerp(p0, p1, 0.5);
    const p12 = Vec2.lerp(p1, p2, 0.5);
    const p23 = Vec2.lerp(p2, p3, 0.5);
    const p012 = Vec2.lerp(p01, p12, 0.5);
    const p123 = Vec2.lerp(p12, p23, 0.5);
    const p0123 = Vec2.lerp(p012, p123, 0.5);
    return [
      { p0, p1: p01, p2: p012, p3: p0123 },
      { p0: p0123, p1: p123, p2: p23, p3 }
    ];
  },

  splitCubicAt(p0, p1, p2, p3, t) {
    const tt = Math.max(0, Math.min(1, t));
    if (tt <= 1e-9 || tt >= 1.0 - 1e-9) return [
      { p0: { ...p0 }, p1: { ...p1 }, p2: { ...p2 }, p3: { ...p3 } }
    ];
    const p01 = Vec2.lerp(p0, p1, tt);
    const p12 = Vec2.lerp(p1, p2, tt);
    const p23 = Vec2.lerp(p2, p3, tt);
    const p012 = Vec2.lerp(p01, p12, tt);
    const p123 = Vec2.lerp(p12, p23, tt);
    const p0123 = Vec2.lerp(p012, p123, tt);
    return [
      { p0, p1: p01, p2: p012, p3: p0123 },
      { p0: p0123, p1: p123, p2: p23, p3 }
    ];
  },

  splitByTsQuad(seg, ts = []) {
    let parts = [{ p0: { ...seg.p0 }, p1: { ...seg.p1 }, p2: { ...seg.p2 } }];
    let prev = 0.0;
    for (const rawT of ts) {
      const t = Math.max(0, Math.min(1, rawT));
      if (!(t > prev + 1e-7 && t < 1.0 - 1e-7)) continue;
      const localT = (t - prev) / Math.max(1e-9, 1.0 - prev);
      const next = [];
      for (let i = 0; i < parts.length; i += 1) {
        if (i !== parts.length - 1) {
          next.push(parts[i]);
          continue;
        }
        const split = this.splitQuadraticAt(parts[i].p0, parts[i].p1, parts[i].p2, localT);
        next.push(...split);
      }
      parts = next;
      prev = t;
    }
    return parts;
  },

  splitByTsCubic(seg, ts = []) {
    let parts = [{ p0: { ...seg.p0 }, p1: { ...seg.p1 }, p2: { ...seg.p2 }, p3: { ...seg.p3 } }];
    let prev = 0.0;
    for (const rawT of ts) {
      const t = Math.max(0, Math.min(1, rawT));
      if (!(t > prev + 1e-7 && t < 1.0 - 1e-7)) continue;
      const localT = (t - prev) / Math.max(1e-9, 1.0 - prev);
      const next = [];
      for (let i = 0; i < parts.length; i += 1) {
        if (i !== parts.length - 1) {
          next.push(parts[i]);
          continue;
        }
        const split = this.splitCubicAt(parts[i].p0, parts[i].p1, parts[i].p2, parts[i].p3, localT);
        next.push(...split);
      }
      parts = next;
      prev = t;
    }
    return parts;
  },

  quadraticYMonotoneTs(p0, p1, p2) {
    const denom = p0.y - 2.0 * p1.y + p2.y;
    if (Math.abs(denom) < 1e-9) return [];
    const t = (p0.y - p1.y) / denom;
    return (t > 1e-6 && t < 1.0 - 1e-6) ? [t] : [];
  },

  cubicYMonotoneTs(p0, p1, p2, p3) {
    const a = -p0.y + 3.0 * p1.y - 3.0 * p2.y + p3.y;
    const b = 2.0 * (p0.y - 2.0 * p1.y + p2.y);
    const c = p1.y - p0.y;
    const out = [];
    if (Math.abs(a) < 1e-9) {
      if (Math.abs(b) < 1e-9) return out;
      const t = -c / b;
      if (t > 1e-6 && t < 1.0 - 1e-6) out.push(t);
      return out;
    }
    const disc = b * b - 4.0 * a * c;
    if (disc < 0.0) return out;
    const sdisc = Math.sqrt(Math.max(0.0, disc));
    const t0 = (-b - sdisc) / (2.0 * a);
    const t1 = (-b + sdisc) / (2.0 * a);
    if (t0 > 1e-6 && t0 < 1.0 - 1e-6) out.push(t0);
    if (t1 > 1e-6 && t1 < 1.0 - 1e-6 && Math.abs(t1 - t0) > 1e-6) out.push(t1);
    out.sort((u, v) => u - v);
    return out;
  },

  splitQuadraticYMonotone(seg) {
    const ts = this.quadraticYMonotoneTs(seg.p0, seg.p1, seg.p2);
    return this.splitByTsQuad(seg, ts);
  },

  splitCubicYMonotone(seg) {
    const ts = this.cubicYMonotoneTs(seg.p0, seg.p1, seg.p2, seg.p3);
    return this.splitByTsCubic(seg, ts);
  },

  curveTolerance(p0, p1, base = 0.6) {
    const chord = Vec2.dist(p0, p1);
    return Math.max(0.1, Math.min(base, chord * 0.08));
  },

  quadFlatEnough(p0, p1, p2, base = 0.6) {
    return Vec2.pointLineDistance(p1, p0, p2) <= this.curveTolerance(p0, p2, base);
  },

  cubicFlatEnough(p0, p1, p2, p3, base = 0.6) {
    const eps = this.curveTolerance(p0, p3, base);
    return Math.max(Vec2.pointLineDistance(p1, p0, p3), Vec2.pointLineDistance(p2, p0, p3)) <= eps;
  },

  flattenQuadraticAdaptive(p0, p1, p2, out, depth = 0, base = 0.6) {
    if (depth > 11 || this.quadFlatEnough(p0, p1, p2, base)) {
      out.push({ x: p2.x, y: p2.y });
      return;
    }
    const [a, b] = this.splitQuadratic(p0, p1, p2);
    this.flattenQuadraticAdaptive(a.p0, a.p1, a.p2, out, depth + 1, base);
    this.flattenQuadraticAdaptive(b.p0, b.p1, b.p2, out, depth + 1, base);
  },

  flattenCubicAdaptive(p0, p1, p2, p3, out, depth = 0, base = 0.6) {
    if (depth > 11 || this.cubicFlatEnough(p0, p1, p2, p3, base)) {
      out.push({ x: p3.x, y: p3.y });
      return;
    }
    const [a, b] = this.splitCubic(p0, p1, p2, p3);
    this.flattenCubicAdaptive(a.p0, a.p1, a.p2, a.p3, out, depth + 1, base);
    this.flattenCubicAdaptive(b.p0, b.p1, b.p2, b.p3, out, depth + 1, base);
  },

  sampleArcAdaptive(seg, tol = 0.6) {
    const cp = SvgArc.toCenterParams(seg);
    if (!cp) return SvgArc.toPolyline(seg, Math.PI / 16);
    const maxR = Math.max(Math.abs(cp.rx || 0), Math.abs(cp.ry || 0), tol + 1e-6);
    const clamped = Math.max(-1.0, Math.min(1.0, 1.0 - Math.min(tol, maxR) / maxR));
    let maxAngle = 2.0 * Math.acos(clamped);
    if (!Number.isFinite(maxAngle) || maxAngle <= 1e-4) maxAngle = Math.PI / 24;
    maxAngle = Math.max(Math.PI / 96, Math.min(Math.PI / 8, maxAngle));
    return SvgArc.toPolyline(seg, maxAngle);
  },

  dedupeContourPoints(points, tol = 1e-4) {
    const out = [];
    for (const p of points || []) {
      if (!p || !Number.isFinite(p.x) || !Number.isFinite(p.y)) continue;
      if (!out.length || !Vec2.equals(out[out.length - 1], p, tol)) out.push({ x: p.x, y: p.y });
    }
    if (out.length > 1 && Vec2.equals(out[0], out[out.length - 1], tol)) out.pop();
    return out;
  },

  collectFlattenedContoursForFill(shape) {
    const rawSubpaths = shape?.source?.rawSubpaths || [];
    if (!rawSubpaths.length) return null;
    const contours = [];
    const tol = 1e-4;
    const fillTol = this.computeFillTolerance(shape);

    for (const subpath of rawSubpaths) {
      const segs = subpath?.segments || [];
      if (!segs.length) continue;
      let points = [{ x: segs[0].p0.x, y: segs[0].p0.y }];
      let cursor = segs[0].p0;
      let unsupported = false;
      for (const seg of segs) {
        if (!Vec2.equals(seg.p0, cursor, tol)) { unsupported = true; break; }
        let samples = null;
        if (seg.type === 'line') {
          samples = [seg.p0, seg.p1];
        } else if (seg.type === 'quad') {
          const straight = this.simplifyStraightQuad(seg);
          if (straight) {
            samples = [straight.a, straight.b];
          } else {
            const out = [{ x: seg.p0.x, y: seg.p0.y }];
            this.flattenQuadraticAdaptive(seg.p0, seg.p1, seg.p2, out, 0, fillTol);
            samples = out;
          }
        } else if (seg.type === 'cubic') {
          const straight = this.simplifyStraightCubic(seg);
          if (straight) {
            samples = [straight.a, straight.b];
          } else {
            const out = [{ x: seg.p0.x, y: seg.p0.y }];
            this.flattenCubicAdaptive(seg.p0, seg.p1, seg.p2, seg.p3, out, 0, fillTol);
            samples = out;
          }
        } else if (seg.type === 'arc') {
          samples = this.sampleArcAdaptive(seg, fillTol);
        } else {
          unsupported = true;
          break;
        }
        if (!samples || samples.length < 2) { unsupported = true; break; }
        for (let i = 1; i < samples.length; i += 1) points.push({ x: samples[i].x, y: samples[i].y });
        cursor = PathParser.segmentEnd(seg);
      }
      if (unsupported) return null;
      points = this.dedupeContourPoints(points, tol);
      if (points.length < 3) continue;
      const bounds = this.computePointsBounds(points);
      if (!bounds || bounds.width <= tol || bounds.height <= tol) continue;
      contours.push(points);
    }
    return contours.length ? contours : null;
  },


  collectGeneralFillSignSegments(shape, options = CompilerConfig) {
    const norm = shape?.source?.normalizedSubpaths || [];
    if (!norm.length) return null;
    const out = [];
    const signTol = Math.max(0.1, Math.min(this.computeFillTolerance(shape), 1.25));
    const cubicTol = Math.max(
      Math.min(signTol, 0.35),
      Math.min(options.cubicApproxMinTolerance || 0.25, signTol)
    );

    for (const subpath of norm) {
      for (const seg of (subpath.fillSegments || [])) {
        if (seg.type === 'line') {
          if (!Vec2.equals(seg.p0, seg.p1)) out.push({ type: 'line', p0: { ...seg.p0 }, p1: { ...seg.p1 } });
          continue;
        }
        if (seg.type === 'quad') {
          const straight = this.simplifyStraightQuad(seg);
          if (straight) {
            out.push({ type: 'line', p0: { ...straight.a }, p1: { ...straight.b } });
          } else {
            const pieces = this.splitQuadraticYMonotone(seg);
            for (const piece of pieces) {
              const line = this.simplifyStraightQuad(piece);
              if (line) out.push({ type: 'line', p0: { ...line.a }, p1: { ...line.b } });
              else out.push({ type: 'quad', p0: { ...piece.p0 }, p1: { ...piece.p1 }, p2: { ...piece.p2 } });
            }
          }
          continue;
        }
        if (seg.type === 'cubic') {
          const straight = this.simplifyStraightCubic(seg);
          if (straight) {
            out.push({ type: 'line', p0: { ...straight.a }, p1: { ...straight.b } });
            continue;
          }
          const monotoneCubics = this.splitCubicYMonotone(seg);
          for (const mc of monotoneCubics) {
            const simple = this.simplifyStraightCubic(mc);
            if (simple) {
              out.push({ type: 'line', p0: { ...simple.a }, p1: { ...simple.b } });
              continue;
            }
            const cubic = [mc.p0, mc.p1, mc.p2, mc.p3];
            const quads = CubicApprox.toQuadraticSpline(cubic, cubicTol, 2, 8);
            if (quads && quads.length) {
              for (const q of quads) {
                const qseg = { type: 'quad', p0: q[0], p1: q[1], p2: q[2] };
                const qparts = this.splitQuadraticYMonotone(qseg);
                for (const piece of qparts) {
                  const line = this.simplifyStraightQuad(piece);
                  if (line) out.push({ type: 'line', p0: { ...line.a }, p1: { ...line.b } });
                  else out.push({ type: 'quad', p0: { ...piece.p0 }, p1: { ...piece.p1 }, p2: { ...piece.p2 } });
                }
              }
            } else {
              const pts = [{ x: mc.p0.x, y: mc.p0.y }];
              this.flattenCubicAdaptive(mc.p0, mc.p1, mc.p2, mc.p3, pts, 0, signTol);
              for (let i = 0; i + 1 < pts.length; i += 1) {
                if (!Vec2.equals(pts[i], pts[i + 1])) out.push({ type: 'line', p0: { ...pts[i] }, p1: { ...pts[i + 1] } });
              }
            }
          }
          continue;
        }
        if (seg.type === 'arc') {
          const pts = this.sampleArcAdaptive(seg, signTol);
          if (pts && pts.length >= 2) {
            for (let i = 0; i + 1 < pts.length; i += 1) {
              if (!Vec2.equals(pts[i], pts[i + 1])) out.push({ type: 'line', p0: { ...pts[i] }, p1: { ...pts[i + 1] } });
            }
          }
        }
      }
    }
    return out.length ? out : null;
  },

  collectGeneralFillBoundarySegments(shape, options = CompilerConfig) {
    const norm = shape?.source?.normalizedSubpaths || [];
    if (!norm.length) return null;
    const out = [];
    const boundaryTol = this.computeFillBoundaryTolerance(shape);
    const cubicTol = Math.max(
      Math.min(boundaryTol, 0.35),
      Math.min(options.cubicApproxMinTolerance || 0.25, boundaryTol)
    );

    for (const subpath of norm) {
      for (const seg of (subpath.fillSegments || [])) {
        if (seg.type === 'line') {
          if (!Vec2.equals(seg.p0, seg.p1)) out.push({ type: 'line', p0: { ...seg.p0 }, p1: { ...seg.p1 } });
          continue;
        }
        if (seg.type === 'quad') {
          const straight = this.simplifyStraightQuad(seg);
          if (straight) out.push({ type: 'line', p0: { ...straight.a }, p1: { ...straight.b } });
          else out.push({ type: 'quad', p0: { ...seg.p0 }, p1: { ...seg.p1 }, p2: { ...seg.p2 } });
          continue;
        }
        if (seg.type === 'cubic') {
          const straight = this.simplifyStraightCubic(seg);
          if (straight) {
            out.push({ type: 'line', p0: { ...straight.a }, p1: { ...straight.b } });
            continue;
          }
          const cubic = [seg.p0, seg.p1, seg.p2, seg.p3];
          const quads = CubicApprox.toQuadraticSpline(cubic, cubicTol, 4, 12);
          if (quads && quads.length) {
            for (const q of quads) out.push({ type: 'quad', p0: { ...q[0] }, p1: { ...q[1] }, p2: { ...q[2] } });
          } else {
            const pts = [{ x: seg.p0.x, y: seg.p0.y }];
            this.flattenCubicAdaptive(seg.p0, seg.p1, seg.p2, seg.p3, pts, 0, boundaryTol);
            for (let i = 0; i + 1 < pts.length; i += 1) {
              if (!Vec2.equals(pts[i], pts[i + 1])) out.push({ type: 'line', p0: { ...pts[i] }, p1: { ...pts[i + 1] } });
            }
          }
          continue;
        }
        if (seg.type === 'arc') {
          const arc = SvgArc.toCenterParams(seg);
          if (arc && Math.abs(arc.rx - arc.ry) <= 1e-4) {
            const radius = (arc.rx + arc.ry) * 0.5;
            const halfAperture = Math.abs(arc.delta) * 0.5;
            if (radius > 1e-6 && halfAperture > 1e-6 && halfAperture < 3.13) {
              const midAngle = arc.theta1 + arc.delta * 0.5;
              out.push({
                type: 'arc_exact',
                cx: arc.cx,
                cy: arc.cy,
                ra: radius,
                rot: (Math.PI * 0.5) - midAngle,
                sc: { x: Math.sin(halfAperture), y: Math.cos(halfAperture) },
                p0: { ...seg.p0 },
                p1: { ...seg.p1 }
              });
              continue;
            }
          }
          const pts = this.sampleArcAdaptive(seg, boundaryTol);
          if (pts && pts.length >= 2) {
            for (let i = 0; i + 1 < pts.length; i += 1) {
              if (!Vec2.equals(pts[i], pts[i + 1])) out.push({ type: 'line', p0: { ...pts[i] }, p1: { ...pts[i + 1] } });
            }
          }
        }
      }
    }
    return out.length ? out : null;
  },

  detectGeneralPathFill(shape, options = CompilerConfig) {
    const rawSubpaths = shape?.source?.rawSubpaths || [];
    if (rawSubpaths.length === 1) {
      const onlySegs = rawSubpaths[0]?.segments || [];
      if (onlySegs.length === 1 && onlySegs[0]?.type === 'line') return null;
    }
    const contours = this.collectFlattenedContoursForFill(shape);
    if (!contours || !contours.length) return null;
    const signSegments = this.collectGeneralFillSignSegments(shape, options);
    if (!signSegments || !signSegments.length) return null;
    const boundarySegments = this.collectGeneralFillBoundarySegments(shape, options);
    if (!boundarySegments || !boundarySegments.length) return null;
    const allPoints = contours.flat();
    if (allPoints.length < 3) return null;
    return {
      kind: 'general-fill',
      contours: contours.map((pts) => pts.map((p) => ({ x: p.x, y: p.y }))),
      signSegments,
      boundarySegments,
      fillRule: String(shape.paint?.fillRule || 'nonzero').toLowerCase() === 'evenodd' ? 'evenodd' : 'nonzero',
      inv: Matrix2D.invert(shape.matrix),
      bounds: this.computePointsBounds(allPoints)
    };
  },

  detectIrregularClosedLinePolygonFill(shape) {
    const contours = this.collectLineOnlyContoursForFill(shape);
    if (!contours || !contours.length) return null;
    const allPoints = contours.flat();
    if (allPoints.length < 3) return null;
    return {
      kind: 'polygon-fill',
      contours: contours.map((pts) => pts.map((p) => ({ x: p.x, y: p.y }))),
      fillRule: String(shape.paint?.fillRule || 'nonzero').toLowerCase() === 'evenodd' ? 'evenodd' : 'nonzero',
      inv: Matrix2D.invert(shape.matrix),
      bounds: this.computePointsBounds(allPoints)
    };
  },


  preparePath(shape, options = CompilerConfig) {
    const { matrix, paint, source } = shape;
    const fullEllipse = this.detectFullEllipseArcPath(shape);
    if (fullEllipse) {
      return {
        ...shape,
        rawSubpathCount: source.rawSubpaths.length,
        normalizedSubpaths: source.normalizedSubpaths,
        render: {
          kind: 'local-ellipse',
          cx: fullEllipse.cx,
          cy: fullEllipse.cy,
          rx: fullEllipse.rx,
          ry: fullEllipse.ry,
          inv: Matrix2D.invert(matrix)
        }
      };
    }

    const lineSeg = this.detectSingleSegmentPath(shape);
    if (lineSeg) {
      return {
        ...shape,
        rawSubpathCount: source.rawSubpaths.length,
        normalizedSubpaths: source.normalizedSubpaths,
        render: {
          kind: 'local-segment',
          a: lineSeg.a,
          b: lineSeg.b,
          linecap: String(paint?.strokeLinecap || 'butt').toLowerCase(),
          inv: Matrix2D.invert(matrix)
        }
      };
    }

    const rect = this.detectAxisAlignedRectPath(shape);
    if (rect) {
      return {
        ...shape,
        rawSubpathCount: source.rawSubpaths.length,
        normalizedSubpaths: source.normalizedSubpaths,
        render: {
          kind: 'local-rect',
          cx: rect.cx,
          cy: rect.cy,
          halfX: rect.halfX,
          halfY: rect.halfY,
          rx: 0,
          ry: 0,
          inv: Matrix2D.invert(matrix)
        }
      };
    }

    const resolvedFillRule = String(paint?.fillRule || 'nonzero').toLowerCase() === 'evenodd' ? 'evenodd' : 'nonzero';
    const sodipodiStarFill = this.detectSodipodiRegularStarFill(shape);
    const topologyStarFill = !sodipodiStarFill ? this.detectRegularLineStarPolygonFill(shape) : null;
    const irregularPolygonFill = !(sodipodiStarFill || topologyStarFill) ? this.detectIrregularClosedLinePolygonFill(shape) : null;
    const exactArcFills = !(sodipodiStarFill || topologyStarFill || irregularPolygonFill) ? this.prepareExactArcFills(shape) : [];
    const generalPathFill = !(sodipodiStarFill || topologyStarFill || irregularPolygonFill) && !exactArcFills.length
      ? this.detectGeneralPathFill(shape, options)
      : null;
    const fillPrimitives = sodipodiStarFill
      ? [sodipodiStarFill]
      : (topologyStarFill
        ? [topologyStarFill]
        : (irregularPolygonFill
          ? [irregularPolygonFill]
          : (exactArcFills.length ? exactArcFills : (generalPathFill ? [generalPathFill] : []))));
    const strokePrimitives = [];

    source.normalizedSubpaths.forEach((subpath) => {
      const lastSegIndex = Math.max(0, subpath.strokeSegments.length - 1);
      subpath.strokeSegments.forEach((seg, segIndex) => {
        const isFirst = segIndex === 0;
        const isLast = segIndex === lastSegIndex;
        if (seg.type === 'line') {
          strokePrimitives.push({
            kind: 'line',
            a: Matrix2D.apply(matrix, seg.p0),
            b: Matrix2D.apply(matrix, seg.p1)
          });
          return;
        }

        if (seg.type === 'quad') {
          const straight = this.simplifyStraightQuad(seg);
          if (straight) {
            strokePrimitives.push({
              kind: 'line',
              a: Matrix2D.apply(matrix, straight.a),
              b: Matrix2D.apply(matrix, straight.b)
            });
            return;
          }
          strokePrimitives.push({
            kind: 'quad',
            a: Matrix2D.apply(matrix, seg.p0),
            b: Matrix2D.apply(matrix, seg.p1),
            c: Matrix2D.apply(matrix, seg.p2)
          });
          return;
        }

        if (seg.type === 'cubic') {
          const straight = this.simplifyStraightCubic(seg);
          if (straight) {
            strokePrimitives.push({
              kind: 'line',
              a: Matrix2D.apply(matrix, straight.a),
              b: Matrix2D.apply(matrix, straight.b)
            });
            return;
          }
          const cubic = [seg.p0, seg.p1, seg.p2, seg.p3];
          const tolerance = Math.max(
            options.cubicApproxMinTolerance,
            Number(paint?.strokeWidth || 1) * options.cubicApproxStrokeFactor
          );
          const quads = CubicApprox.toQuadraticSpline(cubic, tolerance, 4, 10);
          if (!quads) return;
          for (const q of quads) {
            strokePrimitives.push({
              kind: 'quad',
              a: Matrix2D.apply(matrix, q[0]),
              b: Matrix2D.apply(matrix, q[1]),
              c: Matrix2D.apply(matrix, q[2])
            });
          }
          return;
        }

        if (seg.type === 'arc') {
          const arc = SvgArc.toCenterParams(seg);
          const linecap = String(paint?.strokeLinecap || 'butt').toLowerCase();

          if (
            arc &&
            Math.abs(arc.rx - arc.ry) <= 1e-4 &&
            Math.abs(arc.phi) <= 1e-4 &&
            Matrix2D.isUniformScaleRotate(matrix)
          ) {
            const arcScale = Matrix2D.scaleApprox(matrix);
            const arcRot = Matrix2D.rotationApprox(matrix);
            const sweepSign = Math.sign(arc.delta) || 1;
            const leftCap = sweepSign < 0 ? (isFirst ? linecap : 'butt') : (isLast ? linecap : 'butt');
            const rightCap = sweepSign < 0 ? (isLast ? linecap : 'butt') : (isFirst ? linecap : 'butt');
            strokePrimitives.push({
              kind: 'arc',
              center: Matrix2D.apply(matrix, { x: arc.cx, y: arc.cy }),
              radius: arc.rx * arcScale,
              halfAperture: Math.abs(arc.delta) * 0.5,
              midAngle: arc.theta1 + arc.delta * 0.5 + arcRot,
              leftCap,
              rightCap
            });
          } else {
            const pts = SvgArc.toPolyline(seg, Math.PI / 16);
            for (let i = 0; i + 1 < pts.length; i += 1) {
              strokePrimitives.push({
                kind: 'line',
                a: Matrix2D.apply(matrix, pts[i]),
                b: Matrix2D.apply(matrix, pts[i + 1])
              });
            }
          }
        }
      });
    });

    return {
      ...shape,
      rawSubpathCount: source.rawSubpaths.length,
      normalizedSubpaths: source.normalizedSubpaths,
      render: (fillPrimitives.length || strokePrimitives.length)
        ? { kind: 'world-path-primitives', fills: fillPrimitives, strokes: strokePrimitives }
        : null
    };
  },

  prepareLine(shape) {
    return {
      ...shape,
      render: {
        kind: 'local-segment',
        a: shape.source.a,
        b: shape.source.b,
        linecap: String(shape.paint?.strokeLinecap || 'butt').toLowerCase(),
        inv: Matrix2D.invert(shape.matrix)
      }
    };
  },

  preparePolyline(shape, options = CompilerConfig) {
    if (shape.source.closed) {
      const pathLike = {
        ...shape,
        source: {
          ...shape.source,
          rawSubpaths: Array.isArray(shape.source.rawSubpaths) ? shape.source.rawSubpaths : [],
          normalizedSubpaths: Array.isArray(shape.source.normalizedSubpaths) ? shape.source.normalizedSubpaths : [],
          arcMeta: shape.source.arcMeta || null,
          starMeta: shape.source.starMeta || null
        }
      };
      return this.preparePath(pathLike, options);
    }

    return {
      ...shape,
      rawSubpathCount: shape.source.normalizedSubpaths.length,
      normalizedSubpaths: shape.source.normalizedSubpaths,
      render: {
        kind: 'local-segment-list',
        points: shape.source.points,
        inv: Matrix2D.invert(shape.matrix)
      }
    };
  },

  prepareRect(shape) {
    const { x, y, width, height, rx, ry } = shape.source;
    return {
      ...shape,
      render: {
        kind: 'local-rect',
        cx: x + width * 0.5,
        cy: y + height * 0.5,
        halfX: Math.max(0, width * 0.5),
        halfY: Math.max(0, height * 0.5),
        rx,
        ry,
        inv: Matrix2D.invert(shape.matrix)
      }
    };
  },

  prepareEllipse(shape) {
    return {
      ...shape,
      render: {
        kind: 'local-ellipse',
        cx: shape.source.cx,
        cy: shape.source.cy,
        rx: Math.max(0, shape.source.rx),
        ry: Math.max(0, shape.source.ry),
        inv: Matrix2D.invert(shape.matrix)
      }
    };
  }
};

// Backend stage: render model -> Godot canvas_item shader source.
const GodotEmitter = {
  emit(model) {
    // Emit the entire Godot shader as a single text buffer.
    const vb = model.viewBox || { x: 0, y: 0, width: 1, height: 1 };
    const gradients = model.gradients || {};
    const supportedShapeCount = model.shapes.filter((shape) => shape.render && [
      'local-rect',
      'local-ellipse',
      'local-segment',
      'local-segment-list',
      'world-stroke-primitives',
      'world-path-primitives'
    ].includes(shape.render.kind)).length;

    const lines = [
      '// VectorShader (refactored pipeline pass)',
      `// source chars: ${model.sourceLength}`,
      `// source shapes: ${model.sourceShapeCount}`,
      `// emitted shapes: ${supportedShapeCount}`,
      '// current scope: rect/circle/ellipse/star/polygon fills + exact arc fills + line/polyline/path strokes',
      '',
      'shader_type canvas_item;',
      '',
      'float sdCircle(vec2 p, float r) {',
      '  return length(p) - r;',
      '}',
      '',
      'float sdBox(vec2 p, vec2 halfSize) {',
      '  vec2 d = abs(p) - halfSize;',
      '  return length(max(d, vec2(0.0))) + min(max(d.x, d.y), 0.0);',
      '}',
      '',
      'float sdRoundedBoxSvg(vec2 p, vec2 halfSize, vec2 rr) {',
      '  rr = clamp(rr, vec2(0.0), halfSize);',
      '  vec2 q = abs(p) - halfSize + rr;',
      '  vec2 k = max(q, vec2(0.0));',
      '  float ellipseCorner = (length(k / max(rr, vec2(0.000001))) - 1.0) * min(rr.x, rr.y);',
      '  return min(max(q.x, q.y), 0.0) + ellipseCorner;',
      '}',
      '',
      'float sdEllipseViaCircle(vec2 p, vec2 r) {',
      '  vec2 safeR = max(r, vec2(0.000001));',
      '  vec2 q = p / safeR;',
      '  return sdCircle(q, 1.0) * min(safeR.x, safeR.y);',
      '}',
      '',
      'float sdSegment(vec2 p, vec2 a, vec2 b) {',
      '  vec2 pa = p - a;',
      '  vec2 ba = b - a;',
      '  float h = clamp(dot(pa, ba) / max(dot(ba, ba), 0.000001), 0.0, 1.0);',
      '  return length(pa - ba * h);',
      '}',
      '',
      'vec2 rotatePoint(vec2 p, float a) {',
      '  float c = cos(a);',
      '  float s = sin(a);',
      '  return vec2(c * p.x - s * p.y, s * p.x + c * p.y);',
      '}',
      '',
      'float sdPie(vec2 p, vec2 c, float r) {',
      '  p.x = abs(p.x);',
      '  float l = length(p) - r;',
      '  float m = length(p - c * clamp(dot(p, c), 0.0, r));',
      '  return max(l, m * sign(c.y * p.x - c.x * p.y));',
      '}',
      '',
      'float sdCutDisk(vec2 p, float r, float h) {',
      '  float safeH = clamp(h, -r + 0.000001, r - 0.000001);',
      '  float w = sqrt(max(r * r - safeH * safeH, 0.0));',
      '  p.x = abs(p.x);',
      '  float s = max((safeH - r) * p.x * p.x + w * w * (safeH + r - 2.0 * p.y), safeH * p.x - w * p.y);',
      '  return (s < 0.0) ? length(p) - r : ((p.x < w) ? safeH - p.y : length(p - vec2(w, safeH)));',
      '}',
      '',
      'float sdArc(vec2 p, vec2 sc, float ra, float rb) {',
      '  p.x = abs(p.x);',
      '  return ((sc.y * p.x > sc.x * p.y) ? length(p - sc * ra) : abs(length(p) - ra)) - rb;',
      '}',
      '',
      'float sdRing(vec2 p, vec2 n, float r, float th) {',
      '  p.x = abs(p.x);',
      '  p = mat2(vec2(n.x, n.y), vec2(-n.y, n.x)) * p;',
      '  return max(abs(length(p) - r) - th * 0.5, length(vec2(p.x, max(0.0, abs(r - p.y) - th * 0.5))) * sign(p.x));',
      '}',
      '',
      'float sdArcButt(vec2 p, vec2 sc, float ra, float halfW) {',
      '  vec2 ringN = vec2(sc.y, sc.x);',
      '  return sdRing(p, ringN, ra, 2.0 * halfW);',
      '}',
      '',
      'float sdArcRoundSelective(vec2 p, vec2 sc, float ra, float halfW, float capLeft, float capRight) {',
      '  float d = sdArcButt(p, sc, ra, halfW);',
      '  vec2 eR = vec2(sc.x, sc.y) * ra;',
      '  vec2 eL = vec2(-sc.x, sc.y) * ra;',
      '  if (capRight > 0.5) d = min(d, length(p - eR) - halfW);',
      '  if (capLeft > 0.5) d = min(d, length(p - eL) - halfW);',
      '  return d;',
      '}',
      '',
      'float sdArcSquareSelective(vec2 p, vec2 sc, float ra, float halfW, float capLeft, float capRight) {',
      '  float d = sdArcButt(p, sc, ra, halfW);',
      '  vec2 boxHalf = vec2(halfW * 0.5, halfW);',
      '  vec2 nR = vec2(sc.x, sc.y);',
      '  vec2 nL = vec2(-sc.x, sc.y);',
      '  vec2 tR = vec2(sc.y, -sc.x);',
      '  vec2 tL = vec2(-sc.y, -sc.x);',
      '  if (capRight > 0.5) {',
      '    vec2 cR = nR * ra + tR * boxHalf.x;',
      '    vec2 qR = p - cR;',
      '    d = min(d, sdBox(vec2(dot(qR, tR), dot(qR, nR)), boxHalf));',
      '  }',
      '  if (capLeft > 0.5) {',
      '    vec2 cL = nL * ra + tL * boxHalf.x;',
      '    vec2 qL = p - cL;',
      '    d = min(d, sdBox(vec2(dot(qL, tL), dot(qL, nL)), boxHalf));',
      '  }',
      '  return d;',
      '}',
      '',
      'float dot2(vec2 v) {',
      '  return dot(v, v);',
      '}',
      '',
      'float sdStar(vec2 p, float r, int n, float m) {',
      '  float an = 3.141593 / float(n);',
      '  float en = 3.141593 / m;',
      '  vec2 acs = vec2(cos(an), sin(an));',
      '  vec2 ecs = vec2(cos(en), sin(en));',
      '  float bn = mod(atan(p.x, p.y), 2.0 * an) - an;',
      '  p = length(p) * vec2(cos(bn), abs(sin(bn)));',
      '  p -= r * acs;',
      '  p += ecs * clamp(-dot(p, ecs), 0.0, r * acs.y / max(ecs.y, 0.000001));',
      '  return length(p) * sign(p.x);',
      '}',
      '',
      'float sdFillArc(vec2 p, vec2 sc, float ra) {',
      '  p.x = abs(p.x);',
      '  return (sc.y * p.x > sc.x * p.y) ? length(p - sc * ra) : abs(length(p) - ra);',
      '}',
      '',
      'float evalQuadratic1(float A, float B, float C, float t) {',
      '  float s = 1.0 - t;',
      '  return s * s * A + 2.0 * s * t * B + t * t * C;',
      '}',
      '',
      'float quadMonotoneRootT(vec2 A, vec2 B, vec2 C, float py) {',
      '  float y0 = A.y;',
      '  float y1 = C.y;',
      '  bool asc = y1 > y0;',
      '  float lo = 0.0;',
      '  float hi = 1.0;',
      '  for (int i = 0; i < 14; i += 1) {',
      '    float mid = 0.5 * (lo + hi);',
      '    float ym = evalQuadratic1(A.y, B.y, C.y, mid) - py;',
      '    if ((asc && ym < 0.0) || (!asc && ym > 0.0)) lo = mid;',
      '    else hi = mid;',
      '  }',
      '  return 0.5 * (lo + hi);',
      '}',
      '',
      'float quadCrossEvenOdd(vec2 p, vec2 A, vec2 B, vec2 C) {',
      '  float y0 = A.y;',
      '  float y1 = C.y;',
      '  if (abs(y1 - y0) < 0.0000001) return 0.0;',
      '  float yMin = min(y0, y1);',
      '  float yMax = max(y0, y1);',
      '  if (!(p.y > yMin && p.y <= yMax)) return 0.0;',
      '  float t = quadMonotoneRootT(A, B, C, p.y);',
      '  if (!(t > 0.0 && t <= 1.0)) return 0.0;',
      '  float x = evalQuadratic1(A.x, B.x, C.x, t);',
      '  return x > p.x + 0.0001 ? 1.0 : 0.0;',
      '}',
      '',
      'float quadWindingContribution(vec2 p, vec2 A, vec2 B, vec2 C) {',
      '  float y0 = A.y;',
      '  float y1 = C.y;',
      '  if (abs(y1 - y0) < 0.0000001) return 0.0;',
      '  float yMin = min(y0, y1);',
      '  float yMax = max(y0, y1);',
      '  if (!(p.y > yMin && p.y <= yMax)) return 0.0;',
      '  float t = quadMonotoneRootT(A, B, C, p.y);',
      '  if (!(t > 0.0 && t <= 1.0)) return 0.0;',
      '  float x = evalQuadratic1(A.x, B.x, C.x, t);',
      '  if (!(x > p.x + 0.0001)) return 0.0;',
      '  return y1 > y0 ? 1.0 : -1.0;',
      '}',
      '',
      'float sdBezier(vec2 pos, vec2 A, vec2 B, vec2 C) {',
      '  vec2 a = B - A;',
      '  vec2 b = A - 2.0 * B + C;',
      '  vec2 c = a * 2.0;',
      '  vec2 d = A - pos;',
      '  float bb = max(dot(b, b), 0.000001);',
      '  float kk = 1.0 / bb;',
      '  float kx = kk * dot(a, b);',
      '  float ky = kk * (2.0 * dot(a, a) + dot(d, b)) / 3.0;',
      '  float kz = kk * dot(d, a);',
      '  float p = ky - kx * kx;',
      '  float p3 = p * p * p;',
      '  float q = kx * (2.0 * kx * kx - 3.0 * ky) + kz;',
      '  float h = q * q + 4.0 * p3;',
      '  float res = 0.0;',
      '  if (h >= 0.0) {',
      '    h = sqrt(h);',
      '    vec2 x = (vec2(h, -h) - q) / 2.0;',
      '    vec2 uv = sign(x) * pow(abs(x), vec2(1.0 / 3.0));',
      '    float t = clamp(uv.x + uv.y - kx, 0.0, 1.0);',
      '    res = dot2(d + (c + b * t) * t);',
      '  } else {',
      '    float z = sqrt(-p);',
      '    float v = acos(q / (p * z * 2.0)) / 3.0;',
      '    float m = cos(v);',
      '    float n = sin(v) * 1.732050808;',
      '    vec3 t = clamp(vec3(m + m, -n - m, n - m) * z - kx, 0.0, 1.0);',
      '    res = min(dot2(d + (c + b * t.x) * t.x), dot2(d + (c + b * t.y) * t.y));',
      '  }',
      '  return sqrt(res);',
      '}',
      '',
      'float opOnion(float d, float r) {',
      '  return abs(d) - r;',
      '}',
      '',
      'void applyPaint(inout vec4 dst, vec4 src, float coverage) {',
      '  float a = clamp(coverage, 0.0, 1.0) * src.a;',
      '  float outA = a + dst.a * (1.0 - a);',
      '  vec3 outRGB = vec3(0.0);',
      '  if (outA > 0.0) {',
      '    outRGB = (src.rgb * a + dst.rgb * dst.a * (1.0 - a)) / outA;',
      '  }',
      '  dst = vec4(outRGB, outA);',
      '}',
      '',
      'void fragment() {',
      `  vec2 p = vec2(mix(${this.fmt(vb.x)}, ${this.fmt(vb.x + vb.width)}, UV.x), mix(${this.fmt(vb.y)}, ${this.fmt(vb.y + vb.height)}, UV.y));`,
      '  vec4 out_col = vec4(0.0);'
    ];

    model.shapes.forEach((shape, idx) => {
      const fillPaint = Paint.resolveFillPaint(shape.paint, gradients);
      const strokePaint = Paint.resolveStrokePaint(shape.paint, gradients);
      const strokeWidth = Math.max(0, Number(shape.paint?.strokeWidth || 0));
      const scale = Math.max(0.000001, Number(shape.strokeScale || 1));
      const worldStrokeWidth = Paint.isNonScalingStroke(shape.paint) ? strokeWidth : strokeWidth * scale;
      const localStrokeWidth = Paint.isNonScalingStroke(shape.paint) ? strokeWidth / scale : strokeWidth;

      if (!shape.render) {
        lines.push(`  // shape ${idx + 1} (${shape.tag}) skipped: no active render path`);
        return;
      }

      if (shape.render.kind === 'local-rect') {
        this.emitRect(lines, shape, idx, fillPaint, strokePaint, localStrokeWidth);
        return;
      }

      if (shape.render.kind === 'local-ellipse') {
        this.emitEllipse(lines, shape, idx, fillPaint, strokePaint, localStrokeWidth);
        return;
      }

      if (shape.render.kind === 'local-segment') {
        this.emitSegment(lines, shape, idx, strokePaint, localStrokeWidth);
        return;
      }

      if (shape.render.kind === 'local-segment-list') {
        this.emitSegmentList(lines, shape, idx, strokePaint, localStrokeWidth);
        return;
      }

      if (shape.render.kind === 'world-path-primitives') {
        this.emitPathPrimitiveShape(lines, shape, idx, fillPaint, strokePaint, worldStrokeWidth);
        return;
      }

      if (shape.render.kind === 'world-stroke-primitives') {
        this.emitStrokePrimitivePath(lines, shape, idx, strokePaint, worldStrokeWidth);
        return;
      }

      lines.push(`  // shape ${idx + 1} (${shape.tag}) skipped: unsupported render kind ${shape.render.kind}`);
    });

    lines.push('  COLOR = out_col;');
    if (supportedShapeCount === 0) {
      lines.push('  // No currently supported rect/circle/ellipse/segment/polyline/path shapes were found.');
    }
    lines.push('}');
    return lines.join('\n');
  },

  fmt(n) {
    return Number(n).toFixed(6);
  },

  getLocalShapeBounds(shape) {
    const render = shape?.render || {};
    if (render.kind === 'local-rect') {
      return {
        x: render.cx - render.halfX,
        y: render.cy - render.halfY,
        width: render.halfX * 2,
        height: render.halfY * 2
      };
    }
    if (render.kind === 'local-ellipse') {
      return {
        x: render.cx - render.rx,
        y: render.cy - render.ry,
        width: render.rx * 2,
        height: render.ry * 2
      };
    }
    if (render.kind === 'local-segment') {
      const a = render.a || { x: 0, y: 0 };
      const b = render.b || a;
      const minX = Math.min(a.x, b.x);
      const minY = Math.min(a.y, b.y);
      const maxX = Math.max(a.x, b.x);
      const maxY = Math.max(a.y, b.y);
      return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }
    if (render.kind === 'local-segment-list') {
      const pts = Array.isArray(render.points) ? render.points : [];
      if (!pts.length) return { x: 0, y: 0, width: 1, height: 1 };
      let minX = pts[0].x, minY = pts[0].y, maxX = pts[0].x, maxY = pts[0].y;
      for (let i = 1; i < pts.length; i += 1) {
        const pt = pts[i];
        minX = Math.min(minX, pt.x); minY = Math.min(minY, pt.y);
        maxX = Math.max(maxX, pt.x); maxY = Math.max(maxY, pt.y);
      }
      return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }
    if (render.kind === 'local-star-fill') {
      return render.bounds || { x: render.cx - render.radius, y: render.cy - render.radius, width: render.radius * 2, height: render.radius * 2 };
    }
    if (render.kind === 'local-polygon-fill') {
      return render.bounds || { x: 0, y: 0, width: 1, height: 1 };
    }
    return null;
  },

  getGradientCoordInfo(shape) {
    const kind = shape?.render?.kind || '';
    if (kind === 'local-rect' || kind === 'local-ellipse' || kind === 'local-segment' || kind === 'local-segment-list' || kind === 'local-star-fill' || kind === 'local-polygon-fill') {
      return { coordExpr: 'lp', localSpace: true };
    }
    return { coordExpr: 'p', localSpace: false };
  },

  resolveLinearGradientEndpoints(shape, gradient, localSpace = false) {
    const bounds = localSpace
      ? (this.getLocalShapeBounds(shape) || { x: 0, y: 0, width: 1, height: 1 })
      : (shape.bounds || { x: 0, y: 0, width: 1, height: 1 });
    let p0;
    let p1;
    if (gradient.units === 'objectBoundingBox') {
      p0 = { x: bounds.x + bounds.width * gradient.x1, y: bounds.y + bounds.height * gradient.y1 };
      p1 = { x: bounds.x + bounds.width * gradient.x2, y: bounds.y + bounds.height * gradient.y2 };
    } else {
      p0 = { x: gradient.x1, y: gradient.y1 };
      p1 = { x: gradient.x2, y: gradient.y2 };
    }
    p0 = Matrix2D.apply(gradient.transform || Matrix2D.identity(), p0);
    p1 = Matrix2D.apply(gradient.transform || Matrix2D.identity(), p1);

    if (!localSpace && gradient.units === 'userSpaceOnUse' && shape?.matrix) {
      p0 = Matrix2D.apply(shape.matrix, p0);
      p1 = Matrix2D.apply(shape.matrix, p1);
    }
    return { p0, p1 };
  },


  emitGradientStops(lines, varName, stops) {
    if (stops.length <= 1) return;
    for (let i = 1; i < stops.length; i += 1) {
      const a = stops[i - 1];
      const b = stops[i];
      const colorA = `vec4(${this.fmt(a.color?.r ?? 0)}, ${this.fmt(a.color?.g ?? 0)}, ${this.fmt(a.color?.b ?? 0)}, ${this.fmt(a.color?.a ?? 0)})`;
      const colorB = `vec4(${this.fmt(b.color?.r ?? 0)}, ${this.fmt(b.color?.g ?? 0)}, ${this.fmt(b.color?.b ?? 0)}, ${this.fmt(b.color?.a ?? 0)})`;
      const cond = i === 1 ? 'if' : 'else if';
      lines.push(`    ${cond} (${varName}_t <= ${this.fmt(b.offset)}) { ${varName} = mix(${colorA}, ${colorB}, clamp((${varName}_t - ${this.fmt(a.offset)}) / max(${this.fmt(b.offset - a.offset)}, 0.000001), 0.0, 1.0)); }`);
    }
    const last = stops[stops.length - 1];
    lines.push(`    else { ${varName} = vec4(${this.fmt(last.color?.r ?? 0)}, ${this.fmt(last.color?.g ?? 0)}, ${this.fmt(last.color?.b ?? 0)}, ${this.fmt(last.color?.a ?? 0)}); }`);
  },

  emitLinearGradientColor(lines, shape, paintSpec, varName) {
    const gradient = paintSpec?.gradient;
    const stops = Array.isArray(gradient?.stops) ? gradient.stops : [];
    if (!gradient || !stops.length) {
      lines.push(`    vec4 ${varName} = vec4(0.0);`);
      return;
    }

  emitRadialGradientColor(lines, shape, paintSpec, varName) {

    const coordExpr = coordInfo.coordExpr;
    const localSpace = coordInfo.localSpace;
    const bounds = localSpace

      ? Matrix2D.invert(shape.matrix)
      : null;

    lines.push(`    vec4 ${varName} = vec4(${this.fmt(stops[0].color?.r ?? 0)}, ${this.fmt(stops[0].color?.g ?? 0)}, ${this.fmt(stops[0].color?.b ?? 0)}, ${this.fmt(stops[0].color?.a ?? 0)});`);

    const cy = gradient.cy;
    const fx = gradient.fx;
    const fy = gradient.fy;

    lines.push(`    vec2 ${varName}_c = vec2(${this.fmt(cx)}, ${this.fmt(cy)});`);
    lines.push(`    vec2 ${varName}_f = vec2(${this.fmt(fx)}, ${this.fmt(fy)});`);
    lines.push(`    float ${varName}_r = ${this.fmt(r)};`);
    lines.push(`    float ${varName}_t = 0.0;`);
    lines.push(`    if (${varName}_r > 0.000001) {`);
    lines.push(`      vec2 ${varName}_df = ${varName}_q - ${varName}_f;`);

    lines.push(`        float ${varName}_cc = dot(${varName}_fc, ${varName}_fc) - ${varName}_r * ${varName}_r;`);

    lines.push('    }');

  emitClipItemMask(lines, item, groupVar, idx, itemIdx) {
    if (item.kind === 'rect') {
      lines.push('    {');
      lines.push(`      vec2 obj_clip_q${idx}_${itemIdx} = vec2(${this.fmt(item.inv.a)}*p.x + ${this.fmt(item.inv.c)}*p.y + ${this.fmt(item.inv.e)}, ${this.fmt(item.inv.b)}*p.x + ${this.fmt(item.inv.d)}*p.y + ${this.fmt(item.inv.f)});`);
      lines.push(`      float obj_clip_m${idx}_${itemIdx} = step(0.0, obj_clip_q${idx}_${itemIdx}.x) * step(obj_clip_q${idx}_${itemIdx}.x, ${this.fmt(item.width || 0)}) * step(0.0, obj_clip_q${idx}_${itemIdx}.y) * step(obj_clip_q${idx}_${itemIdx}.y, ${this.fmt(item.height || 0)});`);

    if (item.kind === 'rect-shape') {

      lines.push(`      vec2 clip_lp_${idx}_${itemIdx} = vec2(${this.fmt(item.inv.a)}*p.x + ${this.fmt(item.inv.c)}*p.y + ${this.fmt(item.inv.e)}, ${this.fmt(item.inv.b)}*p.x + ${this.fmt(item.inv.d)}*p.y + ${this.fmt(item.inv.f)});`);

      } else {
        lines.push(`      float clip_d_${idx}_${itemIdx} = sdBox(clip_lp_${idx}_${itemIdx} - vec2(${this.fmt(item.cx)}, ${this.fmt(item.cy)}), vec2(${this.fmt(item.halfX)}, ${this.fmt(item.halfY)}));`);
      }

    }

    if (item.kind === 'ellipse') {
      lines.push('    {');
      lines.push(`      vec2 clip_lp_${idx}_${itemIdx} = vec2(${this.fmt(item.inv.a)}*p.x + ${this.fmt(item.inv.c)}*p.y + ${this.fmt(item.inv.e)}, ${this.fmt(item.inv.b)}*p.x + ${this.fmt(item.inv.d)}*p.y + ${this.fmt(item.inv.f)});`);

      lines.push('      vec4 clip_col = vec4(0.0);');

  emitObjectPaintStart(lines) {

  objectOpacity(shape) {

  emitObjectPaintEnd(lines, shape) {

      const h = Number(clip.height) || 0;

  emitApplyPaint(lines, shape, paintSpec, coverageExpr, varName, paintShape = null, dstVar = 'out_col') {

  emitRect(lines, shape, idx, fill, stroke, strokeWidth) {

    lines.push(`  { // rect ${idx + 1}`);
    this.emitObjectPaintStart(lines);
    lines.push(`    vec2 lp = vec2(${this.fmt(inv.a)}*p.x + ${this.fmt(inv.c)}*p.y + ${this.fmt(inv.e)}, ${this.fmt(inv.b)}*p.x + ${this.fmt(inv.d)}*p.y + ${this.fmt(inv.f)});`);

        lines.push(`    vec2 innerHalf = max(vec2(0.0), vec2(${this.fmt(halfX)}, ${this.fmt(halfY)}) - vec2(${this.fmt(strokeWidth * 0.5)}));`);
        lines.push(`    vec2 outerR = vec2(${this.fmt(cornerRx)}, ${this.fmt(cornerRy)}) + vec2(${this.fmt(strokeWidth * 0.5)});`);
        lines.push(`    vec2 innerR = max(vec2(0.0), vec2(${this.fmt(cornerRx)}, ${this.fmt(cornerRy)}) - vec2(${this.fmt(strokeWidth * 0.5)}));`);
        lines.push(`    float outerD = sdRoundedBoxSvg(lp - vec2(${this.fmt(cx)}, ${this.fmt(cy)}), outerHalf, outerR);`);
        lines.push(`    float innerD = (innerR.x > 0.0 && innerR.y > 0.0) ? sdRoundedBoxSvg(lp - vec2(${this.fmt(cx)}, ${this.fmt(cy)}), innerHalf, innerR) : sdBox(lp - vec2(${this.fmt(cx)}, ${this.fmt(cy)}), innerHalf);`);
        lines.push('    float outerInside = outerD <= 0.0 ? 1.0 : 0.0;');
        lines.push('    float innerInside = innerD <= 0.0 ? 1.0 : 0.0;');
        lines.push('    float strokeMask = max(0.0, outerInside - innerInside);');

      } else {
        lines.push(`    vec2 outerHalf = vec2(${this.fmt(halfX)}, ${this.fmt(halfY)}) + vec2(${this.fmt(strokeWidth * 0.5)});`);
        lines.push(`    vec2 innerHalf = max(vec2(0.0), vec2(${this.fmt(halfX)}, ${this.fmt(halfY)}) - vec2(${this.fmt(strokeWidth * 0.5)}));`);
        lines.push(`    float outerD = sdBox(lp - vec2(${this.fmt(cx)}, ${this.fmt(cy)}), outerHalf);`);
        lines.push(`    float innerD = sdBox(lp - vec2(${this.fmt(cx)}, ${this.fmt(cy)}), innerHalf);`);
        lines.push('    float outerInside = outerD <= 0.0 ? 1.0 : 0.0;');
        lines.push('    float innerInside = innerD <= 0.0 ? 1.0 : 0.0;');

  emitEllipse(lines, shape, idx, fill, stroke, strokeWidth) {

      lines.push(`  // ellipse ${idx + 1} skipped: requires solid fill and/or stroke`);

    lines.push(`  { // ellipse ${idx + 1}`);
    this.emitObjectPaintStart(lines);
    lines.push(`    vec2 lp = vec2(${this.fmt(inv.a)}*p.x + ${this.fmt(inv.c)}*p.y + ${this.fmt(inv.e)}, ${this.fmt(inv.b)}*p.x + ${this.fmt(inv.d)}*p.y + ${this.fmt(inv.f)});`);

  emitSegment(lines, shape, idx, stroke, strokeWidth) {

        lines.push('    float d = sdBox(lp - a0, vec2(halfW, halfW));');
        lines.push('    float strokeMask = d <= 0.0 ? 1.0 : 0.0;');
        this.emitApplyPaint(lines, shape, stroke, 'strokeMask', 'stroke_paint', null, 'obj_col');

      lines.push('  }');

      }
      lines.push('    float strokeMask = d <= 0.0 ? 1.0 : 0.0;');
      this.emitApplyPaint(lines, shape, stroke, 'strokeMask', 'stroke_paint', null, 'obj_col');
      this.emitObjectPaintEnd(lines, shape);
      lines.push('  }');
    }
  },


  emitSegmentList(lines, shape, idx, stroke, strokeWidth) {

    lines.push(`    vec2 lp = vec2(${this.fmt(inv.a)}*p.x + ${this.fmt(inv.c)}*p.y + ${this.fmt(inv.e)}, ${this.fmt(inv.b)}*p.x + ${this.fmt(inv.d)}*p.y + ${this.fmt(inv.f)});`);

  emitPathPrimitiveShape(lines, shape, idx, fill, stroke, worldStrokeWidth) {
    const fills = Array.isArray(shape.render?.fills) ? shape.render.fills : [];
    const strokes = Array.isArray(shape.render?.strokes) ? shape.render.strokes : [];
    const objectOpacity = this.objectOpacity(shape);
    if (objectOpacity <= 1e-6) {
      lines.push(`  // path ${idx + 1} skipped: object opacity 0`);
      return;
    }

    if (!(fill && fills.length) && !(stroke && worldStrokeWidth > 0 && strokes.length)) {
      return;
    }

    lines.push(`  { // path-object ${idx + 1}`);
    this.emitObjectPaintStart(lines);
    if (fill && fills.length) {
      lines.push('    {');
      this.emitFillPrimitivePath(lines, shape, idx, fill, fills, false, 'obj_col');
      lines.push('    }');
    }

    if (stroke && worldStrokeWidth > 0 && strokes.length) {
      lines.push('    {');
      this.emitStrokePrimitivePath(lines, { ...shape, render: { kind: 'world-stroke-primitives', segments: strokes } }, idx, stroke, worldStrokeWidth, false, 'obj_col');
      lines.push('    }');
    }
    this.emitObjectPaintEnd(lines, shape);
    lines.push('  }');
  },

  emitFillPrimitivePath(lines, shape, idx, fill, fills, wrapBlock = true, dstVar = 'out_col') {
    if (wrapBlock) lines.push(`  { // path-fill-primitives ${idx + 1}`);
    lines.push('    float d = 1e20;');
    const starFill = fills.find((seg) => seg.kind === 'star-fill');
    const polygonFill = fills.find((seg) => seg.kind === 'polygon-fill');
    const generalFill = fills.find((seg) => seg.kind === 'general-fill');
    let paintShape = shape;
    const localFill = starFill || polygonFill || generalFill;
    if (localFill) {
      lines.push(`    vec2 lp = vec2(${this.fmt(localFill.inv.a)}*p.x + ${this.fmt(localFill.inv.c)}*p.y + ${this.fmt(localFill.inv.e)}, ${this.fmt(localFill.inv.b)}*p.x + ${this.fmt(localFill.inv.d)}*p.y + ${this.fmt(localFill.inv.f)});`);
      paintShape = {
        ...shape,
        render: starFill
          ? {
              kind: 'local-star-fill',
              cx: starFill.cx,
              cy: starFill.cy,
              radius: starFill.radius,
              bounds: starFill.bounds
            }
          : {
              kind: 'local-polygon-fill',
              bounds: (polygonFill || generalFill).bounds
            }
      };
    }

    for (let s = 0; s < fills.length; s += 1) {
      const seg = fills[s];
      if (seg.kind === 'arc-fill') {
        const safeHalf = Math.max(0.000001, Number(seg.halfAperture || 0));
        lines.push('    {');
        lines.push(`      vec2 ap = rotatePoint(p - vec2(${this.fmt(seg.center.x)}, ${this.fmt(seg.center.y)}), ${this.fmt((Math.PI * 0.5) - Number(seg.midAngle || 0))});`);
        lines.push(`      vec2 sc = vec2(sin(${this.fmt(safeHalf)}), cos(${this.fmt(safeHalf)}));`);
        if (seg.fillKind === 'pie') {
          lines.push(`      d = min(d, sdPie(ap, sc, ${this.fmt(seg.radius)}));`);
        } else {
          lines.push(`      d = min(d, sdCutDisk(ap, ${this.fmt(seg.radius)}, ${this.fmt(seg.radius * Math.cos(safeHalf))}));`);
        }
        lines.push('    }');
        continue;
      }

      if (seg.kind === 'star-fill') {
        lines.push('    {');
        lines.push(`      vec2 sp = rotatePoint(lp - vec2(${this.fmt(seg.cx)}, ${this.fmt(seg.cy)}), ${this.fmt(seg.rotation)});`);
        lines.push(`      d = min(d, sdStar(sp, ${this.fmt(seg.radius)}, ${Math.max(3, Math.round(seg.sides || 0))}, ${this.fmt(seg.m)}));`);
        lines.push('    }');
        continue;
      }

      if (seg.kind === 'general-fill') {
        lines.push('    {');
        const signSegments = Array.isArray(seg.signSegments) ? seg.signSegments : [];
        const boundarySegments = Array.isArray(seg.boundarySegments) ? seg.boundarySegments : [];
        const generalFillRule = String(seg.fillRule || shape.paint?.fillRule || 'nonzero').toLowerCase() === 'evenodd' ? 'evenodd' : 'nonzero';
        const seed = signSegments[0]?.p0 || signSegments[0]?.p1 || boundarySegments[0]?.p0 || null;
        if (seed) {
          lines.push(`      float pd = dot(lp - vec2(${this.fmt(seed.x)}, ${this.fmt(seed.y)}), lp - vec2(${this.fmt(seed.x)}, ${this.fmt(seed.y)}));`);
          if (generalFillRule === 'nonzero') {
            lines.push('      float winding = 0.0;');
            for (const sseg of signSegments) {
              if (sseg.type === 'line') {
                lines.push(`      { vec2 vi = vec2(${this.fmt(sseg.p0.x)}, ${this.fmt(sseg.p0.y)}); vec2 vj = vec2(${this.fmt(sseg.p1.x)}, ${this.fmt(sseg.p1.y)}); float isLeft = (vj.x - vi.x) * (lp.y - vi.y) - (lp.x - vi.x) * (vj.y - vi.y); bool upward = (vi.y <= lp.y) && (vj.y > lp.y); bool downward = (vi.y > lp.y) && (vj.y <= lp.y); if (upward && isLeft > 0.0) winding += 1.0; if (downward && isLeft < 0.0) winding -= 1.0; }`);
              } else if (sseg.type === 'quad') {
                lines.push(`      winding += quadWindingContribution(lp, vec2(${this.fmt(sseg.p0.x)}, ${this.fmt(sseg.p0.y)}), vec2(${this.fmt(sseg.p1.x)}, ${this.fmt(sseg.p1.y)}), vec2(${this.fmt(sseg.p2.x)}, ${this.fmt(sseg.p2.y)}));`);
              }
            }
            lines.push('      float inside = abs(winding) > 0.5 ? 1.0 : 0.0;');
          } else {
            lines.push('      float parity = 0.0;');
            for (const sseg of signSegments) {
              if (sseg.type === 'line') {
                lines.push(`      { vec2 vi = vec2(${this.fmt(sseg.p0.x)}, ${this.fmt(sseg.p0.y)}); vec2 vj = vec2(${this.fmt(sseg.p1.x)}, ${this.fmt(sseg.p1.y)}); bool crosses = ((vi.y > lp.y) != (vj.y > lp.y)); if (crosses) { float dy = vj.y - vi.y; float xCross = vi.x + (lp.y - vi.y) * (vj.x - vi.x) / dy; if (xCross > lp.x) parity = 1.0 - parity; } }`);
              } else if (sseg.type === 'quad') {
                lines.push(`      parity = mod(parity + quadCrossEvenOdd(lp, vec2(${this.fmt(sseg.p0.x)}, ${this.fmt(sseg.p0.y)}), vec2(${this.fmt(sseg.p1.x)}, ${this.fmt(sseg.p1.y)}), vec2(${this.fmt(sseg.p2.x)}, ${this.fmt(sseg.p2.y)})), 2.0);`);
              }
            }
            lines.push('      float inside = parity > 0.5 ? 1.0 : 0.0;');
          }
          for (const bseg of boundarySegments) {
            if (bseg.type === 'line') {
              lines.push(`      pd = min(pd, sdSegment(lp, vec2(${this.fmt(bseg.p0.x)}, ${this.fmt(bseg.p0.y)}), vec2(${this.fmt(bseg.p1.x)}, ${this.fmt(bseg.p1.y)})));`);
            } else if (bseg.type === 'quad') {
              lines.push(`      pd = min(pd, sdBezier(lp, vec2(${this.fmt(bseg.p0.x)}, ${this.fmt(bseg.p0.y)}), vec2(${this.fmt(bseg.p1.x)}, ${this.fmt(bseg.p1.y)}), vec2(${this.fmt(bseg.p2.x)}, ${this.fmt(bseg.p2.y)})));`);
            } else if (bseg.type === 'arc_exact') {
              const cr = Math.cos(bseg.rot);
              const sr = Math.sin(bseg.rot);
              lines.push(`      { vec2 q = lp - vec2(${this.fmt(bseg.cx)}, ${this.fmt(bseg.cy)}); q = vec2(${this.fmt(cr)}*q.x - ${this.fmt(sr)}*q.y, ${this.fmt(sr)}*q.x + ${this.fmt(cr)}*q.y); pd = min(pd, sdFillArc(q, vec2(${this.fmt(bseg.sc.x)}, ${this.fmt(bseg.sc.y)}), ${this.fmt(bseg.ra)})); }`);
            }
          }
          lines.push('      float ps = inside > 0.5 ? -1.0 : 1.0;');
          lines.push('      d = min(d, ps * pd);');
        }
        lines.push('    }');
        continue;
      }

      if (seg.kind === 'polygon-fill') {
        lines.push('    {');
        const contours = (Array.isArray(seg.contours) && seg.contours.length)
          ? seg.contours
          : ((Array.isArray(seg.points) && seg.points.length) ? [seg.points] : []);
        const polygonFillRule = String(seg.fillRule || shape.paint?.fillRule || 'nonzero').toLowerCase() === 'evenodd' ? 'evenodd' : 'nonzero';
        const firstPt = contours.length && contours[0].length ? contours[0][0] : null;
        if (firstPt) {
          lines.push(`      float pd = dot(lp - vec2(${this.fmt(firstPt.x)}, ${this.fmt(firstPt.y)}), lp - vec2(${this.fmt(firstPt.x)}, ${this.fmt(firstPt.y)}));`);
          if (polygonFillRule === 'nonzero') {
            lines.push('      float winding = 0.0;');
            for (const pts of contours) {
              for (let i = 0; i < pts.length; i += 1) {
                const j = (i + 1) % pts.length;
                const vi = pts[i];
                const vj = pts[j];
                lines.push(`      { vec2 vi = vec2(${this.fmt(vi.x)}, ${this.fmt(vi.y)}); vec2 vj = vec2(${this.fmt(vj.x)}, ${this.fmt(vj.y)}); vec2 e = vj - vi; vec2 w = lp - vi; vec2 b = w - e * clamp(dot(w, e) / max(dot(e, e), 0.000001), 0.0, 1.0); pd = min(pd, dot(b, b)); float isLeft = (vj.x - vi.x) * (lp.y - vi.y) - (lp.x - vi.x) * (vj.y - vi.y); bool upward = (vi.y <= lp.y) && (vj.y > lp.y); bool downward = (vi.y > lp.y) && (vj.y <= lp.y); if (upward && isLeft > 0.0) winding += 1.0; if (downward && isLeft < 0.0) winding -= 1.0; }`);
              }
            }
            lines.push('      float ps = abs(winding) > 0.5 ? -1.0 : 1.0;');
          } else {
            lines.push('      float parity = 0.0;');
            for (const pts of contours) {
              for (let i = 0; i < pts.length; i += 1) {
                const j = (i + 1) % pts.length;
                const vi = pts[i];
                const vj = pts[j];
                lines.push(`      { vec2 vi = vec2(${this.fmt(vi.x)}, ${this.fmt(vi.y)}); vec2 vj = vec2(${this.fmt(vj.x)}, ${this.fmt(vj.y)}); vec2 e = vj - vi; vec2 w = lp - vi; vec2 b = w - e * clamp(dot(w, e) / max(dot(e, e), 0.000001), 0.0, 1.0); pd = min(pd, dot(b, b)); bool crosses = ((vi.y > lp.y) != (vj.y > lp.y)); if (crosses) { float dy = vj.y - vi.y; float xCross = vi.x + (lp.y - vi.y) * (vj.x - vi.x) / dy; if (xCross > lp.x) parity = 1.0 - parity; } }`);
              }
            }
            lines.push('      float ps = parity > 0.5 ? -1.0 : 1.0;');
          }
          lines.push('      d = min(d, ps * sqrt(pd));');
        }
        lines.push('    }');
      }
    }

    this.emitApplyPaint(lines, shape, fill, 'd <= 0.0 ? 1.0 : 0.0', 'fill_paint', paintShape, dstVar);
    if (wrapBlock) lines.push('  }');
  },

  emitStrokePrimitivePath(lines, shape, idx, stroke, worldStrokeWidth, wrapBlock = true, dstVar = 'out_col') {
    const { segments } = shape.render;

    if (!(stroke && worldStrokeWidth > 0)) {
      lines.push(`  // path ${idx + 1} skipped: requires solid stroke + stroke-width > 0`);
      return;
    }

    if (!Array.isArray(segments) || segments.length < 1) {
      lines.push(`  // path ${idx + 1} skipped: no supported stroke primitives found`);
      return;
    }

    if (wrapBlock) lines.push(`  { // path-stroke-primitives ${idx + 1}`);
    lines.push('    float d = 1e20;');
    lines.push(`    float halfW = ${this.fmt(worldStrokeWidth * 0.5)};`);

    for (let s = 0; s < segments.length; s += 1) {
      const seg = segments[s];

      if (seg.kind === 'line') {
        lines.push(`    d = min(d, sdSegment(p, vec2(${this.fmt(seg.a.x)}, ${this.fmt(seg.a.y)}), vec2(${this.fmt(seg.b.x)}, ${this.fmt(seg.b.y)})) - halfW);`);
        continue;
      }

      if (seg.kind === 'quad') {
        lines.push(`    d = min(d, sdBezier(p, vec2(${this.fmt(seg.a.x)}, ${this.fmt(seg.a.y)}), vec2(${this.fmt(seg.b.x)}, ${this.fmt(seg.b.y)}), vec2(${this.fmt(seg.c.x)}, ${this.fmt(seg.c.y)})) - halfW);`);
        continue;
      }

      if (seg.kind === 'arc') {
        const leftCap = String(seg.leftCap || 'butt').toLowerCase();
        const rightCap = String(seg.rightCap || 'butt').toLowerCase();
        const safeHalf = Math.max(0.000001, Number(seg.halfAperture || 0));
        lines.push('    {');
        lines.push(`      vec2 ap = rotatePoint(p - vec2(${this.fmt(seg.center.x)}, ${this.fmt(seg.center.y)}), ${this.fmt((Math.PI * 0.5) - Number(seg.midAngle || 0))});`);
        lines.push(`      vec2 sc = vec2(sin(${this.fmt(safeHalf)}), cos(${this.fmt(safeHalf)}));`);
        if (leftCap === 'square' || rightCap === 'square') {
          lines.push(`      d = min(d, sdArcSquareSelective(ap, sc, ${this.fmt(seg.radius)}, halfW, ${leftCap === 'square' ? '1.0' : '0.0'}, ${rightCap === 'square' ? '1.0' : '0.0'}));`);
        } else if (leftCap === 'round' || rightCap === 'round') {
          lines.push(`      d = min(d, sdArcRoundSelective(ap, sc, ${this.fmt(seg.radius)}, halfW, ${leftCap === 'round' ? '1.0' : '0.0'}, ${rightCap === 'round' ? '1.0' : '0.0'}));`);
        } else {
          lines.push(`      d = min(d, sdArcButt(ap, sc, ${this.fmt(seg.radius)}, halfW));`);
        }
        lines.push('    }');
      }
    }

    lines.push('    float strokeMask = d <= 0.0 ? 1.0 : 0.0;');
    this.emitApplyPaint(lines, shape, stroke, 'strokeMask', 'stroke_paint', null, dstVar);
    if (wrapBlock) lines.push('  }');
  },

  buildErrorStub(errorMessage) {
    const clean = String(errorMessage || 'Unknown parser error').replace(/\r?\n/g, ' ');
    return [
      '// VectorShader (Godot stub)',
      '// compile pipeline failed',
      `// error: ${clean}`,
      '',
      'shader_type canvas_item;',
      '',
      'void fragment() {',
      '    COLOR = vec4(1.0, 0.0, 0.2, 1.0);',
      '}'
    ].join('\n');
  }
};

// Thin orchestration layer for the full pipeline.
const Compiler = {
  compile(svgText, options = CompilerConfig) {
    // Full pass: source text -> scene -> render model -> shader text.
    // Options are passed explicitly so the compiler does not hide dependencies in globals.
    const scene = SvgFrontend.parseScene(svgText);
    const renderModel = RenderPrep.buildRenderModel(scene, options);
    const shaderText = GodotEmitter.emit(renderModel);
    return { scene, renderModel, shaderText };
  }
};

// Preview widget behavior: render inline SVG, pan, zoom, drag.
const Preview = {
  applyTransform() {
    if (!AppState.preview.content) return;
    AppState.preview.content.style.transform =
      `translate(-50%, -50%) translate(${AppState.preview.tx}px, ${AppState.preview.ty}px) scale(${AppState.preview.scale})`;
  },

  resetTransform() {
    AppState.preview.scale = 1;
    AppState.preview.tx = 0;
    AppState.preview.ty = 0;
    this.applyTransform();
  },

  render(svgText) {
    DOM.preview.innerHTML = '';
    if (!svgText.trim()) {
      DOM.preview.innerHTML = '<span class="footer-note">No SVG loaded yet.</span>';
      AppState.preview.content = null;
      return;
    }

    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(svgText, 'image/svg+xml');
      const parseError = doc.querySelector('parsererror');
      if (parseError) throw new Error('SVG parse error.');

      const svg = doc.querySelector('svg');
      if (!svg) throw new Error('No <svg> element found.');

      const content = document.createElement('div');
      content.className = 'preview-content';
      content.appendChild(document.importNode(svg, true));
      DOM.preview.appendChild(content);
      AppState.preview.content = content;
      this.resetTransform();
      Debug.setStatus('SVG loaded and preview updated.', 'success');
    } catch (error) {
      DOM.preview.innerHTML = `<span class="footer-note">${error.message}</span>`;
      AppState.preview.content = null;
      Debug.setStatus(`Preview failed: ${error.message}`);
    }
  },

  beginDrag(event) {
    if (!AppState.preview.content) return;
    if (![0, 1, 2].includes(event.button)) return;

    event.preventDefault();
    AppState.preview.dragging = true;
    AppState.preview.pointerStartX = event.clientX;
    AppState.preview.pointerStartY = event.clientY;
    AppState.preview.originTx = AppState.preview.tx;
    AppState.preview.originTy = AppState.preview.ty;
    DOM.preview.classList.add('dragging');
  },

  drag(event) {
    if (!AppState.preview.dragging) return;
    const dx = event.clientX - AppState.preview.pointerStartX;
    const dy = event.clientY - AppState.preview.pointerStartY;
    AppState.preview.tx = AppState.preview.originTx + dx;
    AppState.preview.ty = AppState.preview.originTy + dy;
    this.applyTransform();
  },

  endDrag() {
    if (!AppState.preview.dragging) return;
    AppState.preview.dragging = false;
    DOM.preview.classList.remove('dragging');
  },

  zoom(event) {
    if (!AppState.preview.content) return;
    event.preventDefault();
    const rect = DOM.preview.getBoundingClientRect();
    const centerX = rect.left + rect.width * 0.5 + AppState.preview.tx;
    const centerY = rect.top + rect.height * 0.5 + AppState.preview.ty;
    const zoomIntensity = 0.0015;
    const scaleFactor = Math.exp(-event.deltaY * zoomIntensity);
    const nextScale = Math.min(
      PreviewConfig.maxScale,
      Math.max(PreviewConfig.minScale, AppState.preview.scale * scaleFactor)
    );
    const ratio = nextScale / AppState.preview.scale;
    AppState.preview.tx = event.clientX - (event.clientX - centerX) * ratio - (rect.left + rect.width * 0.5);
    AppState.preview.ty = event.clientY - (event.clientY - centerY) * ratio - (rect.top + rect.height * 0.5);
    AppState.preview.scale = nextScale;
    this.applyTransform();
  }
};

// Clipboard convenience wrapper with status reporting.
const Clipboard = {
  async copy(text, successMessage) {
    if (!text) {
      Debug.setStatus('Nothing to copy yet.');
      return;
    }
    try {
      await navigator.clipboard.writeText(text);
      Debug.setStatus(successMessage, 'success');
    } catch (error) {
      Debug.setStatus(`Clipboard copy failed: ${error.message}`);
    }
  }
};

// App wiring: connect DOM events to preview refresh and compilation.
const App = {
  readSvgSource() {
    return DOM.svgCode.value;
  },

  writeSvgSource(svgText) {
    Editors.setValue(Editors.svg, svgText);
  },

  writeShaderOutput(shaderText) {
    Editors.setValue(Editors.shader, shaderText);
  },

  clearShaderOutput() {
    Editors.clear(Editors.shader);
  },

  refreshFromSvgSource() {
    // Core UI loop: render SVG preview, compile source, then update visible output.
    const svgText = this.readSvgSource();
    Preview.render(svgText);

    if (!svgText.trim()) {
      this.clearShaderOutput();
      return;
    }

    try {
      const result = Compiler.compile(svgText, CompilerConfig);
      this.writeShaderOutput(result.shaderText);
      Debug.log('pipeline:refresh', {
        svgChars: svgText.length,
        shaderChars: result.shaderText.length,
        sceneShapes: result.scene.shapeCount,
        renderShapes: result.renderModel.renderShapeCount
      });
    } catch (error) {
      this.writeShaderOutput(GodotEmitter.buildErrorStub(error.message));
      Debug.log('pipeline:error', { message: error.message });
    }
  },

  async importSvgFile(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;

    try {
      const text = await file.text();
      this.writeSvgSource(text);
      this.refreshFromSvgSource();
      Debug.setStatus(`Imported ${file.name}.`, 'success');
      Debug.log('file:imported', { name: file.name, size: file.size });
    } catch (error) {
      Debug.setStatus(`Import failed: ${error.message}`);
    }
  },

  isTypingTarget(node = document.activeElement) {
    const tag = node && node.tagName;
    return tag === 'TEXTAREA' || tag === 'INPUT' || node?.isContentEditable;
  },

  bindEvents() {
    DOM.importBtn.addEventListener('click', () => DOM.svgFileInput.click());
    DOM.svgFileInput.addEventListener('change', (event) => this.importSvgFile(event));

    DOM.tabs.forEach((tab) => {
      tab.addEventListener('click', () => Tabs.setActive(tab.dataset.tab));
    });

    document.addEventListener('keydown', (event) => {
      if (this.isTypingTarget()) return;
      if (event.key === 'ArrowRight') {
        event.preventDefault();
        Tabs.move(1);
      } else if (event.key === 'ArrowLeft') {
        event.preventDefault();
        Tabs.move(-1);
      }
    });

    DOM.svgCode.addEventListener('input', () => {
      Editors.sync(Editors.svg);
      this.refreshFromSvgSource();
    });

    DOM.svgCode.addEventListener('scroll', () => {
      Editors.svg.gutter.scrollTop = Editors.svg.textarea.scrollTop;
    });

    DOM.shaderCode.addEventListener('scroll', () => {
      Editors.shader.gutter.scrollTop = Editors.shader.textarea.scrollTop;
    });

    DOM.copyShaderBtn.addEventListener('click', () => {
      Clipboard.copy(DOM.shaderCode.value, 'Shader code copied.');
    });

    DOM.copyLogsBtn.addEventListener('click', () => {
      Clipboard.copy(AppState.debugLogs.join('\n'), 'Debug logs copied.');
    });

    DOM.preview.addEventListener('contextmenu', (event) => event.preventDefault());
    DOM.preview.addEventListener('mousedown', (event) => Preview.beginDrag(event));
    window.addEventListener('mousemove', (event) => Preview.drag(event));
    window.addEventListener('mouseup', () => Preview.endDrag());
    DOM.preview.addEventListener('wheel', (event) => Preview.zoom(event), { passive: false });
  },

  init() {
    if (!this.readSvgSource().trim()) {
      this.writeSvgSource(DEMO_SVG);
    } else {
      Editors.sync(Editors.svg);
    }

    this.bindEvents();
    this.refreshFromSvgSource();
    Debug.log('app:booted');
  }
};

App.init();

  

</script>
</body>
</html>
