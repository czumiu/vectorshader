<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vectorshader</title>
  <style>
    /* Visual shell only: colors, spacing, editors, preview panel.
       None of this CSS affects SVG parsing or shader generation. */
    :root {
      --bg: #0b1020;
      --panel: #111935;
      --panel-2: #0f1730;
      --line: #26355f;
      --text: #eaf0ff;
      --muted: #9fb0d9;
      --accent: #76b7ff;
      --ok: #7cf2b0;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(circle at top left, #1a2850 0%, var(--bg) 38%), var(--bg);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(1400px, 100%);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-height: 86vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pill {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--text);
      background: linear-gradient(180deg, #1c2a4f, #152141);
      cursor: pointer;
      font-weight: 600;
    }

    button.primary {
      background: linear-gradient(180deg, #83c4ff, #5dafff);
      color: #0b1530;
      border-color: #8ac8ff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .status {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
      background: var(--panel-2);
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--muted);
    }

    .nav-btn.active {
      color: var(--text);
      background: #1a274a;
    }

    .panels {
      min-height: 0;
      position: relative;
    }

    .panel {
      position: absolute;
      inset: 0;
      display: none;
      padding: 12px;
      background: var(--panel-2);
      min-height: 0;
    }

    .panel.active {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .editor {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: 52px 1fr;
      background: #0c132b;
    }

    .gutter {
      margin: 0;
      padding: 10px 8px;
      color: #6f84bb;
      background: #0a1126;
      border-right: 1px solid var(--line);
      text-align: right;
      user-select: none;
      overflow: hidden;
      line-height: 1.35;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    textarea {
      margin: 0;
      padding: 10px 12px;
      border: none;
      resize: none;
      width: 100%;
      height: 100%;
      color: var(--text);
      background: #0c132b;
      font-size: 13px;
      line-height: 1.35;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      outline: none;
    }

    .preview {
      border: 1px solid var(--line);
      border-radius: 10px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.06) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.06) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.06) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.06) 75%),
        #101a37;
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      position: relative;
      padding: 16px;
      cursor: grab;
    }

    .preview.dragging {
      cursor: grabbing;
    }

    .preview-content {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      will-change: transform;
    }

    .preview-content svg {
      display: block;
      max-width: min(90vw, 1200px);
      max-height: min(75vh, 1000px);
      filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.35));
    }

    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .footer {
      border-top: 1px solid var(--line);
      background: var(--panel);
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .footer-note { color: var(--muted); font-size: 12px; }
    .spacer { flex: 1; }
    .success { color: var(--ok); }
  </style>
</head>
<body>
  <!-- App shell: top bar, tabs, editors, preview, footer. -->
  <div class="app">
    <!-- Header: import button + tab navigation. -->
    <div class="topbar">
      <div class="title-wrap">
        <strong>vectorshader</strong>
      </div>
      <div class="actions">
        <input id="svgFileInput" type="file" accept=".svg,image/svg+xml" hidden />
        <button id="importBtn" class="primary" type="button">Import SVG</button>
        <button class="nav-btn" data-tab="settings" role="tab" aria-selected="false" type="button">Settings</button>
        <button class="nav-btn active" data-tab="svg-code" role="tab" aria-selected="true" type="button">SVG Code</button>
        <button class="nav-btn" data-tab="svg-preview" role="tab" aria-selected="false" type="button">SVG Preview</button>
        <button class="nav-btn" data-tab="shader-code" role="tab" aria-selected="false" type="button">Shader Code</button>
      </div>
    </div>

    <!-- Status line for compile/import feedback. -->
    <div id="status" class="status">Ready. Import or paste an SVG.</div>

    <!-- Main panels: settings, SVG source, preview, generated shader. -->
    <div class="panels">
      <section class="panel" data-panel="settings" role="tabpanel">
        <!-- Placeholder controls: UI-only for now; not yet wired into the compiler pipeline. -->
        <div class="panel-row">
          <span>Settings (skeleton): these options will drive shader generation.</span>
        </div>
        <div class="editor" style="grid-template-columns: 1fr;">
          <div style="padding:16px;display:grid;gap:12px;color:var(--muted);">
            <label>Anti-alias width
              <input type="range" min="0" max="4" step="0.1" value="1.0" />
            </label>
            <label>Curve simplification
              <select>
                <option>Conservative</option>
                <option>Balanced</option>
                <option>Aggressive</option>
              </select>
            </label>
            <label>
              <input type="checkbox" checked />
              Enable debug comments in shader output
            </label>
          </div>
        </div>
      </section>

      <section class="panel active" data-panel="svg-code" role="tabpanel">
        <!-- Raw SVG source editor. This is the real compiler input. -->
        <div class="panel-row">
          <span>Paste or edit SVG source (line numbers + word wrap enabled).</span>
        </div>
        <div class="editor">
          <pre id="svgGutter" class="gutter">1</pre>
          <textarea id="svgCode" wrap="soft" spellcheck="false" placeholder="Paste SVG markup here..."></textarea>
        </div>
      </section>

      <section class="panel" data-panel="svg-preview" role="tabpanel">
        <!-- Browser-side visual sanity check of the current SVG source. -->
        <div class="panel-row">
          <span>Visual preview of the current SVG source.</span>
        </div>
        <div id="preview" class="preview">
          <span class="footer-note">No SVG loaded yet.</span>
        </div>
      </section>

      <section class="panel" data-panel="shader-code" role="tabpanel">
        <!-- Generated output panel: the compiler writes Godot shader text here. -->
        <div class="panel-row">
          <span>Generated Godot shader code output.</span>
          <button id="copyShaderBtn" type="button">Copy Shader</button>
        </div>
        <div class="editor">
          <pre id="shaderGutter" class="gutter">1</pre>
          <textarea id="shaderCode" wrap="soft" spellcheck="false" readonly></textarea>
        </div>
      </section>
    </div>

    <!-- Footer: utility actions that are not part of the compiler pipeline. -->
    <div class="footer">
      <span class="spacer"></span>
      <button id="copyLogsBtn" type="button">Copy Debug Logs</button>
    </div>
  </div>

  <script>



// ============================================================
// Script overview

// 5) Godot shader emitter
// 6) app wiring / preview / clipboard

<rect x="40" y="40" width="360" height="360" rx="18" fill="#e8ebef" stroke="#1f1f1f" stroke-width="2"/>

<path d="M 1335 1510 C 1310 1390, 1370 1310, 1455 1355 A 80 80 0 0 1 1525 1475" fill="none" stroke="url(#rg_multi)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

// Cached references to already-existing HTML elements.
// This is page plumbing, not SVG/shader logic.
const DOM = {
  svgFileInput: document.getElementById('svgFileInput'),
  importBtn: document.getElementById('importBtn'),
  status: document.getElementById('status'),
  tabs: [...document.querySelectorAll('.nav-btn')],
  panels: [...document.querySelectorAll('.panel')],
  svgCode: document.getElementById('svgCode'),
  svgGutter: document.getElementById('svgGutter'),
  shaderCode: document.getElementById('shaderCode'),
  shaderGutter: document.getElementById('shaderGutter'),
  preview: document.getElementById('preview'),
  copyShaderBtn: document.getElementById('copyShaderBtn'),
  copyLogsBtn: document.getElementById('copyLogsBtn')
};

// Mutable runtime state. These values change while the page is open.
const AppState = {
  debugLogs: [],
  preview: {
    scale: 1,
    tx: 0,
    ty: 0,
    dragging: false,
    pointerStartX: 0,
    pointerStartY: 0,
    originTx: 0,
    originTy: 0,
    content: null
  }
};

// Keep unrelated config in separate buckets so UI, debug, preview, and compiler
// concerns do not all collapse into one junk-drawer object.
const UiConfig = {
  tabOrder: ['settings', 'svg-code', 'svg-preview', 'shader-code']
};

const DebugConfig = {
  maxDebugLogs: 1500
};

const PreviewConfig = {
  minScale: 0.15,
  maxScale: 24
};

const CompilerConfig = {
  cubicApproxMinTolerance: 0.25,
  cubicApproxStrokeFactor: 0.2
};

// Debug helpers: append timestamped logs and update the status line.
const Debug = {
  log(message, data) {
    const stamp = new Date().toISOString();
    const line = `[${stamp}] ${message}${data ? ` ${JSON.stringify(data)}` : ''}`;
    AppState.debugLogs.push(line);
    if (AppState.debugLogs.length > DebugConfig.maxDebugLogs) AppState.debugLogs.shift();
    console.log('[vectorshader]', line);
  },

  setStatus(message, kind = 'normal') {
    DOM.status.textContent = message;
    DOM.status.classList.toggle('success', kind === 'success');
    this.log('status', { message, kind });
  }
};

// Tab navigation stays separate from editor bookkeeping.
const Tabs = {
  setActive(tabName) {
    for (const tab of DOM.tabs) {
      const active = tab.dataset.tab === tabName;
      tab.classList.toggle('active', active);
      tab.setAttribute('aria-selected', String(active));
    }
    for (const panel of DOM.panels) {
      panel.classList.toggle('active', panel.dataset.panel === tabName);
    }
    Debug.log('tab:changed', { tab: tabName });
  },

  move(delta) {
    const currentIndex = UiConfig.tabOrder.findIndex((name) => {
      const panel = DOM.panels.find((node) => node.dataset.panel === name);
      return panel && panel.classList.contains('active');
    });
    const nextIndex = Math.max(0, Math.min(UiConfig.tabOrder.length - 1, currentIndex + delta));
    if (nextIndex !== currentIndex) this.setActive(UiConfig.tabOrder[nextIndex]);
  }
};

// Textarea + gutter handling is repetitive enough to deserve one tiny helper.
const Editors = {
  svg: { textarea: DOM.svgCode, gutter: DOM.svgGutter },
  shader: { textarea: DOM.shaderCode, gutter: DOM.shaderGutter },

  sync(editor) {
    const lineCount = Math.max(1, editor.textarea.value.split('\n').length);
    let lines = '';
    for (let i = 1; i <= lineCount; i += 1) lines += `${i}\n`;
    editor.gutter.textContent = lines.trimEnd();
    editor.gutter.scrollTop = editor.textarea.scrollTop;
  },

  setValue(editor, value) {
    editor.textarea.value = value;
    this.sync(editor);
  },

  clear(editor) {
    this.setValue(editor, '');
  }
};

// Number parsing helpers for SVG attributes and style values.
const Numbers = {
  parse(value, fallback = 0) {
    if (value == null || value === '') return fallback;
    const n = Number.parseFloat(String(value));
    return Number.isFinite(n) ? n : fallback;
  },

  parseLength(value, fallback = 0) {
    if (value == null || value === '') return fallback;
    const n = Number.parseFloat(String(value).trim().replace(/px$/i, ''));
    return Number.isFinite(n) ? n : fallback;
  }
};

// Inline style parser for style="..." attributes.
const Styles = {
  parseInlineStyle(styleText) {
    const out = {};
    if (!styleText) return out;
    styleText.split(';').forEach((pair) => {
      const idx = pair.indexOf(':');
      if (idx < 0) return;
      const key = pair.slice(0, idx).trim();
      const value = pair.slice(idx + 1).trim();
      if (key) out[key] = value;
    });
    return out;
  }
};

// 2D affine matrix helpers for SVG transforms.
// SVG uses matrices [a c e; b d f; 0 0 1].
const Matrix2D = {
  identity() {
    return { a: 1, b: 0, c: 0, d: 1, e: 0, f: 0 };
  },

  multiply(m1, m2) {
    return {
      a: m1.a * m2.a + m1.c * m2.b,
      b: m1.b * m2.a + m1.d * m2.b,
      c: m1.a * m2.c + m1.c * m2.d,
      d: m1.b * m2.c + m1.d * m2.d,
      e: m1.a * m2.e + m1.c * m2.f + m1.e,
      f: m1.b * m2.e + m1.d * m2.f + m1.f
    };
  },

  apply(matrix, point) {
    return {
      x: matrix.a * point.x + matrix.c * point.y + matrix.e,
      y: matrix.b * point.x + matrix.d * point.y + matrix.f
    };
  },

  invert(matrix) {
    const det = matrix.a * matrix.d - matrix.b * matrix.c;
    if (Math.abs(det) < 1e-12) return this.identity();
    return {
      a: matrix.d / det,
      b: -matrix.b / det,
      c: -matrix.c / det,
      d: matrix.a / det,
      e: (matrix.c * matrix.f - matrix.d * matrix.e) / det,
      f: (matrix.b * matrix.e - matrix.a * matrix.f) / det
    };
  },

  scaleApprox(matrix) {
    const sx = Math.hypot(matrix.a, matrix.b);
    const sy = Math.hypot(matrix.c, matrix.d);
    const avg = (sx + sy) * 0.5;
    return Number.isFinite(avg) && avg > 0 ? avg : 1;
  },

  rotationApprox(matrix) {
    return Math.atan2(matrix.b, matrix.a);
  },

  isUniformScaleRotate(matrix, eps = 1e-4) {
    const sx = Math.hypot(matrix.a, matrix.b);
    const sy = Math.hypot(matrix.c, matrix.d);
    const dot = matrix.a * matrix.c + matrix.b * matrix.d;
    const ref = Math.max(1, sx, sy);
    return Math.abs(sx - sy) <= eps * ref && Math.abs(dot) <= eps * ref * ref;
  },

  parse(transformText) {
    // Parse an SVG transform list left-to-right and accumulate one affine matrix.
    if (!transformText || !transformText.trim()) return this.identity();
    const re = /([a-zA-Z]+)\s*\(([^)]*)\)/g;
    let match;
    let out = this.identity();
    while ((match = re.exec(transformText))) {
      const fn = match[1].toLowerCase();
      const nums = (match[2].match(/[-+]?(?:\d*\.\d+|\d+\.?)(?:[eE][-+]?\d+)?/g) || []).map(Number);
      let cur = this.identity();

      if (fn === 'matrix' && nums.length >= 6) {
        cur = { a: nums[0], b: nums[1], c: nums[2], d: nums[3], e: nums[4], f: nums[5] };
      } else if (fn === 'translate') {
        cur = { a: 1, b: 0, c: 0, d: 1, e: nums[0] || 0, f: nums[1] || 0 };
      } else if (fn === 'scale') {
        const sx = nums[0] == null ? 1 : nums[0];
        const sy = nums[1] == null ? sx : nums[1];
        cur = { a: sx, b: 0, c: 0, d: sy, e: 0, f: 0 };
      } else if (fn === 'rotate') {
        const ang = (nums[0] || 0) * Math.PI / 180;
        const cs = Math.cos(ang);
        const sn = Math.sin(ang);
        if (nums.length > 2) {
          const cx = nums[1];
          const cy = nums[2];
          cur = this.multiply(
            this.multiply(
              { a: 1, b: 0, c: 0, d: 1, e: cx, f: cy },
              { a: cs, b: sn, c: -sn, d: cs, e: 0, f: 0 }
            ),
            { a: 1, b: 0, c: 0, d: 1, e: -cx, f: -cy }
          );
        } else {
          cur = { a: cs, b: sn, c: -sn, d: cs, e: 0, f: 0 };
        }
      } else if (fn === 'skewx') {
        const ang = (nums[0] || 0) * Math.PI / 180;
        cur = { a: 1, b: 0, c: Math.tan(ang), d: 1, e: 0, f: 0 };
      } else if (fn === 'skewy') {
        const ang = (nums[0] || 0) * Math.PI / 180;
        cur = { a: 1, b: Math.tan(ang), c: 0, d: 1, e: 0, f: 0 };
      }

      out = this.multiply(out, cur);
    }
    return out;
  }
};

// Small vector math toolbox used by curve and arc code.
const Vec2 = {
  add(a, b) {
    return { x: a.x + b.x, y: a.y + b.y };
  },

  sub(a, b) {
    return { x: a.x - b.x, y: a.y - b.y };
  },

  scale(a, s) {
    return { x: a.x * s, y: a.y * s };
  },

  dot(a, b) {
    return a.x * b.x + a.y * b.y;
  },

  len(a) {
    return Math.hypot(a.x, a.y);
  },

  dist(a, b) {
    return this.len(this.sub(a, b));
  },

  lerp(a, b, t) {
    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
  },

  equals(a, b, eps = 1e-6) {
    return Math.abs(a.x - b.x) <= eps && Math.abs(a.y - b.y) <= eps;
  },

  cross(a, b) {
    return a.x * b.y - a.y * b.x;
  },

  pointLineDistance(p, a, b) {
    const ab = this.sub(b, a);
    const len = this.len(ab);
    if (len <= 1e-9) return this.dist(p, a);
    return Math.abs(this.cross(this.sub(p, a), ab)) / len;
  }
};

// Cubic-bezier helpers. Current scope approximates cubics with one or more quadratics.
const CubicApprox = {
  evalAt(p0, p1, p2, p3, t) {
    const mt = 1 - t;
    const mt2 = mt * mt;
    const t2 = t * t;
    return {
      x: mt2 * mt * p0.x + 3 * mt2 * t * p1.x + 3 * mt * t2 * p2.x + t2 * t * p3.x,
      y: mt2 * mt * p0.y + 3 * mt2 * t * p1.y + 3 * mt * t2 * p2.y + t2 * t * p3.y
    };
  },

  evalDerivAt(p0, p1, p2, p3, t) {
    const mt = 1 - t;
    const a = Vec2.scale(Vec2.sub(p1, p0), 3 * mt * mt);
    const b = Vec2.scale(Vec2.sub(p2, p1), 6 * mt * t);
    const c = Vec2.scale(Vec2.sub(p3, p2), 3 * t * t);
    return Vec2.add(Vec2.add(a, b), c);
  },

  splitIntoN(p0, p1, p2, p3, n) {
    const pieces = [];
    const dt = 1 / n;
    for (let i = 0; i < n; i += 1) {
      const t0 = i * dt;
      const t1 = (i + 1) * dt;
      const q0 = this.evalAt(p0, p1, p2, p3, t0);
      const q3 = this.evalAt(p0, p1, p2, p3, t1);
      const d0 = Vec2.scale(this.evalDerivAt(p0, p1, p2, p3, t0), dt / 3);
      const d1 = Vec2.scale(this.evalDerivAt(p0, p1, p2, p3, t1), dt / 3);
      pieces.push([q0, Vec2.add(q0, d0), Vec2.sub(q3, d1), q3]);
    }
    return pieces;
  },

  lineIntersect(a, b, c, d) {
    const ab = Vec2.sub(b, a);
    const cd = Vec2.sub(d, c);
    const cross = (u, v) => u.x * v.y - u.y * v.x;
    const den = cross(ab, cd);
    if (Math.abs(den) < 1e-9) return null;
    const t = cross(Vec2.sub(c, a), cd) / den;
    return Vec2.add(a, Vec2.scale(ab, t));
  },

  approxControl(t, p0, p1, p2, p3) {
    const p1a = Vec2.add(p0, Vec2.scale(Vec2.sub(p1, p0), 1.5));
    const p2a = Vec2.add(p3, Vec2.scale(Vec2.sub(p2, p3), 1.5));
    return Vec2.add(p1a, Vec2.scale(Vec2.sub(p2a, p1a), t));
  },

  farthestFitInside(p0, p1, p2, p3, tolerance) {
    if (Vec2.len(p2) <= tolerance && Vec2.len(p1) <= tolerance) return true;
    const mid = Vec2.scale(Vec2.add(Vec2.add(p0, Vec2.scale(Vec2.add(p1, p2), 3)), p3), 0.125);
    if (Vec2.len(mid) > tolerance) return false;
    const deriv3 = Vec2.scale(Vec2.add(Vec2.sub(Vec2.add(p3, p2), p1), Vec2.scale(p0, -1)), 0.125);
    return this.farthestFitInside(
      p0,
      Vec2.scale(Vec2.add(p0, p1), 0.5),
      Vec2.sub(mid, deriv3),
      mid,
      tolerance
    ) && this.farthestFitInside(
      mid,
      Vec2.add(mid, deriv3),
      Vec2.scale(Vec2.add(p2, p3), 0.5),
      p3,
      tolerance
    );
  },

  approxQuadratic(cubic, tolerance) {
    const [p0, p1, p2, p3] = cubic;
    const q1 = this.lineIntersect(p0, p1, p2, p3);
    if (!q1) return null;
    const c1 = Vec2.add(p0, Vec2.scale(Vec2.sub(q1, p0), 2 / 3));
    const c2 = Vec2.add(p3, Vec2.scale(Vec2.sub(q1, p3), 2 / 3));
    if (!this.farthestFitInside(
      { x: 0, y: 0 },
      Vec2.sub(c1, p1),
      Vec2.sub(c2, p2),
      { x: 0, y: 0 },
      tolerance
    )) {
      return null;
    }
    return [p0, q1, p3];
  },

  approxSpline(cubic, n, tolerance) {
    if (n === 1) {
      const one = this.approxQuadratic(cubic, tolerance);
      return one ? [one[0], one[1], one[2]] : null;
    }

    const cubics = this.splitIntoN(cubic[0], cubic[1], cubic[2], cubic[3], n);
    let nextCubic = cubics[0];
    let nextQ1 = this.approxControl(0, nextCubic[0], nextCubic[1], nextCubic[2], nextCubic[3]);
    let q2 = cubic[0];
    let d1 = { x: 0, y: 0 };
    const spline = [cubic[0], nextQ1];

    for (let i = 1; i <= n; i += 1) {
      const [c0, c1, c2, c3] = nextCubic;
      const q0 = q2;
      const q1 = nextQ1;

      if (i < n) {
        nextCubic = cubics[i];
        nextQ1 = this.approxControl(i / (n - 1), nextCubic[0], nextCubic[1], nextCubic[2], nextCubic[3]);
        spline.push(nextQ1);
        q2 = Vec2.scale(Vec2.add(q1, nextQ1), 0.5);
      } else {
        q2 = c3;
      }

      const d0 = d1;
      d1 = Vec2.sub(q2, c3);
      const ok = Vec2.len(d1) <= tolerance && this.farthestFitInside(
        d0,
        Vec2.sub(Vec2.add(q0, Vec2.scale(Vec2.sub(q1, q0), 2 / 3)), c1),
        Vec2.sub(Vec2.add(q2, Vec2.scale(Vec2.sub(q1, q2), 2 / 3)), c2),
        d1,
        tolerance
      );
      if (!ok) return null;
    }

    spline.push(cubic[3]);
    return spline;
  },

  splineToQuadraticSegments(spline) {
    const n = spline.length - 2;
    const quads = [];
    let start = spline[0];
    for (let i = 0; i < n; i += 1) {
      const ctrl = spline[i + 1];
      const end = i === n - 1 ? spline[n + 1] : Vec2.scale(Vec2.add(spline[i + 1], spline[i + 2]), 0.5);
      quads.push([start, ctrl, end]);
      start = end;
    }
    return quads;
  },

  toQuadraticSpline(cubic, tolerance, minN = 4, maxN = 10) {
    const startN = Math.max(1, Math.floor(minN));
    const endN = Math.max(startN, Math.floor(maxN));
    for (let n = startN; n <= endN; n += 1) {
      const spline = this.approxSpline(cubic, n, tolerance);
      if (spline) return this.splineToQuadraticSegments(spline);
    }
    return null;
  }
};

// SVG elliptical-arc helpers.
// Can flatten arcs to polylines and also recognize a narrow exact-arc fast path.
const SvgArc = {
  toPolyline(seg, maxStep = Math.PI / 12) {
    const { p0, p1 } = seg;
    let rx = Math.abs(seg.rx || 0);
    let ry = Math.abs(seg.ry || 0);
    const phi = (seg.rot || 0) * Math.PI / 180;
    if (rx < 1e-9 || ry < 1e-9 || Vec2.equals(p0, p1)) return [p0, p1];

    const cosPhi = Math.cos(phi);
    const sinPhi = Math.sin(phi);
    const dx2 = (p0.x - p1.x) * 0.5;
    const dy2 = (p0.y - p1.y) * 0.5;
    const x1p = cosPhi * dx2 + sinPhi * dy2;
    const y1p = -sinPhi * dx2 + cosPhi * dy2;
    const lambda = (x1p * x1p) / (rx * rx) + (y1p * y1p) / (ry * ry);
    if (lambda > 1) {
      const s = Math.sqrt(lambda);
      rx *= s;
      ry *= s;
    }

    const sign = (seg.largeArc === seg.sweep) ? -1 : 1;
    const num = rx * rx * ry * ry - rx * rx * y1p * y1p - ry * ry * x1p * x1p;
    const den = rx * rx * y1p * y1p + ry * ry * x1p * x1p;
    const cc = sign * Math.sqrt(Math.max(0, num / Math.max(den, 1e-12)));
    const cxp = cc * (rx * y1p) / ry;
    const cyp = cc * -(ry * x1p) / rx;
    const cx = cosPhi * cxp - sinPhi * cyp + (p0.x + p1.x) * 0.5;
    const cy = sinPhi * cxp + cosPhi * cyp + (p0.y + p1.y) * 0.5;

    const angle = (ux, uy, vx, vy) => {
      const d = ux * vx + uy * vy;
      const l = Math.max(1e-12, Math.hypot(ux, uy) * Math.hypot(vx, vy));
      const a = Math.acos(Math.max(-1, Math.min(1, d / l)));
      return (ux * vy - uy * vx) < 0 ? -a : a;
    };

    const ux = (x1p - cxp) / rx;
    const uy = (y1p - cyp) / ry;
    const vx = (-x1p - cxp) / rx;
    const vy = (-y1p - cyp) / ry;
    const theta1 = angle(1, 0, ux, uy);
    let delta = angle(ux, uy, vx, vy);
    if (!seg.sweep && delta > 0) delta -= Math.PI * 2;
    if (seg.sweep && delta < 0) delta += Math.PI * 2;

    const steps = Math.max(2, Math.ceil(Math.abs(delta) / maxStep));
    const pts = [];
    for (let i = 0; i <= steps; i += 1) {
      const t = theta1 + delta * (i / steps);
      const ct = Math.cos(t);
      const st = Math.sin(t);
      pts.push({
        x: cosPhi * rx * ct - sinPhi * ry * st + cx,
        y: sinPhi * rx * ct + cosPhi * ry * st + cy
      });
    }
    return pts;
  },

  toCenterParams(seg) {
    const { p0, p1 } = seg;
    let rx = Math.abs(seg.rx || 0);
    let ry = Math.abs(seg.ry || 0);
    const phi = (seg.rot || 0) * Math.PI / 180;
    if (rx < 1e-9 || ry < 1e-9 || Vec2.equals(p0, p1)) return null;

    const cosPhi = Math.cos(phi);
    const sinPhi = Math.sin(phi);
    const dx2 = (p0.x - p1.x) * 0.5;
    const dy2 = (p0.y - p1.y) * 0.5;
    const x1p = cosPhi * dx2 + sinPhi * dy2;
    const y1p = -sinPhi * dx2 + cosPhi * dy2;
    const lambda = (x1p * x1p) / (rx * rx) + (y1p * y1p) / (ry * ry);
    if (lambda > 1) {
      const s = Math.sqrt(lambda);
      rx *= s;
      ry *= s;
    }

    const sign = (seg.largeArc === seg.sweep) ? -1 : 1;
    const num = rx * rx * ry * ry - rx * rx * y1p * y1p - ry * ry * x1p * x1p;
    const den = rx * rx * y1p * y1p + ry * ry * x1p * x1p;
    const cc = sign * Math.sqrt(Math.max(0, num / Math.max(den, 1e-12)));
    const cxp = cc * (rx * y1p) / ry;
    const cyp = cc * -(ry * x1p) / rx;
    const cx = cosPhi * cxp - sinPhi * cyp + (p0.x + p1.x) * 0.5;
    const cy = sinPhi * cxp + cosPhi * cyp + (p0.y + p1.y) * 0.5;

    const angle = (ux, uy, vx, vy) => {
      const d = ux * vx + uy * vy;
      const l = Math.max(1e-12, Math.hypot(ux, uy) * Math.hypot(vx, vy));
      const a = Math.acos(Math.max(-1, Math.min(1, d / l)));
      return (ux * vy - uy * vx) < 0 ? -a : a;
    };

    const ux = (x1p - cxp) / rx;
    const uy = (y1p - cyp) / ry;
    const vx = (-x1p - cxp) / rx;
    const vy = (-y1p - cyp) / ry;
    const theta1 = angle(1, 0, ux, uy);
    let delta = angle(ux, uy, vx, vy);
    if (!seg.sweep && delta > 0) delta -= Math.PI * 2;
    if (seg.sweep && delta < 0) delta += Math.PI * 2;

    return { cx, cy, rx, ry, phi, theta1, delta };
  }
};

// Parse SVG path data (d=...) into subpaths and typed segments.
// This is still frontend work: decode source syntax into geometry pieces.
const PathParser = {
  tokenize(d) {
    const tokens = [];
    const re = /([AaCcHhLlMmQqSsTtVvZz])|([-+]?(?:\d*\.\d+|\d+\.?)(?:[eE][-+]?\d+)?)/g;
    let match;
    while ((match = re.exec(d)) !== null) tokens.push(match[1] ?? match[2]);
    return tokens;
  },

  segmentEnd(seg) {
    if (seg.type === 'line') return seg.p1;
    if (seg.type === 'quad') return seg.p2;
    if (seg.type === 'cubic') return seg.p3;
    if (seg.type === 'arc') return seg.p1;
    return seg.p1 || seg.p0;
  },

  parseSubpaths(pathData) {
    // Convert path command text into an array of subpaths.
    // Each subpath owns typed segments: line / quad / cubic / arc.
    const tokens = this.tokenize(pathData || '');
    let i = 0;
    let cmd = '';
    let current = { x: 0, y: 0 };
    let subStart = { x: 0, y: 0 };
    let lastQuadControl = null;
    let lastCubicControl = null;
    const subpaths = [];
    let activeSubpath = null;

    const hasMore = () => i < tokens.length;
    const peek = () => tokens[i];
    const next = () => tokens[i++];
    const isCommand = (token) => /^[A-Za-z]$/.test(token);
    const readNum = () => Number.parseFloat(next());
    const readPoint = (relative) => {
      const x = readNum();
      const y = readNum();
      return relative ? { x: current.x + x, y: current.y + y } : { x, y };
    };
    const ensureSubpath = () => {
      if (!activeSubpath) {
        activeSubpath = { start: { ...current }, segments: [], explicitClosed: false };
        subpaths.push(activeSubpath);
      }
    };

    while (hasMore()) {
      if (isCommand(peek())) cmd = next();
      if (!cmd) throw new Error('Path data is missing an initial command.');
      const relative = cmd === cmd.toLowerCase();

      switch (cmd.toLowerCase()) {
        case 'm': {
          const p = readPoint(relative);
          current = p;
          subStart = p;
          activeSubpath = { start: { ...subStart }, segments: [], explicitClosed: false };
          subpaths.push(activeSubpath);
          lastQuadControl = null;
          lastCubicControl = null;
          cmd = relative ? 'l' : 'L';
          while (hasMore() && !isCommand(peek())) {
            const p2 = readPoint(cmd === 'l');
            activeSubpath.segments.push({ type: 'line', p0: { ...current }, p1: { ...p2 } });
            current = p2;
          }
          break;
        }

        case 'l':
          ensureSubpath();
          while (hasMore() && !isCommand(peek())) {
            const p = readPoint(relative);
            activeSubpath.segments.push({ type: 'line', p0: { ...current }, p1: { ...p } });
            current = p;
          }
          lastQuadControl = null;
          lastCubicControl = null;
          break;

        case 'h':
          ensureSubpath();
          while (hasMore() && !isCommand(peek())) {
            const x = readNum();
            const p = { x: relative ? current.x + x : x, y: current.y };
            activeSubpath.segments.push({ type: 'line', p0: { ...current }, p1: { ...p } });
            current = p;
          }
          lastQuadControl = null;
          lastCubicControl = null;
          break;

        case 'v':
          ensureSubpath();
          while (hasMore() && !isCommand(peek())) {
            const y = readNum();
            const p = { x: current.x, y: relative ? current.y + y : y };
            activeSubpath.segments.push({ type: 'line', p0: { ...current }, p1: { ...p } });
            current = p;
          }
          lastQuadControl = null;
          lastCubicControl = null;
          break;

        case 'q':
          ensureSubpath();
          while (hasMore() && !isCommand(peek())) {
            const c = readPoint(relative);
            const p = readPoint(relative);
            activeSubpath.segments.push({ type: 'quad', p0: { ...current }, p1: { ...c }, p2: { ...p } });
            current = p;
            lastQuadControl = c;
            lastCubicControl = null;
          }
          break;

        case 't':
          ensureSubpath();
          while (hasMore() && !isCommand(peek())) {
            const c = lastQuadControl
              ? { x: current.x * 2 - lastQuadControl.x, y: current.y * 2 - lastQuadControl.y }
              : { ...current };
            const p = readPoint(relative);
            activeSubpath.segments.push({ type: 'quad', p0: { ...current }, p1: { ...c }, p2: { ...p } });
            current = p;
            lastQuadControl = c;
            lastCubicControl = null;
          }
          break;

        case 'c':
          ensureSubpath();
          while (hasMore() && !isCommand(peek())) {
            const c1 = readPoint(relative);
            const c2 = readPoint(relative);
            const p = readPoint(relative);
            activeSubpath.segments.push({ type: 'cubic', p0: { ...current }, p1: { ...c1 }, p2: { ...c2 }, p3: { ...p } });
            current = p;
            lastCubicControl = c2;
            lastQuadControl = null;
          }
          break;

        case 's':
          ensureSubpath();
          while (hasMore() && !isCommand(peek())) {
            const c1 = lastCubicControl
              ? { x: current.x * 2 - lastCubicControl.x, y: current.y * 2 - lastCubicControl.y }
              : { ...current };
            const c2 = readPoint(relative);
            const p = readPoint(relative);
            activeSubpath.segments.push({ type: 'cubic', p0: { ...current }, p1: c1, p2: { ...c2 }, p3: { ...p } });
            current = p;
            lastCubicControl = c2;
            lastQuadControl = null;
          }
          break;

        case 'a':
          ensureSubpath();
          while (hasMore() && !isCommand(peek())) {
            const rx = readNum();
            const ry = readNum();
            const rot = readNum();
            const largeArc = !!readNum();
            const sweep = !!readNum();
            const p = readPoint(relative);
            activeSubpath.segments.push({
              type: 'arc',
              p0: { ...current },
              p1: { ...p },
              rx, ry, rot, largeArc, sweep
            });
            current = p;
            lastQuadControl = null;
            lastCubicControl = null;
          }
          break;

        case 'z':
          ensureSubpath();
          if (!Vec2.equals(current, subStart)) {
            activeSubpath.segments.push({ type: 'line', p0: { ...current }, p1: { ...subStart }, close: true });
          } else if (activeSubpath.segments.length) {
            activeSubpath.segments[activeSubpath.segments.length - 1].close = true;
          }
          activeSubpath.explicitClosed = true;
          current = { ...subStart };
          lastQuadControl = null;
          lastCubicControl = null;
          break;

        default:
          throw new Error(`Unsupported path command: ${cmd}`);
      }
    }

    return subpaths.filter((subpath) => subpath.segments.length > 0);
  },

  normalizeSubpaths(subpaths) {
    return subpaths.map((subpath) => {
      const strokeSegments = subpath.segments.map((seg) => ({ ...seg }));
      const fillSegments = subpath.segments.map((seg) => ({ ...seg }));
      const start = subpath.start;
      const end = this.segmentEnd(subpath.segments[subpath.segments.length - 1]);
      const needsImplicitClose = !subpath.explicitClosed && !Vec2.equals(start, end);

      if (needsImplicitClose) {
        fillSegments.push({
          type: 'line',
          p0: { ...end },
          p1: { ...start },
          implicit_fill_close: true
        });
      }

      return {
        start,
        explicitClosed: subpath.explicitClosed,

const DefsRegistry = {

      if (tag === 'use') {
        const href = this.getHref(node);
        if (!href || stack.has(href)) return;
        const target = DefsRegistry.resolveNode(defs, href, doc);
        if (!target || target === node) return;
        const x = Numbers.parseLength(node.getAttribute('x'), 0);
        const y = Numbers.parseLength(node.getAttribute('y'), 0);
        const usePlacement = Matrix2D.multiply(
          Matrix2D.parse(node.getAttribute?.('transform') || ''),
          { a: 1, b: 0, c: 0, d: 1, e: x, f: y }
        );
        const baseUseMatrix = Matrix2D.multiply(parentMatrix, usePlacement);
        const ownClipEntry = this.readClipPathEntry(node, baseUseMatrix, defs, doc);
        const activeClipStack = ownClipEntry ? inheritedSymbolClips.concat([ownClipEntry]) : inheritedSymbolClips;
        const targetTag = target.tagName ? target.tagName.toLowerCase() : '';
        const useInfo = targetTag === 'symbol' ? DefsRegistry.computeSymbolUseInfo(node, target) : null;
        const targetMatrix = targetTag === 'symbol'
          ? Matrix2D.multiply(baseUseMatrix, useInfo.matrix)
          : baseUseMatrix;
        const nextSymbolClips = (targetTag === 'symbol' && Number.isFinite(useInfo.viewportWidth) && useInfo.viewportWidth > 0 && Number.isFinite(useInfo.viewportHeight) && useInfo.viewportHeight > 0)
          ? activeClipStack.concat([{ kind: 'rect', inv: Matrix2D.invert(baseUseMatrix), width: useInfo.viewportWidth, height: useInfo.viewportHeight }])
          : activeClipStack;
        const nextStack = new Set(stack);
        nextStack.add(href);
        walk(target, targetMatrix, paint, hidden, nextStack, true, nextSymbolClips);
        return;
      }

      const ownClipEntry = this.readClipPathEntry(node, matrix, defs, doc);
      const activeClipStack = ownClipEntry ? inheritedSymbolClips.concat([ownClipEntry]) : inheritedSymbolClips;

      if (this.isSupportedTag(tag)) {
        const shape = this.parseShapeNode({ node, tag, matrix, paint, id: sourceShapes.length + 1, clipStack: activeClipStack });
        sourceShapes.push(shape);
      }

      for (const child of node.children || []) {
        walk(child, matrix, paint, hidden, stack, fromUse, activeClipStack);
      }
    };

    walk(svg, Matrix2D.identity(), null, false);

    return {
      stage: 'scene_frontend',
      sourceLength: svgText.length,
      viewBox,
      defs,
      gradients,
      shapeCount: sourceShapes.length,
      shapes: sourceShapes
    };
  },

  isSupportedTag(tag) {
    return ['path', 'rect', 'circle', 'ellipse', 'line', 'polyline', 'polygon'].includes(tag);
  },

  isNonRenderedContainer(tag) {
    return ['defs', 'clippath', 'mask', 'pattern', 'symbol', 'marker', 'lineargradient', 'radialgradient', 'filter'].includes(tag);
  },

  isUseUnsupportedContainer(tag) {
    return ['defs', 'clippath', 'mask', 'pattern', 'marker', 'lineargradient', 'radialgradient', 'filter'].includes(tag);
  },

  getHref(node) {
    const raw = node?.getAttribute?.('href') || node?.getAttribute?.('xlink:href') || '';
    return raw && raw[0] === '#' ? raw.slice(1) : null;
  },

  readNodeViewBox(node) {
    const vbAttr = node?.getAttribute?.('viewBox');
    if (!vbAttr) return null;
    const vb = vbAttr.trim().split(/[\s,]+/).map(Number.parseFloat);
    if (vb.length === 4 && vb.every(Number.isFinite) && vb[2] > 0 && vb[3] > 0) {
      return { x: vb[0], y: vb[1], width: vb[2], height: vb[3] };
    }
    return null;
  },

  readPreserveAspectRatio(node) {
    const raw = String(node?.getAttribute?.('preserveAspectRatio') || '').trim();
    if (!raw) return { align: 'xMidYMid', meetOrSlice: 'meet' };
    const parts = raw.split(/\s+/).filter(Boolean);
    const first = parts[0] || 'xMidYMid';
    if (first.toLowerCase() === 'none') return { align: 'none', meetOrSlice: 'none' };
    const second = (parts[1] || 'meet').toLowerCase();
    return { align: first, meetOrSlice: second === 'slice' ? 'slice' : 'meet' };
  },

  computeViewBoxMatrix(viewBox, viewportWidth, viewportHeight, par) {
    if (!viewBox || !(viewportWidth > 0) || !(viewportHeight > 0)) return Matrix2D.identity();
    const sx = viewportWidth / viewBox.width;
    const sy = viewportHeight / viewBox.height;
    if (par.align === 'none' || par.meetOrSlice === 'none') {
      return { a: sx, b: 0, c: 0, d: sy, e: -viewBox.x * sx, f: -viewBox.y * sy };
    }
    const s = par.meetOrSlice === 'slice' ? Math.max(sx, sy) : Math.min(sx, sy);
    const contentWidth = viewBox.width * s;
    const contentHeight = viewBox.height * s;
    let ax = 0;
    let ay = 0;
    const align = par.align || 'xMidYMid';
    if (align.includes('xMid')) ax = 0.5 * (viewportWidth - contentWidth);
    else if (align.includes('xMax')) ax = viewportWidth - contentWidth;
    if (align.includes('YMid')) ay = 0.5 * (viewportHeight - contentHeight);
    else if (align.includes('YMax')) ay = viewportHeight - contentHeight;
    return {
      a: s, b: 0, c: 0, d: s,
      e: ax - viewBox.x * s,
      f: ay - viewBox.y * s
    };
  },

  computeSymbolUseMatrix(useNode, symbolNode) {
    const vb = this.readNodeViewBox(symbolNode);
    if (!vb) return Matrix2D.identity();
    const useWidthAttr = useNode.getAttribute('width');
    const useHeightAttr = useNode.getAttribute('height');
    const symbolWidthAttr = symbolNode.getAttribute('width');
    const symbolHeightAttr = symbolNode.getAttribute('height');

    const useWidth = Numbers.parseLength(useWidthAttr, NaN);
    const useHeight = Numbers.parseLength(useHeightAttr, NaN);
    const symbolWidth = Numbers.parseLength(symbolWidthAttr, NaN);
    const symbolHeight = Numbers.parseLength(symbolHeightAttr, NaN);

    const rootSvg = symbolNode.ownerSVGElement || symbolNode.ownerDocument?.documentElement || null;
    const rootViewport = rootSvg ? (this.readNodeViewBox(rootSvg) || { x: 0, y: 0, width: vb.width, height: vb.height }) : { x: 0, y: 0, width: vb.width, height: vb.height };

    let viewportWidth = (Number.isFinite(useWidth) && useWidth > 0) ? useWidth : NaN;
    let viewportHeight = (Number.isFinite(useHeight) && useHeight > 0) ? useHeight : NaN;

    if (!(viewportWidth > 0)) {
      viewportWidth = (Number.isFinite(symbolWidth) && symbolWidth > 0) ? symbolWidth : rootViewport.width;
    }
    if (!(viewportHeight > 0)) {
      viewportHeight = (Number.isFinite(symbolHeight) && symbolHeight > 0) ? symbolHeight : rootViewport.height;
    }

    if (!(viewportWidth > 0) || !(viewportHeight > 0)) return Matrix2D.identity();
    const par = this.readPreserveAspectRatio(symbolNode);
    return this.computeViewBoxMatrix(vb, viewportWidth, viewportHeight, par);
  },

  isHiddenNode(node) {
    if (!node || !node.getAttribute) return false;
    const style = Styles.parseInlineStyle(node.getAttribute('style'));
    const display = String(node.getAttribute('display') ?? style.display ?? '').trim().toLowerCase();
    const visibility = String(node.getAttribute('visibility') ?? style.visibility ?? '').trim().toLowerCase();
    return display === 'none' || visibility === 'hidden' || visibility === 'collapse';
  },

  readViewBox(svg) {
    const vbAttr = svg.getAttribute('viewBox');
    if (vbAttr) {
      const vb = vbAttr.trim().split(/[\s,]+/).map(Number.parseFloat);
      if (vb.length === 4 && vb.every(Number.isFinite)) {
        return { x: vb[0], y: vb[1], width: vb[2], height: vb[3] };
      }
    }

    return {
      x: 0,
      y: 0,
      width: Numbers.parseLength(svg.getAttribute('width'), 1024),
      height: Numbers.parseLength(svg.getAttribute('height'), 1024)
    };
  },

  readSodipodiArc(node) {
    if (node.getAttribute('sodipodi:type') !== 'arc') return null;
    const cx = Numbers.parse(node.getAttribute('sodipodi:cx'), NaN);
    const cy = Numbers.parse(node.getAttribute('sodipodi:cy'), NaN);
    const rx = Numbers.parse(node.getAttribute('sodipodi:rx'), NaN);
    const ry = Numbers.parse(node.getAttribute('sodipodi:ry'), NaN);
    const start = Numbers.parse(node.getAttribute('sodipodi:start'), NaN);
    const end = Numbers.parse(node.getAttribute('sodipodi:end'), NaN);
    const arcType = String(node.getAttribute('sodipodi:arc-type') || (node.getAttribute('sodipodi:open') === 'true' ? 'arc' : 'chord')).toLowerCase();
    if (![cx, cy, rx, ry, start, end].every(Number.isFinite)) return null;
    return {
      cx,
      cy,
      rx,
      ry,
      start,
      end,
      arcType: arcType === 'slice' ? 'slice' : (arcType === 'chord' ? 'chord' : 'arc')
    };
  },

  readSodipodiStar(node) {
    if (node.getAttribute('sodipodi:type') !== 'star') return null;
    const cx = Numbers.parse(node.getAttribute('sodipodi:cx'), NaN);
    const cy = Numbers.parse(node.getAttribute('sodipodi:cy'), NaN);
    const sides = Math.round(Numbers.parse(node.getAttribute('sodipodi:sides'), NaN));
    const r1 = Numbers.parse(node.getAttribute('sodipodi:r1'), NaN);
    const r2 = Numbers.parse(node.getAttribute('sodipodi:r2'), NaN);
    const arg1 = Numbers.parse(node.getAttribute('sodipodi:arg1'), NaN);
    const arg2 = Numbers.parse(node.getAttribute('sodipodi:arg2'), NaN);
    const flatsided = String(node.getAttribute('inkscape:flatsided') || '').toLowerCase() === 'true';
    const rounded = Numbers.parse(node.getAttribute('inkscape:rounded'), 0);
    const randomized = Numbers.parse(node.getAttribute('inkscape:randomized'), 0);
    if (![cx, cy, sides, r1, arg1].every(Number.isFinite)) return null;
    if (!(sides >= 3 && r1 > 0)) return null;
    if (!flatsided && (![r2, arg2].every(Number.isFinite) || !(r2 > 0))) return null;
    return {
      cx,
      cy,
      sides,
      r1,
      r2: Number.isFinite(r2) ? r2 : 0,
      arg1,
      arg2: Number.isFinite(arg2) ? arg2 : 0,
      flatsided,
      rounded,
      randomized
    };
  },


  readClipPathId(node) {
    const style = Styles.parseInlineStyle(node?.getAttribute?.('style'));
    const raw = style['clip-path'] ?? node?.getAttribute?.('clip-path') ?? '';
    const m = String(raw || '').trim().match(/^url\(\s*['"]?#([^'")]+)['"]?\s*\)$/i);
    return m ? m[1] : null;
  },

  buildClipPaint(node, inheritedPaint = null) {
    const raw = Paint.read(node, inheritedPaint);
    return {
      ...raw,
      fill: '#000000',
      fillOpacity: 1,
      opacity: 1,
      stroke: 'none',
      strokeOpacity: 0,
      strokeWidth: 0
    };
  },

  collectClipSourceShapes(clipNode, baseMatrix, defs, doc, useStack = null) {
    const out = [];
    const stack = useStack || new Set();
    const clipBaseMatrix = Matrix2D.multiply(baseMatrix, Matrix2D.parse(clipNode?.getAttribute?.('transform') || ''));

    const walkClip = (node, parentMatrix = clipBaseMatrix, inheritedPaint = null) => {
      const tag = node.tagName ? node.tagName.toLowerCase() : '';
      if (this.isHiddenNode(node)) return;

      if (tag === 'use') {
        const href = this.getHref(node);
        if (!href || stack.has(href)) return;
        const target = DefsRegistry.resolveNode(defs, href, doc);
        if (!target || target === node) return;
        const x = Numbers.parseLength(node.getAttribute('x'), 0);
        const y = Numbers.parseLength(node.getAttribute('y'), 0);
        const usePlacement = Matrix2D.multiply(
          Matrix2D.parse(node.getAttribute?.('transform') || ''),
          { a: 1, b: 0, c: 0, d: 1, e: x, f: y }
        );
        const baseUseMatrix = Matrix2D.multiply(parentMatrix, usePlacement);
        const targetTag = target.tagName ? target.tagName.toLowerCase() : '';
        const nextStack = new Set(stack);
        nextStack.add(href);
        if (targetTag === 'symbol') {
          const useInfo = DefsRegistry.computeSymbolUseInfo(node, target);
          const targetMatrix = Matrix2D.multiply(baseUseMatrix, useInfo.matrix);
          for (const child of target.children || []) walkClip(child, targetMatrix, inheritedPaint);
        } else {
          walkClip(target, baseUseMatrix, inheritedPaint);
        }
        return;
      }

      if (this.isNonRenderedContainer(tag)) {
        for (const child of node.children || []) walkClip(child, parentMatrix, inheritedPaint);
        return;
      }

      const nodeMatrix = Matrix2D.multiply(parentMatrix, Matrix2D.parse(node.getAttribute?.('transform') || ''));
      const paint = this.buildClipPaint(node, inheritedPaint);

      if (this.isSupportedTag(tag)) {
        const shape = this.parseShapeNode({ node, tag, matrix: nodeMatrix, paint, id: -(out.length + 1), clipStack: [] });
        out.push(shape);
      }

      for (const child of node.children || []) walkClip(child, nodeMatrix, paint);
    };

    for (const child of clipNode.children || []) walkClip(child, clipBaseMatrix, null);
    return out;
  },

  readClipPathEntry(node, matrix, defs, doc) {
    const clipId = this.readClipPathId(node);
    if (!clipId) return null;
    const res = DefsRegistry.resolveResource(defs, clipId, ['clipPath'], doc);
    if (!res || !res.node) return null;
    const units = String(res.node.getAttribute('clipPathUnits') || 'userSpaceOnUse').trim();
    if (units !== 'userSpaceOnUse') return null;
    const sourceShapes = this.collectClipSourceShapes(res.node, matrix, defs, doc);
    if (!sourceShapes.length) return null;
    return { kind: 'clipPath', units, sourceShapes };
  },

  parseShapeNode({ node, tag, matrix, paint, id, clipStack }) {
    const base = { id, tag, paint, matrix, symbolClipStack: Array.isArray(clipStack) && clipStack.length ? clipStack.map((c) => ({ ...c })) : [] };

    if (tag === 'path') {
      const d = node.getAttribute('d') || '';
      const rawSubpaths = PathParser.parseSubpaths(d);
      const normalizedSubpaths = PathParser.normalizeSubpaths(rawSubpaths);
      return {
        ...base,
        geometry: {
          kind: 'path',
          d,
          rawSubpaths,
          normalizedSubpaths,
          arcMeta: this.readSodipodiArc(node),
          starMeta: this.readSodipodiStar(node)
        }
      };
    }

    if (tag === 'line') {
      return {
        ...base,
        geometry: {
          kind: 'line',
          a: { x: Numbers.parse(node.getAttribute('x1'), 0), y: Numbers.parse(node.getAttribute('y1'), 0) },
          b: { x: Numbers.parse(node.getAttribute('x2'), 0), y: Numbers.parse(node.getAttribute('y2'), 0) }
        }
      };
    }

    if (tag === 'polyline' || tag === 'polygon') {
      const nums = ((node.getAttribute('points') || '').match(/[-+]?(?:\d*\.\d+|\d+\.?)(?:[eE][-+]?\d+)?/g) || []).map(Number.parseFloat);
      const points = [];
      for (let i = 0; i + 1 < nums.length; i += 2) points.push({ x: nums[i], y: nums[i + 1] });

      const subpath = { start: points[0] || { x: 0, y: 0 }, segments: [], explicitClosed: tag === 'polygon' };
      for (let i = 0; i + 1 < points.length; i += 1) {
        subpath.segments.push({ type: 'line', p0: points[i], p1: points[i + 1] });
      }
      if (tag === 'polygon' && points.length > 2 && !Vec2.equals(points[0], points[points.length - 1])) {
        subpath.segments.push({ type: 'line', p0: points[points.length - 1], p1: points[0], close: true });
      }

      return {
        ...base,
        geometry: {
          kind: 'polyline',
          closed: tag === 'polygon',
          points,
          rawSubpaths: subpath.segments.length ? [subpath] : [],
          normalizedSubpaths: subpath.segments.length ? PathParser.normalizeSubpaths([subpath]) : []
        }
      };
    }

    if (tag === 'rect') {
      const x = Numbers.parse(node.getAttribute('x'), 0);
      const y = Numbers.parse(node.getAttribute('y'), 0);
      const width = Numbers.parse(node.getAttribute('width'), 0);
      const height = Numbers.parse(node.getAttribute('height'), 0);
      const rxAttr = node.getAttribute('rx');
      const ryAttr = node.getAttribute('ry');
      let rx = rxAttr == null ? Number.NaN : Numbers.parse(rxAttr, Number.NaN);
      let ry = ryAttr == null ? Number.NaN : Numbers.parse(ryAttr, Number.NaN);

      if (!Number.isFinite(rx) && !Number.isFinite(ry)) {
        rx = 0;
        ry = 0;
      } else if (!Number.isFinite(rx)) {
        rx = ry;
      } else if (!Number.isFinite(ry)) {
        ry = rx;
      }

      return {
        ...base,
        geometry: {
          kind: 'rect',
          x, y, width, height,
          rx: Math.max(0, rx),
          ry: Math.max(0, ry)
        }
      };
    }

    if (tag === 'circle') {
      const r = Math.max(0, Numbers.parse(node.getAttribute('r'), 0));
      return {
        ...base,
        geometry: {
          kind: 'ellipse',
          cx: Numbers.parse(node.getAttribute('cx'), 0),
          cy: Numbers.parse(node.getAttribute('cy'), 0),
          rx: r,
          ry: r
        }
      };
    }

    if (tag === 'ellipse') {
      return {
        ...base,
        geometry: {
          kind: 'ellipse',
          cx: Numbers.parse(node.getAttribute('cx'), 0),
          cy: Numbers.parse(node.getAttribute('cy'), 0),
          rx: Math.max(0, Numbers.parse(node.getAttribute('rx'), 0)),
          ry: Math.max(0, Numbers.parse(node.getAttribute('ry'), 0))
        }
      };
    }

    return {
      ...base,
      geometry: {
        kind: 'unknown',
        attributes: Object.fromEntries([...node.attributes].map((attr) => [attr.name, attr.value]))
      }
    };
  }
};

// Middle stage: scene model -> render model.
// This is where shapes are mapped onto the current supported drawing backends.
const RenderPrep = {
  buildRenderModel(scene, options = CompilerConfig) {
    // Take the neutral scene and prepare only the renderable forms the current emitter understands.
    const renderShapes = scene.shapes.map((sourceShape) => this.prepareShape(sourceShape, options));
    return {
      stage: 'render_prep',
      sourceLength: scene.sourceLength,
      viewBox: scene.viewBox,
      gradients: scene.gradients || {},
      sourceShapeCount: scene.shapeCount,
      renderShapeCount: renderShapes.length,
      shapes: renderShapes
    };
  },


  prepareClipStack(sourceClipStack, options = CompilerConfig) {
    if (!Array.isArray(sourceClipStack) || !sourceClipStack.length) return [];
    const out = [];
    for (const entry of sourceClipStack) {
      if (!entry) continue;
      if (entry.kind === 'rect') {
        out.push({ kind: 'rect', inv: entry.inv || Matrix2D.identity(), width: entry.width || 0, height: entry.height || 0 });
        continue;
      }
      if (entry.kind === 'clipPath') {
        const items = [];
        for (const sourceShape of entry.sourceShapes || []) {
          const prepared = this.prepareShape({ ...sourceShape, symbolClipStack: [] }, options);
          const item = this.clipItemFromPrepared(prepared);
          if (item) items.push(item);
        }
        if (items.length) out.push({ kind: 'clipPath', items });
      }
    }
    return out;
  },

  clipItemFromPrepared(shape) {
    if (!shape?.render) return null;
    if (shape.render.kind === 'local-rect') {
      return { kind: 'rect-shape', cx: shape.render.cx, cy: shape.render.cy, halfX: shape.render.halfX, halfY: shape.render.halfY, rx: shape.render.rx || 0, ry: shape.render.ry || 0, inv: shape.render.inv };
    }
    if (shape.render.kind === 'local-ellipse') {
      return { kind: 'ellipse', cx: shape.render.cx, cy: shape.render.cy, rx: shape.render.rx, ry: shape.render.ry, inv: shape.render.inv };
    }
    if (shape.render.kind === 'world-path-primitives') {
      const fills = Array.isArray(shape.render.fills) ? shape.render.fills : [];
      if (fills.length) return { kind: 'path-fills', fills, fillRule: shape.paint?.fillRule || 'nonzero' };
    }
    return null;
  },

  prepareShape(sourceShape, options = CompilerConfig) {
    // Normalize one source shape into the current render backend representation.
    const base = {
      id: sourceShape.id,
      tag: sourceShape.tag,
      paint: sourceShape.paint,
      matrix: sourceShape.matrix,
      source: sourceShape.geometry,
      symbolClipStack: this.prepareClipStack(sourceShape.symbolClipStack || [], options),
      strokeScale: Matrix2D.scaleApprox(sourceShape.matrix),
      bounds: this.computeWorldBounds(sourceShape),
      render: null
    };

    switch (sourceShape.geometry.kind) {
      case 'path':
        return this.preparePath(base, options);
      case 'line':
        return this.prepareLine(base, options);
      case 'polyline':
        return this.preparePolyline(base, options);
      case 'rect':
        return this.prepareRect(base, options);
      case 'ellipse':
        return this.prepareEllipse(base, options);
      default:
        return base;
    }
  },


  computeWorldBounds(sourceShape) {
    const points = this.collectWorldBoundsPoints(sourceShape);
    if (!points.length) return { x: 0, y: 0, width: 1, height: 1 };

    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of points) {
      if (!p || !Number.isFinite(p.x) || !Number.isFinite(p.y)) continue;
      minX = Math.min(minX, p.x);
      minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x);
      maxY = Math.max(maxY, p.y);
    }

    if (![minX, minY, maxX, maxY].every(Number.isFinite)) return { x: 0, y: 0, width: 1, height: 1 };
    const width = Math.max(maxX - minX, 1e-6);
    const height = Math.max(maxY - minY, 1e-6);
    return { x: minX, y: minY, width, height };
  },

  collectWorldBoundsPoints(sourceShape) {
    const matrix = sourceShape.matrix || Matrix2D.identity();
    const add = (out, p) => {
      if (!p) return;
      out.push(Matrix2D.apply(matrix, p));
    };
    const pts = [];
    const g = sourceShape.geometry;

    if (g.kind === 'line') {
      add(pts, g.a);
      add(pts, g.b);
      return pts;
    }

    if (g.kind === 'polyline') {
      for (const p of g.points || []) add(pts, p);
      return pts;
    }

    if (g.kind === 'rect') {
      const x0 = g.x;
      const y0 = g.y;
      const x1 = g.x + g.width;
      const y1 = g.y + g.height;
      add(pts, { x: x0, y: y0 });
      add(pts, { x: x1, y: y0 });
      add(pts, { x: x1, y: y1 });
      add(pts, { x: x0, y: y1 });
      return pts;
    }

    if (g.kind === 'ellipse') {
      add(pts, { x: g.cx - g.rx, y: g.cy });
      add(pts, { x: g.cx + g.rx, y: g.cy });
      add(pts, { x: g.cx, y: g.cy - g.ry });
      add(pts, { x: g.cx, y: g.cy + g.ry });
      return pts;
    }

    if (g.kind === 'path') {
      for (const subpath of g.rawSubpaths || []) {
        add(pts, subpath.start);
        for (const seg of subpath.segments || []) {
          add(pts, seg.p0);
          add(pts, seg.p1);
          if (seg.p2) add(pts, seg.p2);
          if (seg.p3) add(pts, seg.p3);
          if (seg.type === 'arc') {
            const arc = SvgArc.toCenterParams(seg);
            if (arc) {
              add(pts, { x: arc.cx + arc.rx, y: arc.cy });
              add(pts, { x: arc.cx - arc.rx, y: arc.cy });
              add(pts, { x: arc.cx, y: arc.cy + arc.ry });
              add(pts, { x: arc.cx, y: arc.cy - arc.ry });
            }
          }
        }
      }
      return pts;
    }

    return pts;
  },

  extractExactArcChainFromSubpath(rawSubpath) {
    const segs = rawSubpath?.segments || [];
    if (!segs.length) return null;
    if (segs.some((seg) => seg.type !== 'arc' && seg.type !== 'line')) return null;

    const arcIndices = segs
      .map((seg, index) => (seg.type === 'arc' ? index : -1))
      .filter((index) => index >= 0);
    if (!arcIndices.length) return null;
    if (arcIndices[arcIndices.length - 1] - arcIndices[0] + 1 !== arcIndices.length) return null;

    const runStart = arcIndices[0];
    const runEnd = arcIndices[arcIndices.length - 1];
    const arcSegs = segs.slice(runStart, runEnd + 1);

    const first = SvgArc.toCenterParams(arcSegs[0]);
    if (!first) return null;
    let totalDelta = 0;
    let prevEnd = arcSegs[0].p0;
    for (const seg of arcSegs) {
      if (!Vec2.equals(seg.p0, prevEnd, 1e-4)) return null;
      const arc = SvgArc.toCenterParams(seg);
      if (!arc) return null;
      if (
        Math.abs(arc.cx - first.cx) > 1e-3 ||
        Math.abs(arc.cy - first.cy) > 1e-3 ||
        Math.abs(arc.rx - first.rx) > 1e-3 ||
        Math.abs(arc.ry - first.ry) > 1e-3 ||
        Math.abs(arc.phi - first.phi) > 1e-4
      ) {
        return null;
      }
      totalDelta += arc.delta;
      prevEnd = seg.p1;
    }

    return {
      cx: first.cx,
      cy: first.cy,
      rx: first.rx,
      ry: first.ry,
      phi: first.phi,
      startAngle: first.theta1,
      totalDelta,
      startPoint: { ...arcSegs[0].p0 },
      endPoint: { ...arcSegs[arcSegs.length - 1].p1 },
      arcCount: arcSegs.length,
      runStart,
      runEnd
    };
  },

  inferExactArcFillKind(rawSubpath, chain, arcMeta = null) {
    const segs = rawSubpath?.segments || [];
    const endpointTol = Math.max(1e-3, chain.rx * 0.01);
    const centerTol = Math.max(endpointTol * 2, chain.rx * 0.03);
    const pointNear = (a, b, eps = endpointTol) => Vec2.equals(a, b, eps);
    const nonArcLines = segs
      .filter((seg, index) => (index < chain.runStart || index > chain.runEnd) && seg.type === 'line')
      .filter((seg) => Vec2.dist(seg.p0, seg.p1) > endpointTol);

    const nearStart = (p) => pointNear(p, chain.startPoint);
    const nearEnd = (p) => pointNear(p, chain.endPoint);
    const nearCenter = (p) => pointNear(p, { x: chain.cx, y: chain.cy }, centerTol);
    const isChord = (seg) => (nearStart(seg.p0) && nearEnd(seg.p1)) || (nearStart(seg.p1) && nearEnd(seg.p0));

    let topoKind = null;
    if (nonArcLines.length === 0) topoKind = 'cutdisk';
    else if (nonArcLines.length === 1 && isChord(nonArcLines[0])) topoKind = 'cutdisk';
    else if (nonArcLines.length === 2) {
      const [a, b] = nonArcLines;
      const sharedPairs = [
        [a.p0, a.p1, b.p0, b.p1],
        [a.p0, a.p1, b.p1, b.p0],
        [a.p1, a.p0, b.p0, b.p1],
        [a.p1, a.p0, b.p1, b.p0]
      ];
      for (const [jointA, outerA, jointB, outerB] of sharedPairs) {
        if (!pointNear(jointA, jointB, centerTol)) continue;
        const joint = Vec2.lerp(jointA, jointB, 0.5);
        if (!nearCenter(joint)) continue;
        const touchesStartEnd =
          (nearStart(outerA) && nearEnd(outerB)) ||
          (nearEnd(outerA) && nearStart(outerB));
        if (touchesStartEnd) {
          topoKind = 'pie';
          break;
        }
      }
    }

    // Topology is mandatory. Metadata may only confirm the same render class.
    if (!topoKind) return null;
    if (!arcMeta) return topoKind;

    const metaKind = arcMeta.arcType === 'slice' ? 'pie' :
      (arcMeta.arcType === 'arc' || arcMeta.arcType === 'chord') ? 'cutdisk' : null;
    if (!metaKind) return null;
    return metaKind === topoKind ? topoKind : null;
  },

  prepareExactArcFills(shape) {
    const { matrix, source } = shape;
    if (!Matrix2D.isUniformScaleRotate(matrix)) return [];

    const arcScale = Matrix2D.scaleApprox(matrix);
    const arcRot = Matrix2D.rotationApprox(matrix);
    const fills = [];

    source.rawSubpaths.forEach((rawSubpath, subpathIndex) => {
      const chain = this.extractExactArcChainFromSubpath(rawSubpath);
      if (!chain) return;
      if (Math.abs(chain.rx - chain.ry) > 1e-4) return;

      const arcMeta = (source.arcMeta && source.rawSubpaths.length === 1 && subpathIndex === 0) ? source.arcMeta : null;
      const fillKind = this.inferExactArcFillKind(rawSubpath, chain, arcMeta);
      if (!fillKind) return;

      fills.push({
        kind: 'arc-fill',
        fillKind,
        center: Matrix2D.apply(matrix, { x: chain.cx, y: chain.cy }),
        radius: chain.rx * arcScale,
        halfAperture: Math.abs(chain.totalDelta) * 0.5,
        midAngle: chain.startAngle + chain.totalDelta * 0.5 + arcRot
      });
    });

    return fills;
  },

  detectFullEllipseArcPath(shape) {
    const source = shape?.source;
    const arcMeta = source?.arcMeta;
    if (!arcMeta || (source?.rawSubpaths || []).length !== 1) return null;
    const segs = source?.rawSubpaths?.[0]?.segments || [];
    if (!segs.length || segs.some((seg) => seg.type !== 'arc')) return null;
    const span = arcMeta.end - arcMeta.start;
    const wrapped = Math.atan2(Math.sin(span), Math.cos(span));
    if (Math.abs(wrapped) > 1e-4) return null;
    return {
      cx: arcMeta.cx,
      cy: arcMeta.cy,
      rx: Math.max(0, arcMeta.rx),
      ry: Math.max(0, arcMeta.ry)
    };
  },

  simplifyStraightQuad(seg) {
    const tol = Math.max(1e-5, Vec2.dist(seg.p0, seg.p2) * 1e-4);
    if (Vec2.pointLineDistance(seg.p1, seg.p0, seg.p2) > tol) return null;
    return { a: { x: seg.p0.x, y: seg.p0.y }, b: { x: seg.p2.x, y: seg.p2.y } };
  },

  simplifyStraightCubic(seg) {
    const tol = Math.max(1e-5, Vec2.dist(seg.p0, seg.p3) * 1e-4);
    if (Vec2.pointLineDistance(seg.p1, seg.p0, seg.p3) > tol) return null;
    if (Vec2.pointLineDistance(seg.p2, seg.p0, seg.p3) > tol) return null;
    return { a: { x: seg.p0.x, y: seg.p0.y }, b: { x: seg.p3.x, y: seg.p3.y } };
  },

  simplifySingleStrokeSegmentToLine(seg) {
    if (!seg) return null;
    if (seg.type === 'line') {
      return { a: { x: seg.p0.x, y: seg.p0.y }, b: { x: seg.p1.x, y: seg.p1.y } };
    }
    if (seg.type === 'quad') return this.simplifyStraightQuad(seg);
    if (seg.type === 'cubic') return this.simplifyStraightCubic(seg);
    if (seg.type === 'arc') {
      if (Math.abs(seg.rx) <= 1e-6 || Math.abs(seg.ry) <= 1e-6) {
        return { a: { x: seg.p0.x, y: seg.p0.y }, b: { x: seg.p1.x, y: seg.p1.y } };
      }
    }
    return null;
  },

  detectSingleSegmentPath(shape) {
    const rawSubpaths = shape?.source?.rawSubpaths || [];
    if (rawSubpaths.length !== 1) return null;
    const rawSubpath = rawSubpaths[0];
    if (!rawSubpath || rawSubpath.explicitClosed) return null;

    const normSubpaths = shape?.source?.normalizedSubpaths || [];
    if (normSubpaths.length !== 1) return null;
    const norm = normSubpaths[0];
    const segs = norm?.strokeSegments || [];
    if (segs.length !== 1) return null;

    return this.simplifySingleStrokeSegmentToLine(segs[0]);
  },

  detectAxisAlignedRectPath(shape) {
    const rawSubpaths = shape?.source?.rawSubpaths || [];
    if (rawSubpaths.length !== 1) return null;
    const subpath = rawSubpaths[0];
    const segs = subpath?.segments || [];
    if (segs.length !== 4) return null;
    if (!subpath.explicitClosed) return null;
    if (segs.some((seg) => seg.type !== 'line')) return null;

    const tol = 1e-4;
    const axisAligned = (seg) => Math.abs(seg.p0.x - seg.p1.x) <= tol || Math.abs(seg.p0.y - seg.p1.y) <= tol;
    if (segs.some((seg) => !axisAligned(seg))) return null;

    const points = [];
    const pushUnique = (p) => {
      if (!points.some((q) => Vec2.equals(p, q, tol))) points.push({ x: p.x, y: p.y });
    };
    segs.forEach((seg) => {
      pushUnique(seg.p0);
      pushUnique(seg.p1);
    });
    if (points.length !== 4) return null;

    const xs = points.map((p) => p.x);
    const ys = points.map((p) => p.y);
    const minX = Math.min(...xs);
    const maxX = Math.max(...xs);
    const minY = Math.min(...ys);
    const maxY = Math.max(...ys);
    if (!(maxX - minX > tol && maxY - minY > tol)) return null;

    const corners = [
      { x: minX, y: minY },
      { x: maxX, y: minY },
      { x: maxX, y: maxY },
      { x: minX, y: maxY }
    ];
    const isCorner = (p) => corners.some((c) => Vec2.equals(p, c, tol));
    if (points.some((p) => !isCorner(p))) return null;
    if (segs.some((seg) => !isCorner(seg.p0) || !isCorner(seg.p1))) return null;

    return {
      cx: (minX + maxX) * 0.5,
      cy: (minY + maxY) * 0.5,
      halfX: (maxX - minX) * 0.5,
      halfY: (maxY - minY) * 0.5
    };
  },

  wrapAngle(a) {
    let out = Number(a) || 0;
    while (out <= -Math.PI) out += Math.PI * 2;
    while (out > Math.PI) out -= Math.PI * 2;
    return out;
  },

  computeSodipodiStarBounds(meta) {
    const pts = [];
    const n = Math.max(3, Math.round(meta.sides || 0));
    const outer = Math.max(0, Number(meta.r1 || 0));
    if (meta.flatsided) {
      for (let i = 0; i < n; i += 1) {
        const a = Number(meta.arg1 || 0) + (Math.PI * 2 * i) / n;
        pts.push({ x: Number(meta.cx || 0) + outer * Math.cos(a), y: Number(meta.cy || 0) + outer * Math.sin(a) });
      }
    } else {
      const inner = Math.max(0, Number(meta.r2 || 0));
      for (let i = 0; i < n; i += 1) {
        const ao = Number(meta.arg1 || 0) + (Math.PI * 2 * i) / n;
        const ai = Number(meta.arg2 || 0) + (Math.PI * 2 * i) / n;
        pts.push({ x: Number(meta.cx || 0) + outer * Math.cos(ao), y: Number(meta.cy || 0) + outer * Math.sin(ao) });
        pts.push({ x: Number(meta.cx || 0) + inner * Math.cos(ai), y: Number(meta.cy || 0) + inner * Math.sin(ai) });
      }
    }
    if (!pts.length) return { x: Number(meta.cx || 0), y: Number(meta.cy || 0), width: 0, height: 0 };
    let minX = pts[0].x, minY = pts[0].y, maxX = pts[0].x, maxY = pts[0].y;
    for (let i = 1; i < pts.length; i += 1) {
      const p = pts[i];
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    }
    return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
  },

  detectSodipodiRegularStarFill(shape) {
    const meta = shape?.source?.starMeta;
    if (!meta) return null;
    if ((shape?.source?.rawSubpaths || []).length !== 1) return null;
    if (Math.abs(Number(meta.rounded || 0)) > 1e-6) return null;
    if (Math.abs(Number(meta.randomized || 0)) > 1e-6) return null;
    const sides = Math.round(Number(meta.sides || 0));
    if (!(sides >= 3)) return null;

    let m = 2.0;
    if (!meta.flatsided) {
      const outer = Math.max(0, Number(meta.r1 || 0));
      const inner = Math.max(0, Number(meta.r2 || 0));
      if (!(outer > 0 && inner > 0 && inner < outer)) return null;
      const an = Math.PI / sides;
      const q = inner / outer;
      const den = Math.cos(an) - q;
      const en = Math.atan2(Math.sin(an), den);
      if (!(en > 1e-6)) return null;
      m = Math.PI / en;
      if (!(m >= 2.0 - 1e-4 && m <= sides + 1e-4)) return null;
      const expected = an;
      const delta = Math.abs(this.wrapAngle(Number(meta.arg2 || 0) - Number(meta.arg1 || 0)));
      if (Math.abs(delta - expected) > 5e-3) return null;
    }

    return {
      kind: 'star-fill',
      cx: Number(meta.cx || 0),
      cy: Number(meta.cy || 0),
      radius: Math.max(0, Number(meta.r1 || 0)),
      sides,
      m,
      rotation: (Math.PI * 0.5) - Number(meta.arg1 || 0),
      inv: Matrix2D.invert(shape.matrix),
      bounds: this.computeSodipodiStarBounds(meta)
    };
  },

  computePointsBounds(points) {
    if (!Array.isArray(points) || !points.length) return { x: 0, y: 0, width: 0, height: 0 };
    let minX = points[0].x, minY = points[0].y, maxX = points[0].x, maxY = points[0].y;
    for (let i = 1; i < points.length; i += 1) {
      const p = points[i];
      if (!p || !Number.isFinite(p.x) || !Number.isFinite(p.y)) continue;
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    }
    return { x: minX, y: minY, width: Math.max(0, maxX - minX), height: Math.max(0, maxY - minY) };
  },

  collectLineOnlyContoursForFill(shape) {
    const rawSubpaths = shape?.source?.rawSubpaths || [];
    if (!rawSubpaths.length) return null;
    const tol = 1e-4;
    const contours = [];

    for (const subpath of rawSubpaths) {
      const segs = subpath?.segments || [];
      if (!segs.length) continue;
      if (segs.some((seg) => seg.type !== 'line')) return null;
      // Lone line segments must never produce fill geometry; they are stroke-only.
      if (segs.length < 2) continue;

      const vertices = [{ x: segs[0].p0.x, y: segs[0].p0.y }];
      let cursor = segs[0].p0;
      for (let i = 0; i < segs.length; i += 1) {
        const seg = segs[i];
        if (!Vec2.equals(seg.p0, cursor, tol)) return null;
        if (Vec2.dist(seg.p0, seg.p1) <= tol) return null;
        vertices.push({ x: seg.p1.x, y: seg.p1.y });
        cursor = seg.p1;
      }

      const fillClosed = !!subpath.explicitClosed || Vec2.equals(vertices[vertices.length - 1], vertices[0], tol);
      if (fillClosed) vertices.pop();
      if (vertices.length < 3) continue;
      if (Vec2.dist(vertices[vertices.length - 1], vertices[0]) <= tol) continue;

      const bounds = this.computePointsBounds(vertices);
      if (!bounds || bounds.width <= tol || bounds.height <= tol) continue;
      contours.push(vertices);
    }

    return contours.length ? contours : null;
  },

  collectLineOnlyPathVerticesForFill(shape) {
    const contours = this.collectLineOnlyContoursForFill(shape);
    if (!contours || contours.length !== 1) return null;
    const vertices = contours[0];
    if (!vertices || vertices.length < 3) return null;

    const tol = 1e-4;
    for (let i = 0; i < vertices.length; i += 1) {
      for (let j = i + 1; j < vertices.length; j += 1) {
        const adjacent = Math.abs(i - j) === 1 || (i === 0 && j === vertices.length - 1);
        if (!adjacent && Vec2.equals(vertices[i], vertices[j], tol)) return null;
      }
    }
    return vertices;
  },

  signedArea(points) {
    let area = 0;
    for (let i = 0; i < points.length; i += 1) {
      const a = points[i];
      const b = points[(i + 1) % points.length];
      area += a.x * b.y - b.x * a.y;
    }
    return area * 0.5;
  },

  unwrapAnglesWithOrientation(angles, orientation) {
    const out = [angles[0]];
    for (let i = 1; i < angles.length; i += 1) {
      let a = angles[i];
      if (orientation >= 0) {
        while (a <= out[i - 1]) a += Math.PI * 2;
      } else {
        while (a >= out[i - 1]) a -= Math.PI * 2;
      }
      out.push(a);
    }
    return out;
  },

  edgeLengths(points) {
    const out = [];
    for (let i = 0; i < points.length; i += 1) out.push(Vec2.dist(points[i], points[(i + 1) % points.length]));
    return out;
  },

  approxAll(values, target, tol) {
    return values.every((v) => Math.abs(v - target) <= tol);
  },

  detectRegularLineStarPolygonFill(shape) {
    const vertices = this.collectLineOnlyPathVerticesForFill(shape);
    if (!vertices) return null;

    const cx = vertices.reduce((acc, p) => acc + p.x, 0) / vertices.length;
    const cy = vertices.reduce((acc, p) => acc + p.y, 0) / vertices.length;
    const center = { x: cx, y: cy };
    const radii = vertices.map((p) => Vec2.dist(p, center));
    const minRadius = Math.min(...radii);
    const maxRadius = Math.max(...radii);
    if (!(maxRadius > 1e-4)) return null;

    const angles = vertices.map((p) => Math.atan2(p.y - cy, p.x - cx));
    const orientation = this.signedArea(vertices) >= 0 ? 1 : -1;
    const unwrapped = this.unwrapAnglesWithOrientation(angles, orientation);
    const edges = this.edgeLengths(vertices);

    const polygonRadius = radii.reduce((a, b) => a + b, 0) / radii.length;
    const polygonRadiusTol = Math.max(1e-3, polygonRadius * 0.015);
    const polygonStep = orientation * (Math.PI * 2 / vertices.length);
    const polygonStepTol = Math.max(2e-2, Math.abs(polygonStep) * 0.03);
    const polygonEdge = edges.reduce((a, b) => a + b, 0) / edges.length;
    const polygonEdgeTol = Math.max(1e-3, polygonEdge * 0.02);

    if (this.approxAll(radii, polygonRadius, polygonRadiusTol)) {
      let polygonOk = true;
      for (let i = 1; i < unwrapped.length; i += 1) {
        if (Math.abs((unwrapped[i] - unwrapped[i - 1]) - polygonStep) > polygonStepTol) { polygonOk = false; break; }
      }
      const wrapStep = (unwrapped[0] + orientation * Math.PI * 2) - unwrapped[unwrapped.length - 1];
      if (polygonOk && Math.abs(wrapStep - polygonStep) <= polygonStepTol && this.approxAll(edges, polygonEdge, polygonEdgeTol)) {
        return {
          kind: 'star-fill',
          cx, cy,
          radius: polygonRadius,
          sides: vertices.length,
          m: 2.0,
          rotation: (Math.PI * 0.5) - angles[0],
          inv: Matrix2D.invert(shape.matrix),
          bounds: this.computePointsBounds(vertices)
        };
      }
    }

    if (vertices.length % 2 !== 0 || vertices.length < 6) return null;
    const sides = vertices.length / 2;
    const starStep = orientation * (Math.PI / sides);
    const starStepTol = Math.max(2e-2, Math.abs(starStep) * 0.04);
    for (const outerParity of [0, 1]) {
      const outerRadii = radii.filter((_, idx) => idx % 2 === outerParity);
      const innerRadii = radii.filter((_, idx) => idx % 2 !== outerParity);
      const outer = outerRadii.reduce((a, b) => a + b, 0) / outerRadii.length;
      const inner = innerRadii.reduce((a, b) => a + b, 0) / innerRadii.length;
      if (!(outer > inner && inner > 1e-4)) continue;
      if (outer - inner <= outer * 0.05) continue;
      const outerTol = Math.max(1e-3, outer * 0.02);
      const innerTol = Math.max(1e-3, inner * 0.02);
      if (!this.approxAll(outerRadii, outer, outerTol)) continue;
      if (!this.approxAll(innerRadii, inner, innerTol)) continue;

      let stepOk = true;
      for (let i = 1; i < unwrapped.length; i += 1) {
        if (Math.abs((unwrapped[i] - unwrapped[i - 1]) - starStep) > starStepTol) { stepOk = false; break; }
      }
      const wrapStep = (unwrapped[0] + orientation * Math.PI * 2) - unwrapped[unwrapped.length - 1];
      if (!stepOk || Math.abs(wrapStep - starStep) > starStepTol) continue;

      const starEdge = edges.reduce((a, b) => a + b, 0) / edges.length;
      const starEdgeTol = Math.max(1e-3, starEdge * 0.025);
      if (!this.approxAll(edges, starEdge, starEdgeTol)) continue;

      const an = Math.PI / sides;
      const q = inner / outer;
      const den = Math.cos(an) - q;
      const en = Math.atan2(Math.sin(an), den);
      if (!(en > 1e-6)) continue;
      const m = Math.PI / en;
      if (!(m >= 2.0 - 1e-4 && m <= sides + 1e-4)) continue;

      const firstOuterAngle = angles[outerParity];
      return {
        kind: 'star-fill',
        cx, cy,
        radius: outer,
        sides,
        m,
        rotation: (Math.PI * 0.5) - firstOuterAngle,
        inv: Matrix2D.invert(shape.matrix),
        bounds: this.computePointsBounds(vertices)
      };
    }

    return null;
  },

  sampleQuadraticPoints(p0, p1, p2, steps = 12) {
    const pts = [];
    const n = Math.max(2, steps | 0);
    for (let i = 0; i <= n; i += 1) {
      const t = i / n;
      const u = 1 - t;
      pts.push({
        x: u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x,
        y: u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y
      });
    }
    return pts;
  },

  sampleCubicPoints(p0, p1, p2, p3, steps = 16) {
    const pts = [];
    const n = Math.max(3, steps | 0);
    for (let i = 0; i <= n; i += 1) {
      const t = i / n;
      const u = 1 - t;
      pts.push({
        x: u * u * u * p0.x + 3 * u * u * t * p1.x + 3 * u * t * t * p2.x + t * t * t * p3.x,
        y: u * u * u * p0.y + 3 * u * u * t * p1.y + 3 * u * t * t * p2.y + t * t * t * p3.y
      });
    }
    return pts;
  },

  computeFillTolerance(shape) {
    const stroke = Paint.resolveStrokePaint(shape?.paint, shape?.gradients || new Map());
    const strokeWidth = Numbers.parse(shape?.paint?.strokeWidth ?? 0, 0);
    if (!(stroke && strokeWidth > 0)) return 0.6;
    return Math.max(0.75, Math.min(4.0, strokeWidth * 0.35));
  },

  computeFillBoundaryTolerance(shape) {
    const stroke = Paint.resolveStrokePaint(shape?.paint, shape?.gradients || new Map());
    const strokeWidth = Numbers.parse(shape?.paint?.strokeWidth ?? 0, 0);
    if (!(stroke && strokeWidth > 0)) return 0.18;
    return Math.max(0.18, Math.min(1.0, strokeWidth * 0.15));
  },

  splitQuadratic(p0, p1, p2) {
    const p01 = Vec2.lerp(p0, p1, 0.5);
    const p12 = Vec2.lerp(p1, p2, 0.5);
    const p012 = Vec2.lerp(p01, p12, 0.5);
    return [
      { p0, p1: p01, p2: p012 },
      { p0: p012, p1: p12, p2 }
    ];
  },

  splitQuadraticAt(p0, p1, p2, t) {
    const tt = Math.max(0, Math.min(1, t));
    if (tt <= 1e-9 || tt >= 1.0 - 1e-9) return [
      { p0: { ...p0 }, p1: { ...p1 }, p2: { ...p2 } }
    ];
    const p01 = Vec2.lerp(p0, p1, tt);
    const p12 = Vec2.lerp(p1, p2, tt);
