<body>
  <div class="app">
    <aside class="sidebar">
      <div class="card stack"><h2>Settings</h2><button id="importBtn" class="big-action">Import SVG</button><input id="fileInput" type="file" accept=".svg,image/svg+xml" /><p id="status" class="hint">Waiting for SVG.</p><label>Page fit<select id="fitMode"><option value="fit">Shrink to fit</option><option value="stretch">Stretch to fit</option><option value="fill">Scale to fill</option></select></label><label>Cubic handling<select id="cubicMode"><option value="quadratic">Approximate cubics by quadratics</option><option value="flatten">Flatten cubics to lines</option></select></label><label>Arc handling<select id="arcMode"><option value="quadratic">Approximate arcs by quadratics</option><option value="flatten">Flatten arcs</option></select></label><label>Cubic steps<input id="cubicSteps" type="number" min="2" max="256" step="1" value="16" /></label><label>Arc steps<input id="arcSteps" type="number" min="2" max="256" step="1" value="16" /></label><label>Fill flatten steps<input id="quadSteps" type="number" min="2" max="256" step="1" value="12" /></label><label>Fill rule<select id="fillRule"><option value="evenodd">evenodd</option><option value="nonzero">nonzero</option></select></label><label>AA strength<div class="row" style="align-items:center;gap:10px"><input id="aaStrength" type="range" min="0" max="100" step="1" value="100" style="flex:1" /><span id="aaStrengthLabel" class="pill">100%</span></div></label><label>Grid tile size<input id="gridTileSize" type="number" min="4" max="128" step="4" value="16" /></label></div>

        <div class="card stack"><div class="preview-toolbar"><h2 style="margin:0">SVG preview</h2><div class="row"><label style="flex-direction:row;align-items:center;gap:8px;font-weight:600"><input id="gridAccel" type="checkbox" style="width:auto" /> Grid acceleration (flat art)</label><label style="min-width:220px">Grid acceptance<select id="gridAcceptance"><option value="green">Green only (strict)</option><option value="yellow">Green + Yellow</option><option value="orange" selected>Green + Yellow + Orange</option></select></label><label style="min-width:220px">Grid overlay opacity<div class="row" style="align-items:center;gap:10px"><input id="gridOverlayOpacity" type="range" min="0" max="100" step="1" value="100" style="flex:1" /><span id="gridOverlayOpacityLabel" class="pill">100%</span></div></label><label style="flex-direction:row;align-items:center;gap:8px;font-weight:600"><input id="showTopologyOverlay" type="checkbox" style="width:auto" /> Show topology overlay</label><label style="flex-direction:row;align-items:center;gap:8px;font-weight:600"><input id="showClipOverlay" type="checkbox" style="width:auto" /> Show clip overlay</label><label style="min-width:220px">Pipeline debug mode<select id="pipelineDebugMode"><option value="normal">Normal preview</option><option value="clip_mask_only">Clip mask only</option><option value="clip_inside_only">Clip inside only</option><option value="clip_edge_only">Clip edge only</option></select></label><button id="copyPipelineReportBtn" class="secondary compact">Copy pipeline report</button><label style="flex-direction:row;align-items:center;gap:8px;font-weight:600"><input id="showClipMaskPreview" type="checkbox" style="width:auto" /> Show clip mask preview</label><button id="zoomOutBtn" class="secondary icon">−</button><button id="fitPreviewBtn" class="secondary">Fit</button><button id="resetPreviewBtn" class="secondary">100%</button><button id="zoomInBtn" class="secondary icon">+</button><span id="zoomLabel" class="pill">100%</span></div></div><div class="preview-shell"><div id="previewViewport" class="preview-viewport"><div id="previewStage" class="preview-stage"></div></div><div class="row" id="summaryRow"></div><pre id="topologyReport" style="margin:10px 0 0; padding:12px; min-height:96px; max-height:260px; overflow:auto; white-space:pre-wrap; font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; border:1px solid rgba(255,255,255,.08); border-radius:14px; background:rgba(255,255,255,.03); color:var(--muted)"></pre></div></div>
      </div>

    </main>
  </div>
  <script>
    const DEMO_SVG = `<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220"><defs><linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f172a"/><stop offset="50%" stop-color="#2563eb"/><stop offset="100%" stop-color="#93c5fd"/></linearGradient><radialGradient id="sun" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff7cc"/><stop offset="100%" stop-color="#f59e0b"/></radialGradient></defs><rect x="10" y="10" width="300" height="200" rx="22" fill="url(#sky)" stroke="#dbeafe" stroke-width="6"/><path d="M 34 175 A 70 70 0 0 1 140 85 L 140 175 Z" fill="#16a34a" stroke="#14532d" stroke-width="5"/><path d="M 156 175 C 180 120, 228 120, 252 175" fill="none" stroke="#f8fafc" stroke-width="10"/><circle cx="236" cy="64" r="26" fill="url(#sun)" stroke="#7c2d12" stroke-width="4"/></svg>`;

    const state={svgText:'',parsed:null,generated:'',runToken:0};
    const el={fileInput:document.getElementById('fileInput'),svgInput:document.getElementById('svgInput'),importBtn:document.getElementById('importBtn'),status:document.getElementById('status'),previewViewport:document.getElementById('previewViewport'),previewStage:document.getElementById('previewStage'),summaryRow:document.getElementById('summaryRow'),topologyReport:document.getElementById('topologyReport'),fitPreviewBtn:document.getElementById('fitPreviewBtn'),resetPreviewBtn:document.getElementById('resetPreviewBtn'),zoomInBtn:document.getElementById('zoomInBtn'),zoomOutBtn:document.getElementById('zoomOutBtn'),zoomLabel:document.getElementById('zoomLabel'),editorGutter:document.getElementById('editorGutter'),optimizeSvgBtn:document.getElementById('optimizeSvgBtn'),prettifySvgBtn:document.getElementById('prettifySvgBtn'),copySvgBtn:document.getElementById('copySvgBtn'),downloadSvgBtn:document.getElementById('downloadSvgBtn'),clearEditorBtn:document.getElementById('clearEditorBtn'),fitMode:document.getElementById('fitMode'),cubicMode:document.getElementById('cubicMode'),arcMode:document.getElementById('arcMode'),cubicSteps:document.getElementById('cubicSteps'),arcSteps:document.getElementById('arcSteps'),quadSteps:document.getElementById('quadSteps'),fillRule:document.getElementById('fillRule'),gridAccel:document.getElementById('gridAccel'),gridAcceptance:document.getElementById('gridAcceptance'),gridOverlayOpacity:document.getElementById('gridOverlayOpacity'),gridOverlayOpacityLabel:document.getElementById('gridOverlayOpacityLabel'),showTopologyOverlay:document.getElementById('showTopologyOverlay'),showClipOverlay:document.getElementById('showClipOverlay'),pipelineDebugMode:document.getElementById('pipelineDebugMode'),copyPipelineReportBtn:document.getElementById('copyPipelineReportBtn'),showClipMaskPreview:document.getElementById('showClipMaskPreview'),aaStrength:document.getElementById('aaStrength'),aaStrengthLabel:document.getElementById('aaStrengthLabel'),gridTileSize:document.getElementById('gridTileSize'),copyBtn:document.getElementById('copyBtn'),outputGutter:document.getElementById('outputGutter'),output:document.getElementById('output'),clearLogBtn:document.getElementById('clearLogBtn'),runBootBtn:document.getElementById('runBootBtn'),debugLog:document.getElementById('debugLog')};
    const previewState={scale:1,tx:0,ty:0,contentW:320,contentH:220,dragging:false,lastX:0,lastY:0,hasContent:false};

    function safeAppendLog(line){
      try {
        if (!el || !el.debugLog) return;
        el.debugLog.value += (el.debugLog.value ? '\n' : '') + line;
        el.debugLog.scrollTop = el.debugLog.scrollHeight;
      } catch (_) {}
    }
    function logDebug(message,data){
      const stamp=new Date().toLocaleTimeString();
      let line=`[${stamp}] ${message}`;
      if(data!==undefined){
        try{line+=` ${typeof data==='string'?data:JSON.stringify(data)}`}
        catch{line+=` ${String(data)}`}
      }
      safeAppendLog(line);
      try { console.log('[svg2gdshader]',message,data??''); } catch(_) {}
    }
    window.addEventListener('error',e=>{ safeAppendLog(`[startup-error] ${e.message} @ ${e.filename}:${e.lineno}:${e.colno}`); });
    window.addEventListener('unhandledrejection',e=>{ safeAppendLog(`[startup-rejection] ${String(e.reason)}`); });
    logDebug('script:loaded:top');

    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), fmt=n=>Number(n).toFixed(6), lerp=(a,b,t)=>a+(b-a)*t, vecLerp=(a,b,t)=>({x:lerp(a.x,b.x,t),y:lerp(a.y,b.y,t)}), quadPoint=(a,b,c,t)=>{const ab=vecLerp(a,b,t),bc=vecLerp(b,c,t);return vecLerp(ab,bc,t)}, cubicPoint=(a,b,c,d,t)=>{const ab=vecLerp(a,b,t),bc=vecLerp(b,c,t),cd=vecLerp(c,d,t),abbc=vecLerp(ab,bc,t),bccd=vecLerp(bc,cd,t);return vecLerp(abbc,bccd,t)}, vec2Code=p=>`vec2(${fmt(p.x)}, ${fmt(p.y)})`; const BASE_STROKE_TOL=2.25;

    function setStatus(message,kind='hint'){ try{el.status.className=kind; el.status.textContent=message;}catch(_){} logDebug('status:set',{message,kind}); }
    async function tryAutoCopyShader(){
      if(!state.generated) return;
      try{
        await navigator.clipboard.writeText(state.generated);
        logDebug('shader:auto-copied',{shaderLength:state.generated.length});
      }catch(err){
        logDebug('shader:auto-copy:skipped',{message:err?.message||String(err)});
      }
    }
    function updateEditorGutter(){
      const text = el.svgInput.value || '';
      const lines = Math.max(1, text.split('\n').length);
      let out = '';
      for(let i=1;i<=lines;i++) out += (i===1?'':'\n') + i;
      el.editorGutter.textContent = out;
      el.editorGutter.scrollTop = el.svgInput.scrollTop;
    }
    function updateOutputGutter(){
      const text = el.output.value || '';
      const lines = Math.max(1, text.split('\n').length);
      let out = '';
      for(let i=1;i<=lines;i++) out += (i===1?'':'\n') + i;
      el.outputGutter.textContent = out;
      el.outputGutter.scrollTop = el.output.scrollTop;
    }
    function trimFloatString(numStr){
      const n = Number(numStr);
      if(!Number.isFinite(n)) return numStr;
      let s = n.toFixed(3).replace(/\.?0+$/,'');
      if(s === '-0') s = '0';
      if(s.startsWith('0.')) s = s.slice(1);
      if(s.startsWith('-0.')) s = '-' + s.slice(2);
      return s;
    }
    function normalizeHexColor(str){
      return str.replace(/#([0-9a-fA-F]{6}|[0-9a-fA-F]{3})\b/g, m => {
        let hex = m.slice(1).toLowerCase();
        if(hex.length===6 && hex[0]===hex[1] && hex[2]===hex[3] && hex[4]===hex[5]) hex = hex[0]+hex[2]+hex[4];
        return '#' + hex;
      });
    }
    if(el.pipelineDebugMode){
      ['change','input','click'].forEach(evt=>el.pipelineDebugMode.addEventListener(evt,()=>{ if(state.svgText) renderPreview(state.svgText); if(state.parsed){ renderSummary(state.parsed); renderTopologyReport(state.parsed); } }));
    }
    if(el.copyPipelineReportBtn){
      el.copyPipelineReportBtn.addEventListener('click', async ()=>{ try{ await navigator.clipboard.writeText(el.topologyReport ? el.topologyReport.textContent : ''); setStatus('Pipeline report copied.', 'good'); } catch(err){ setStatus('Could not copy pipeline report.', 'bad'); } });
    }
    if(el.showClipOverlay){
      ['change','input','click'].forEach(evt=>el.showClipOverlay.addEventListener(evt,()=>{ if(state.svgText) renderPreview(state.svgText); if(state.parsed){ renderSummary(state.parsed); renderTopologyReport(state.parsed); } }));
    }
    if(el.showClipMaskPreview){
      ['change','input','click'].forEach(evt=>el.showClipMaskPreview.addEventListener(evt,()=>{ if(state.svgText) renderPreview(state.svgText); if(state.parsed){ renderSummary(state.parsed); renderTopologyReport(state.parsed); } }));
    }
    function prettifySvgText(svgText){
      const parser = new DOMParser();
      const doc = parser.parseFromString(svgText,'image/svg+xml');
      if(doc.querySelector('parsererror')) throw new Error('Cannot prettify invalid SVG.');
      const serializeNode = (node, depth=0) => {
        if(node.nodeType===Node.TEXT_NODE){
          const t = node.textContent.trim();
          return t ? `${'  '.repeat(depth)}${t}\n` : '';
        }
        if(node.nodeType!==Node.ELEMENT_NODE) return '';
        const attrs = [...node.attributes].map(a=>`${a.name}="${a.value}"`).join(' ');
        const tag = node.tagName;
        const open = attrs ? `<${tag} ${attrs}>` : `<${tag}>`;
        if(!node.children.length && !node.textContent.trim()) return `${'  '.repeat(depth)}${open.replace(/>$/,' />')}\n`;
        let body = '';
        for(const child of [...node.childNodes]) body += serializeNode(child, depth+1);
        if(!body.trim()) return `${'  '.repeat(depth)}${open}${node.textContent.trim()}</${tag}>\n`;
        return `${'  '.repeat(depth)}${open}\n${body}${'  '.repeat(depth)}</${tag}>\n`;
      };
      return `<?xml version="1.0" encoding="UTF-8"?>\n` + serializeNode(doc.documentElement).trim() + '\n';
    }
    function optimizeSvgText(svgText){
      const parser = new DOMParser();
      const doc = parser.parseFromString(svgText,'image/svg+xml');
      if(doc.querySelector('parsererror')) throw new Error('Cannot optimize invalid SVG.');
      const walk = node => {
        if(node.nodeType!==Node.ELEMENT_NODE) return;
        for(const child of [...node.children]) walk(child);
        if(node.hasAttribute('style')){
          const style = parseStyleString(node.getAttribute('style'));
          for(const [k,v] of Object.entries(style)) if(v && !node.hasAttribute(k)) node.setAttribute(k,v);
          node.removeAttribute('style');
        }
        if(node.tagName.toLowerCase()==='g' && !node.attributes.length && !node.children.length) node.remove();
      };
      walk(doc.documentElement);
      let xml = new XMLSerializer().serializeToString(doc.documentElement);
      xml = xml.replace(/>\s+</g,'><').replace(/\s{2,}/g,' ');
      xml = xml.replace(/[-+]?\d*\.\d+|[-+]?\d+\.?/g, m => trimFloatString(m));
      xml = normalizeHexColor(xml);
      xml = xml.replace(/ fill="white"/g,' fill="#fff"').replace(/ fill="black"/g,' fill="#000"');
      return xml.trim();
    }

    function rgbaByteKey(r,g,b,a){ return `${r},${g},${b},${a}`; }
    function normalizeSvgForGridRaster(svgText, parsed){
      const vb = parsed.viewBox;
      const parser = new DOMParser();
      const doc = parser.parseFromString(svgText, 'image/svg+xml');
      const parserError = doc.querySelector('parsererror');
      if(parserError) throw new Error('Cannot normalize invalid SVG for grid raster.');
      const svg = doc.documentElement;
      if(!svg || svg.tagName.toLowerCase() !== 'svg') throw new Error('Grid raster source is not an SVG root.');
      svg.setAttribute('viewBox', `${trimFloatString(vb.x)} ${trimFloatString(vb.y)} ${trimFloatString(vb.width)} ${trimFloatString(vb.height)}`);
      svg.setAttribute('width', trimFloatString(vb.width));
      svg.setAttribute('height', trimFloatString(vb.height));
      svg.setAttribute('preserveAspectRatio', 'none');
      svg.removeAttribute('x');
      svg.removeAttribute('y');
      for(const node of [svg, ...svg.querySelectorAll('*')]){
        if(node.nodeType!==Node.ELEMENT_NODE) continue;
        const tag = (node.tagName||'').toLowerCase();
        if(tag==='defs' || tag==='clipPath' || tag==='mask' || tag==='linearGradient' || tag==='radialGradient' || tag==='pattern') continue;
        const style = parseStyleString(node.getAttribute('style')||'');
        style['stroke-linecap'] = 'round';
        if(style.stroke && style.stroke !== 'none') node.setAttribute('style', serializeStyleObject(style));
        node.setAttribute('stroke-linecap','round');
      }
      return new XMLSerializer().serializeToString(svg);
    }
    async function rasterizeSvgForGrid(svgText, parsed){
      const vb=parsed.viewBox;
      const maxDim = 1536;
      const oversample = 2;
      const rasterW = Math.max(1, Math.min(maxDim, Math.ceil(vb.width * oversample)));
      const rasterH = Math.max(1, Math.min(maxDim, Math.ceil(vb.height * oversample)));
      const normalizedSvgText = normalizeSvgForGridRaster(svgText, parsed);
      const blob = new Blob([normalizedSvgText], {type:'image/svg+xml;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      try {
        const img = new Image();
        await new Promise((resolve,reject)=>{
          img.onload = ()=>resolve();
          img.onerror = ()=>reject(new Error('Could not rasterize normalized SVG for grid acceleration.'));
          img.src = url;
        });
        const canvas = document.createElement('canvas');
        canvas.width = rasterW;
        canvas.height = rasterH;
        const ctx = canvas.getContext('2d', {willReadFrequently:true});
        ctx.clearRect(0,0,rasterW,rasterH);
        ctx.drawImage(img,0,0,rasterW,rasterH);
        return {canvas, rasterW, rasterH, normalizedSvgTextLength: normalizedSvgText.length};
      } finally { URL.revokeObjectURL(url); }
    }
    function mergeTileRuns(rowRuns, vb){
      const active = new Map();
      const rects = [];
      const flushInactive = (nextKeys)=>{
        for(const [key,rect] of [...active.entries()]){
          if(!nextKeys.has(key)){ rects.push(rect); active.delete(key); }
        }
      };
      for(const runs of rowRuns){
        const nextKeys = new Set();
        for(const run of runs){
          const key = `${run.kind}|${run.color||''}|${run.x}|${run.w}`;
          nextKeys.add(key);
          if(active.has(key)) active.get(key).h += run.h;
          else active.set(key,{kind:run.kind, x:vb.x + run.x, y:vb.y + run.y, w:run.w, h:run.h, color:run.color||null});
        }
        flushInactive(nextKeys);
      }
      for(const rect of active.values()) rects.push(rect);
      return rects;
    }

    function solidShapeColorKey(shape){
      if(!shape || !shape.fill || shape.fill.type!=='solid' || !shape.fill.color) return null;
      if((shape.opacity ?? 1) < 0.999999) return null;
      if((shape.fillOpacity ?? 1) < 0.999999) return null;
      const fillA = (shape.fill.color.a == null ? 1 : shape.fill.color.a);
      if(fillA < 0.999999) return null;
      if(shape.stroke && shape.strokeWidth > 0.000001 && ((shape.strokeOpacity ?? 1) * (shape.opacity ?? 1)) > 0.000001) return null;
      if(shape.clipGroups && shape.clipGroups.length) return null;
      return rgbaByteKey(
        Math.round(shape.fill.color.r),
        Math.round(shape.fill.color.g),
        Math.round(shape.fill.color.b),
        255
      );
    }
    function boundsContainPoint(bounds, p){
      if(!bounds) return false;
      return p.x >= bounds.cullMinX && p.x <= bounds.cullMaxX && p.y >= bounds.cullMinY && p.y <= bounds.cullMaxY;
    }
    function boundsIntersectTile(bounds, x, y, w, h){
      if(!bounds) return false;
      const x1 = x + w, y1 = y + h;
      return !(bounds.cullMaxX < x || bounds.cullMinX > x1 || bounds.cullMaxY < y || bounds.cullMinY > y1);
    }
    function getTileCornerPoints(parsed, x, y, w, h){
      const eps = 0.0001;
      const vx = parsed.viewBox.x;
      const vy = parsed.viewBox.y;
      return [
        {x:vx + x + eps, y:vy + y + eps},
        {x:vx + x + w - eps, y:vy + y + eps},
        {x:vx + x + eps, y:vy + y + h - eps},
        {x:vx + x + w - eps, y:vy + y + h - eps}
      ];
    }
    function gatherTileCornerShapeIds(parsed, x, y, w, h){
      const pts = getTileCornerPoints(parsed, x, y, w, h);
      const ids = new Set();
      for(let i=0;i<parsed.shapes.length;i++){
        const shape = parsed.shapes[i];
        const b = shape.bounds;
        if(!b) continue;
        for(const p of pts){
          if(boundsContainPoint(b, p)){ ids.add(i); break; }
        }
      }
      return ids;
    }
    function tileCanBeSolidByShapes(parsed, x, y, w, h, colorKey){
      const ids = gatherTileCornerShapeIds(parsed, x, y, w, h);
      if(ids.size === 0) return false;
      for(const i of ids){
        const shapeColor = solidShapeColorKey(parsed.shapes[i]);
        if(shapeColor !== colorKey) return false;
      }
      for(let i=0;i<parsed.shapes.length;i++){
        if(ids.has(i)) continue;
        const shape = parsed.shapes[i];
        if(boundsIntersectTile(shape.bounds, parsed.viewBox.x + x, parsed.viewBox.y + y, w, h)) return false;
      }
      return true;
    }
    function sampleOutsideBorderStats(data, rasterW, rasterH, px0, py0, px1, py1, rgba, maxMargin=2){
      const stats = {checked:0, matches:0, mismatches:0, opaqueMismatches:0};
      if(!rgba) return stats;
      const tr = rgba[0], tg = rgba[1], tb = rgba[2], ta = rgba[3];
      const seen = new Set();
      function samplePixel(px, py){
        if(px < 0 || py < 0 || px >= rasterW || py >= rasterH) return;
        const key = px + ',' + py;
        if(seen.has(key)) return;
        seen.add(key);
        const idx = (py * rasterW + px) * 4;
        const r = data[idx], g = data[idx+1], b = data[idx+2], a = data[idx+3];
        stats.checked++;
        if(r === tr && g === tg && b === tb && a === ta){
          stats.matches++;
        } else {
          stats.mismatches++;
          if(a > 0) stats.opaqueMismatches++;
        }
      }
      const margin = clamp(parseInt(maxMargin,10) || 2, 1, 4);
      for(let d=1; d<=margin; d++){
        const top = py0 - d;
        const bottom = py1 - 1 + d;
        const left = px0 - d;
        const right = px1 - 1 + d;
        for(let px=px0-d; px<=px1-1+d; px++){
          samplePixel(px, top);
          samplePixel(px, bottom);
        }
        for(let py=py0-d+1; py<=py1-1+d-1; py++){
          samplePixel(left, py);
          samplePixel(right, py);
        }
      }
      return stats;
    }
    function boundsCoverTile(bounds, tileX, tileY, w, h){
      if(!bounds) return false;
      return bounds.x0 <= tileX && bounds.y0 <= tileY && bounds.x1 >= tileX + w && bounds.y1 >= tileY + h;
    }
    function classifyUniformOpaqueTileSafety(parsed, x, y, w, h, colorKey, borderStats){
      if(tileCanBeSolidByShapes(parsed, x, y, w, h, colorKey)) return 'accepted';
      const borderPass = !!(borderStats && borderStats.checked > 0 && borderStats.opaqueMismatches === 0);
      if(!borderPass) return null;
      const tileX = parsed.viewBox.x + x;
      const tileY = parsed.viewBox.y + y;
      let sameColorFullCoverCount = 0;
      for(let i=0;i<parsed.shapes.length;i++){
        const shape = parsed.shapes[i];
        if(!boundsCoverTile(shape.bounds, tileX, tileY, w, h)) continue;
        const shapeColor = solidShapeColorKey(shape);
        if(shapeColor === colorKey) sameColorFullCoverCount++;
      }
      if(sameColorFullCoverCount === 1) return 'single';
      if(sameColorFullCoverCount > 1) return 'risky';
      return 'risky';
    }
    function gridAcceptanceAllows(kind, acceptance){
      const mode = acceptance || 'orange';
      if(kind === 'accepted') return true;
      if(kind === 'single') return mode === 'yellow' || mode === 'orange';
      if(kind === 'risky') return mode === 'orange';
      return false;
    }

    async function buildGridAcceleration(svgText, parsed, opts){
      if(!opts.gridAccel) return null;
      const tileSize = clamp(parseInt(opts.gridTileSize || '16',10), 4, 128);
      const vb = parsed.viewBox;
      if(vb.width <= 0 || vb.height <= 0) return null;
      const {canvas, rasterW, rasterH, normalizedSvgTextLength} = await rasterizeSvgForGrid(svgText, parsed);
      const data = canvas.getContext('2d', {willReadFrequently:true}).getImageData(0,0,rasterW,rasterH).data;
      const scaleX = rasterW / vb.width;
      const scaleY = rasterH / vb.height;
      const cols = Math.ceil(vb.width / tileSize);
      const rows = Math.ceil(vb.height / tileSize);

      const acceptedRuns = [];
      const singleRuns = [];
      const riskyRuns = [];
      const unsafeRuns = [];
      const emptyRuns = [];

      let solidTiles = 0;
      let singleShapeTiles = 0;
      let riskyTiles = 0;
      let unsafeTiles = 0;
      let emptyTiles = 0;
      let translucentUniformTiles = 0;
      let borderPixelsChecked = 0;
      let borderPixelsMatched = 0;
      let borderPixelsOpaqueMismatch = 0;

      function pushRun(runs, currentRunRef, kind, color, x, y, w, h){
        let currentRun = currentRunRef.current;
        if(currentRun && currentRun.kind === kind && currentRun.color === color && currentRun.x + currentRun.w === x){
          currentRun.w += w;
        } else {
          currentRun = {kind, color, x, y, w, h};
          runs.push(currentRun);
        }
        currentRunRef.current = currentRun;
      }

      for(let ty=0; ty<rows; ty++){
        const y = ty * tileSize;
        const h = Math.min(tileSize, vb.height - y);
        const py0 = Math.max(0, Math.floor(y * scaleY));
        const py1 = Math.min(rasterH, Math.ceil((y + h) * scaleY));

        const acceptedRow = [];
        const singleRow = [];
        const riskyRow = [];
        const unsafeRow = [];
        const emptyRow = [];
        const accRef = {current:null}, singleRef = {current:null}, riskyRef = {current:null}, unsafeRef = {current:null}, empRef = {current:null};

        for(let tx=0; tx<cols; tx++){
          const x = tx * tileSize;
          const w = Math.min(tileSize, vb.width - x);
          const px0 = Math.max(0, Math.floor(x * scaleX));
          const px1 = Math.min(rasterW, Math.ceil((x + w) * scaleX));

          let same = true;
          let empty = true;
          let first = null;
          for(let py=py0; py<py1 && same; py++){
            for(let px=px0; px<px1; px++){
              const idx = (py * rasterW + px) * 4;
              const r = data[idx], g = data[idx+1], b = data[idx+2], a = data[idx+3];
              if(first == null){ first = [r,g,b,a]; }
              else if(r!==first[0] || g!==first[1] || b!==first[2] || a!==first[3]){ same = false; break; }
              if(a !== 0) empty = false;
            }
          }

          if(same && first){
            const colorKey = rgbaByteKey(first[0], first[1], first[2], first[3]);
            if(empty){
              emptyTiles++;
              pushRun(emptyRow, empRef, 'empty', colorKey, x, y, w, h);
              accRef.current = singleRef.current = riskyRef.current = unsafeRef.current = null;
            } else if(first[3] === 255){
              const borderStats = sampleOutsideBorderStats(data, rasterW, rasterH, px0, py0, px1, py1, first, 2);
              borderPixelsChecked += borderStats.checked;
              borderPixelsMatched += borderStats.matches;
              borderPixelsOpaqueMismatch += borderStats.opaqueMismatches;
              const safety = classifyUniformOpaqueTileSafety(parsed, x, y, w, h, colorKey, borderStats);
              if(safety === 'accepted'){
                solidTiles++;
                pushRun(acceptedRow, accRef, 'accepted', colorKey, x, y, w, h);
                singleRef.current = riskyRef.current = unsafeRef.current = empRef.current = null;
              } else if(safety === 'single'){
                singleShapeTiles++;
                pushRun(singleRow, singleRef, 'single', colorKey, x, y, w, h);
                accRef.current = riskyRef.current = unsafeRef.current = empRef.current = null;
              } else if(safety === 'risky'){
                riskyTiles++;
                pushRun(riskyRow, riskyRef, 'risky', colorKey, x, y, w, h);
                accRef.current = singleRef.current = unsafeRef.current = empRef.current = null;
              } else {
                unsafeTiles++;
                pushRun(unsafeRow, unsafeRef, 'unsafe', colorKey, x, y, w, h);
                accRef.current = singleRef.current = riskyRef.current = empRef.current = null;
              }
            } else {
              translucentUniformTiles++;
              unsafeTiles++;
              pushRun(unsafeRow, unsafeRef, 'translucent', colorKey, x, y, w, h);
              accRef.current = singleRef.current = riskyRef.current = empRef.current = null;
            }
          } else {
            unsafeTiles++;
            pushRun(unsafeRow, unsafeRef, 'unsafe', null, x, y, w, h);
            accRef.current = singleRef.current = riskyRef.current = empRef.current = null;
          }
        }

        acceptedRuns.push(acceptedRow);
        singleRuns.push(singleRow);
        riskyRuns.push(riskyRow);
        unsafeRuns.push(unsafeRow);
        emptyRuns.push(emptyRow);
      }

      const acceptedRects = mergeTileRuns(acceptedRuns, vb).filter(r=>r.kind==='accepted');
      const singleRects = mergeTileRuns(singleRuns, vb);
      const riskyRects = mergeTileRuns(riskyRuns, vb);
      const unsafeRects = mergeTileRuns(unsafeRuns, vb);
      const emptyRects = mergeTileRuns(emptyRuns, vb);
      const acceptance = opts.gridAcceptance || 'orange';
      const rects = [
        ...acceptedRects,
        ...(gridAcceptanceAllows('single', acceptance) ? singleRects : []),
        ...(gridAcceptanceAllows('risky', acceptance) ? riskyRects : [])
      ];
      const paletteCount = new Set(rects.map(r=>r.color).filter(Boolean)).size;
      logDebug('grid:built',{
        tileSize, solidTiles, singleShapeTiles, riskyTiles, unsafeTiles, emptyTiles, translucentUniformTiles,
        borderPixelsChecked, borderPixelsMatched, borderPixelsOpaqueMismatch,
        acceptance,
        rects:rects.length, acceptedRects:acceptedRects.length, singleRects:singleRects.length, riskyRects:riskyRects.length, unsafeRects:unsafeRects.length, emptyRects:emptyRects.length,
        paletteCount, rasterW, rasterH, normalizedSvgTextLength, rasterSpace:'viewBox-normalized', mode:'safety-levels'
      });
      return {
        tileSize, solidTiles, singleShapeTiles, riskyTiles, unsafeTiles, emptyTiles, translucentUniformTiles,
        borderPixelsChecked, borderPixelsMatched, borderPixelsOpaqueMismatch,
        acceptance,
        rects, acceptedRects, singleRects, riskyRects, unsafeRects, emptyRects, paletteCount
      };
    }

    function downloadText(filename,text){
      const blob = new Blob([text],{type:'text/plain;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 0);
    }
    function zoomPreviewAt(factor){
      if(!previewState.hasContent) return;
      const rect = el.previewViewport.getBoundingClientRect();
      const mx = rect.width * 0.5, my = rect.height * 0.5;
      const prevScale = previewState.scale;
      const nextScale = clamp(prevScale * factor, 0.1, 20);
      const wx = (mx - previewState.tx) / prevScale;
      const wy = (my - previewState.ty) / prevScale;
      previewState.scale = nextScale;
      previewState.tx = mx - wx * nextScale;
      previewState.ty = my - wy * nextScale;
      updatePreviewTransform();
    }
    function escapeForCommentLine(str){return String(str).replace(/\r?\n/g,' ').replace(/\*\//g,'* /').trim()}
    function updatePreviewTransform(){
      el.previewStage.style.transform = `translate(${fmt(previewState.tx)}px, ${fmt(previewState.ty)}px) scale(${fmt(previewState.scale)})`;
      if(el.zoomLabel) el.zoomLabel.textContent = `${Math.round(previewState.scale*100)}%`;
    }
    function fitPreview(){
      const vw = el.previewViewport.clientWidth || 1;
      const vh = el.previewViewport.clientHeight || 1;
      const cw = previewState.contentW || 1;
      const ch = previewState.contentH || 1;
      const scale = Math.min(vw / cw, vh / ch);
      previewState.scale = Number.isFinite(scale) && scale > 0 ? scale : 1;
      previewState.tx = (vw - cw * previewState.scale) * 0.5;
      previewState.ty = (vh - ch * previewState.scale) * 0.5;
      updatePreviewTransform();
    }
    function resetPreviewZoom(){
      previewState.scale = 1;
      previewState.tx = 0;
      previewState.ty = 0;
      updatePreviewTransform();
    }

      const emitAccurate=(shape,idx)=>{const b=shape.bounds, boundsExpr=`vec4(${fmt(b.cullMinX)}, ${fmt(b.cullMinY)}, ${fmt(b.cullWidth)}, ${fmt(b.cullHeight)})`; const clipAlphaVar=`shape_clip_alpha_${idx}`; const fillAlphaVar=`shape_fill_alpha_${idx}`; lines.push(`    // Shape ${idx+1}: ${shape.tag}`); lines.push(`    {`); emitClipAlpha(shape,clipAlphaVar); const pr=shape.primitive; if(pr?.kind==='rect'){const cx=pr.x+pr.w*.5, cy=pr.y+pr.h*.5; if((pr.rx||0)>0||(pr.ry||0)>0){const r=Math.min(pr.rx||0,pr.ry||0), hx=pr.w*.5, hy=pr.h*.5; if(shape.fill) lines.push(`    { float d = sdRoundedBox(p - vec2(${fmt(cx)}, ${fmt(cy)}), vec2(${fmt(hx)}, ${fmt(hy)}), ${fmt(r)}); float a = aaFillAlpha(d); applyLayerPaint(col, ${paintExpr(shape.fill,boundsExpr)}, a * ${clipAlphaVar} * ${fmt(shape.opacity*shape.fillOpacity)}); }`); if(shape.stroke&&shape.strokeWidth>0) lines.push(`    { float d = abs(sdRoundedBox(p - vec2(${fmt(cx)}, ${fmt(cy)}), vec2(${fmt(hx)}, ${fmt(hy)}), ${fmt(r)})); float a = aaStrokeAlpha(${fmt(shape.strokeWidth*.5)}, d); applyLayerPaint(col, ${paintExpr(shape.stroke,boundsExpr)}, a * ${clipAlphaVar} * ${fmt(shape.opacity*shape.strokeOpacity)}); }`); lines.push(`    }`); lines.push(``); return} if(shape.fill) lines.push(`    { float d = sdBox(p - vec2(${fmt(cx)}, ${fmt(cy)}), vec2(${fmt(pr.w*.5)}, ${fmt(pr.h*.5)})); float a = aaFillAlpha(d); applyLayerPaint(col, ${paintExpr(shape.fill,boundsExpr)}, a * ${clipAlphaVar} * ${fmt(shape.opacity*shape.fillOpacity)}); }`); if(shape.stroke&&shape.strokeWidth>0) lines.push(`    { float d = abs(sdBox(p - vec2(${fmt(cx)}, ${fmt(cy)}), vec2(${fmt(pr.w*.5)}, ${fmt(pr.h*.5)}))); float a = aaStrokeAlpha(${fmt(shape.strokeWidth*.5)}, d); applyLayerPaint(col, ${paintExpr(shape.stroke,boundsExpr)}, a * ${clipAlphaVar} * ${fmt(shape.opacity*shape.strokeOpacity)}); }`); lines.push(`    }`); lines.push(``); return} if(pr?.kind==='circle'){if(shape.fill) lines.push(`    { float d = length(p - vec2(${fmt(pr.cx)}, ${fmt(pr.cy)})) - ${fmt(pr.r)}; float a = aaFillAlpha(d); applyLayerPaint(col, ${paintExpr(shape.fill,boundsExpr)}, a * ${clipAlphaVar} * ${fmt(shape.opacity*shape.fillOpacity)}); }`); if(shape.stroke&&shape.strokeWidth>0) lines.push(`    { float d = abs(length(p - vec2(${fmt(pr.cx)}, ${fmt(pr.cy)})) - ${fmt(pr.r)}); float a = aaStrokeAlpha(${fmt(shape.strokeWidth*.5)}, d); applyLayerPaint(col, ${paintExpr(shape.stroke,boundsExpr)}, a * ${clipAlphaVar} * ${fmt(shape.opacity*shape.strokeOpacity)}); }`); lines.push(`    }`); lines.push(``); return} if(pr?.kind==='ellipse'){if(shape.fill) lines.push(`    { float d = sdEllipseApprox(p - vec2(${fmt(pr.cx)}, ${fmt(pr.cy)}), vec2(${fmt(pr.rx)}, ${fmt(pr.ry)})); float a = aaFillAlpha(d); applyLayerPaint(col, ${paintExpr(shape.fill,boundsExpr)}, a * ${clipAlphaVar} * ${fmt(shape.opacity*shape.fillOpacity)}); }`); if(shape.stroke&&shape.strokeWidth>0) lines.push(`    { float d = abs(sdEllipseApprox(p - vec2(${fmt(pr.cx)}, ${fmt(pr.cy)}), vec2(${fmt(pr.rx)}, ${fmt(pr.ry)}))); float a = aaStrokeAlpha(${fmt(shape.strokeWidth*.5)}, d); applyLayerPaint(col, ${paintExpr(shape.stroke,boundsExpr)}, a * ${clipAlphaVar} * ${fmt(shape.opacity*shape.strokeOpacity)}); }`); lines.push(`    }`); lines.push(``); return} if(shape.fill&&shape.fillSegments&&shape.fillSegments.length) emitFillPseudo(shape,boundsExpr,fillAlphaVar,clipAlphaVar); if(shape.stroke&&shape.strokeWidth>0&&shape.strokeSegments.length) emitStroke(shape,boundsExpr,clipAlphaVar); lines.push(`    }`); lines.push(``)};
      parsed.shapes.forEach(emitAccurate); lines.push(`    COLOR = vec4(col, 1.0);`); if(parsed.gridAccel && parsed.gridAccel.rects && parsed.gridAccel.rects.length) lines.push(`        }`); lines.push(`    }`); lines.push(`}`); const shader=lines.join('\n'); logDebug('buildShader:end',{shaderLength:shader.length}); return shader}

    function readOptions(){return {fitMode:el.fitMode.value,cubicMode:el.cubicMode.value,arcMode:el.arcMode.value,cubicSteps:clamp(parseInt(el.cubicSteps.value||'16',10),2,256),arcSteps:clamp(parseInt(el.arcSteps.value||'16',10),2,256),quadSteps:clamp(parseInt(el.quadSteps.value||'12',10),2,256),fillRule:el.fillRule.value,aaStrength:getAaStrength01(),gridAccel:!!el.gridAccel.checked,gridAcceptance:(el.gridAcceptance?.value||'orange'),gridTileSize:clamp(parseInt(el.gridTileSize.value||'16',10),4,128)}}
    async function runPipeline(svgText,okMessage){
      const runToken = ++state.runToken;
      logDebug('runPipeline:start',{hasText:!!svgText,length:svgText?svgText.length:0});
      if(!svgText||!svgText.trim()){state.svgText=''; state.parsed=null; state.generated=''; el.output.value=''; updateOutputGutter(); el.previewStage.innerHTML=''; el.summaryRow.innerHTML=''; previewState.hasContent=false; el.copyBtn.disabled=true; setStatus('Waiting for SVG.','hint'); if(el.topologyReport) el.topologyReport.textContent='Topology report unavailable.'; return}
      try{
        const opts=readOptions();
        logDebug('runPipeline:options',opts);
        const parsed=parseSvg(svgText,opts);
        parsed.gridAccel = await buildGridAcceleration(svgText, parsed, opts);
        if(runToken !== state.runToken) return;
        const shader=buildShader(parsed,svgText,opts);
        state.svgText=svgText; state.parsed=parsed; state.generated=shader;
        renderPreview(svgText); renderSummary(parsed); renderTopologyReport(parsed);
        el.output.value=shader; updateOutputGutter(); el.copyBtn.disabled=false;
        void tryAutoCopyShader();
        setStatus(okMessage,'good');
        logDebug('runPipeline:success',{shaderLength:shader.length,gridRects:parsed.gridAccel?parsed.gridAccel.rects.length:0});
      } catch(err){
        if(runToken !== state.runToken) return;
        console.error(err);
        logDebug('runPipeline:error',{name:err?.name,message:err?.message,stack:err?.stack});
        state.parsed=null; state.generated=''; el.output.value=''; updateOutputGutter(); el.copyBtn.disabled=true;
        setStatus(err?.message||'Failed to import SVG.','bad');
      }
    }

    function bootApp(){
      logDebug('boot:begin');
      try {
        el.svgInput.value = DEMO_SVG;
        state.userEditedSvg = false;
        logDebug('boot:demo-seeded',{length:DEMO_SVG.length});
        runPipeline(DEMO_SVG,'Demo loaded and shader updated.');
      } catch (err) {
        logDebug('boot:error',{name:err?.name,message:err?.message,stack:err?.stack});
        setStatus(err?.message || 'Boot failed.','bad');
      }
      logDebug('boot:end');
    }

    el.fileInput.addEventListener('change',async e=>{logDebug('fileInput:change'); const file=e.target.files?.[0]; if(!file) return; const text=await file.text(); logDebug('fileInput:file-read',{name:file.name,length:text.length}); el.svgInput.value=text; state.userEditedSvg=true; runPipeline(text,`Loaded ${file.name}.`)});
    el.importBtn.addEventListener('click',()=>{logDebug('importBtn:click',{length:el.svgInput.value.length,mode:'file_always',userEditedSvg:state.userEditedSvg}); el.fileInput.value=''; el.fileInput.click();});

    el.clearEditorBtn.addEventListener('click',()=>{ logDebug('editor:clear'); el.svgInput.value=''; state.userEditedSvg=false; updateEditorGutter(); runPipeline('','Waiting for SVG.'); });
    el.copySvgBtn.addEventListener('click',async()=>{ const text=el.svgInput.value||''; await navigator.clipboard.writeText(text); setStatus('SVG copied to clipboard.','good'); logDebug('svg:copied',{length:text.length}); });
    el.downloadSvgBtn.addEventListener('click',()=>{ const text=el.svgInput.value||''; downloadText('source.svg', text); setStatus('SVG downloaded.','good'); logDebug('svg:downloaded',{length:text.length}); });
    el.prettifySvgBtn.addEventListener('click',()=>{ try{ const out=prettifySvgText(el.svgInput.value||''); el.svgInput.value=out; state.userEditedSvg=true; updateEditorGutter(); runPipeline(out,'SVG prettified and shader regenerated.'); logDebug('svg:prettified',{length:out.length}); } catch(err){ setStatus(err.message||'Prettify failed.','bad'); logDebug('svg:prettify:error',{message:err.message}); } });
    el.optimizeSvgBtn.addEventListener('click',()=>{ try{ const out=optimizeSvgText(el.svgInput.value||''); el.svgInput.value=out; state.userEditedSvg=true; updateEditorGutter(); runPipeline(out,'SVG optimized and shader regenerated.'); logDebug('svg:optimized',{length:out.length}); } catch(err){ setStatus(err.message||'Optimize failed.','bad'); logDebug('svg:optimize:error',{message:err.message}); } });
    el.fitPreviewBtn.addEventListener('click',()=>{logDebug('preview:fit'); if(previewState.hasContent) fitPreview();});
    el.resetPreviewBtn.addEventListener('click',()=>{logDebug('preview:reset'); if(previewState.hasContent) resetPreviewZoom();});
    el.zoomInBtn.addEventListener('click',()=>{logDebug('preview:zoomIn'); zoomPreviewAt(1.2);});
    el.zoomOutBtn.addEventListener('click',()=>{logDebug('preview:zoomOut'); zoomPreviewAt(1/1.2);});
    el.copyBtn.addEventListener('click',async()=>{logDebug('copyBtn:click',{hasShader:!!state.generated,shaderLength:state.generated?state.generated.length:0}); if(!state.generated) return; await navigator.clipboard.writeText(state.generated); setStatus('Shader copied to clipboard.','good')});
    el.clearLogBtn.addEventListener('click',()=>{el.debugLog.value=''; logDebug('debug:cleared')});
    el.runBootBtn.addEventListener('click',()=>{logDebug('runBootBtn:click'); bootApp()});
    el.gridOverlayOpacity.addEventListener('input',()=>{ applyGridOverlayOpacity(); });
    el.gridOverlayOpacity.addEventListener('change',()=>{ applyGridOverlayOpacity(); });
    if(el.showTopologyOverlay){ const rerenderTopo=()=>{ logDebug('settings:change',{id:'showTopologyOverlay',value:!!el.showTopologyOverlay.checked}); const svgText=(typeof state.svgText==='string' && state.svgText.trim()) ? state.svgText : ((el.svgInput && typeof el.svgInput.value==='string') ? el.svgInput.value : ''); if(svgText && state.parsed){ renderPreview(svgText); renderSummary(state.parsed); renderTopologyReport(state.parsed); } }; el.showTopologyOverlay.addEventListener('change', rerenderTopo); el.showTopologyOverlay.addEventListener('input', rerenderTopo); el.showTopologyOverlay.addEventListener('click', rerenderTopo); }
    [el.fitMode,el.cubicMode,el.arcMode,el.cubicSteps,el.arcSteps,el.quadSteps,el.fillRule,el.aaStrength,el.gridAccel,el.gridAcceptance,el.gridTileSize].forEach(node=>node.addEventListener('change',()=>{logDebug('settings:change',{id:node.id,value:(node.type==='checkbox'?node.checked:node.value),hasStateText:!!state.svgText,inputLength:el.svgInput.value.length}); if(state.svgText||el.svgInput.value.trim()) runPipeline(el.svgInput.value,'Settings changed and shader updated.')}));
    let svgDebounce=null; el.svgInput.addEventListener('input',()=>{state.userEditedSvg=true; updateEditorGutter(); logDebug('svgInput:input',{length:el.svgInput.value.length}); clearTimeout(svgDebounce); svgDebounce=setTimeout(()=>{logDebug('svgInput:debounced-run',{trimmedLength:el.svgInput.value.trim().length}); runPipeline(el.svgInput.value,el.svgInput.value.trim()?'SVG updated and shader regenerated.':'Waiting for SVG.')},400)});
    el.svgInput.addEventListener('scroll',()=>{ el.editorGutter.scrollTop = el.svgInput.scrollTop; });
    el.output.addEventListener('scroll',()=>{ el.outputGutter.scrollTop = el.output.scrollTop; });
    el.output.addEventListener('input',()=>{ updateOutputGutter(); });

    el.previewViewport.addEventListener('pointerdown',e=>{ if(!previewState.hasContent) return; previewState.dragging=true; previewState.lastX=e.clientX; previewState.lastY=e.clientY; el.previewViewport.classList.add('dragging'); try{el.previewViewport.setPointerCapture(e.pointerId);}catch(_){ } });
    el.previewViewport.addEventListener('pointermove',e=>{ if(!previewState.dragging) return; const dx=e.clientX-previewState.lastX, dy=e.clientY-previewState.lastY; previewState.lastX=e.clientX; previewState.lastY=e.clientY; previewState.tx += dx; previewState.ty += dy; updatePreviewTransform(); });
    const endPreviewDrag=e=>{ previewState.dragging=false; el.previewViewport.classList.remove('dragging'); try{el.previewViewport.releasePointerCapture(e.pointerId);}catch(_){ } };
    el.previewViewport.addEventListener('pointerup',endPreviewDrag);
    el.previewViewport.addEventListener('pointercancel',endPreviewDrag);
    el.previewViewport.addEventListener('wheel',e=>{ if(!previewState.hasContent) return; e.preventDefault(); const rect=el.previewViewport.getBoundingClientRect(); const mx=e.clientX-rect.left, my=e.clientY-rect.top; const prevScale=previewState.scale; const factor=Math.exp(-e.deltaY*0.0012); const nextScale=clamp(prevScale*factor,0.1,20); const wx=(mx-previewState.tx)/prevScale; const wy=(my-previewState.ty)/prevScale; previewState.scale=nextScale; previewState.tx=mx-wx*nextScale; previewState.ty=my-wy*nextScale; updatePreviewTransform(); }, {passive:false});
    window.addEventListener('resize',()=>{ if(previewState.hasContent) fitPreview(); });

    logDebug('script:loaded:before-boot');
    updateEditorGutter();
    updateGridOverlayOpacityLabel();
    if(el.aaStrength){ const apply=()=>{ updateAaStrengthLabel(); }; el.aaStrength.addEventListener('input', apply); el.aaStrength.addEventListener('change', apply); updateAaStrengthLabel(); }
    bootApp();
  </script>
</body>
</html>
