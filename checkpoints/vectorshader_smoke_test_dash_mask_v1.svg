<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="1800"
  height="1200"
  viewBox="0 0 1800 1200"
  version="1.1">
  <defs>
    <style>
      .label { font: 700 34px monospace; fill: #222; }
      .sub   { font: 400 20px monospace; fill: #555; }
      .frame { fill: #f7f7f7; stroke: #444; stroke-width: 4; rx: 18; ry: 18; }
    </style>

    <pattern id="checker" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="24" height="24" fill="#16224d"/>
      <rect x="0" y="0" width="12" height="12" fill="#10203f"/>
      <rect x="12" y="12" width="12" height="12" fill="#10203f"/>
    </pattern>

    <g id="triMaskShape">
      <g transform="translate(220,220) rotate(-12)">
        <path d="M95 -135 L-118 -156 L-74 -32 Z" fill="#ffffff"/>
      </g>
    </g>

    <filter id="invertAlphaFilter" filterUnits="objectBoundingBox" x="0" y="0" width="1" height="1">
      <feComponentTransfer in="SourceGraphic">
        <feFuncA type="table" tableValues="1.0 0.0"/>
      </feComponentTransfer>
    </filter>

    <mask id="invertAlphaMask" mask-type="alpha">
      <g filter="url(#invertAlphaFilter)">
        <rect x="0" y="0" width="360" height="360" fill="#ffffff" opacity="0"/>
        <use xlink:href="#triMaskShape"/>
      </g>
    </mask>

    <mask id="circleAlphaMask" mask-type="alpha">
      <rect x="0" y="0" width="360" height="360" fill="black"/>
      <circle cx="190" cy="182" r="118" fill="white"/>
      <circle cx="225" cy="160" r="42" fill="black"/>
    </mask>

    <g id="solid_arrow_pair">
      <path d="M58 270 L307 228" fill="none" stroke="#82d6fd" stroke-width="18" stroke-linecap="round"/>
      <path d="M307 228 L284 205 L332 210 Z" fill="#82d6fd"/>
      <path d="M280 72 L315 286" fill="none" stroke="#82d6fd" stroke-width="18" stroke-linecap="round"/>
      <path d="M280 72 L250 92 L296 96 Z" fill="#82d6fd"/>
      <circle cx="307" cy="228" r="30" fill="#82d6fd"/>
      <circle cx="307" cy="228" r="16" fill="#eee"/>
    </g>

    <g id="dash_round_curve">
      <path
        d="M275 88 C260 120 242 148 219 170 C196 192 173 210 149 226 C126 242 110 260 98 286"
        fill="none"
        stroke="#82d6fd"
        stroke-width="18"
        stroke-linecap="round"
        stroke-dasharray="34 26"/>
    </g>

    <g id="dash_butt_curve">
      <path
        d="M280 90 C260 120 240 148 214 170 C188 192 164 214 140 238 C116 262 103 283 95 305"
        fill="none"
        stroke="#82d6fd"
        stroke-width="18"
        stroke-linecap="butt"
        stroke-dasharray="34 26"/>
    </g>

    <g id="multi_subpath_marks">
      <path
        d="M285 96 L300 101 M249 93 L266 92 M212 110 L226 100 M184 138 L194 125 M169 174 L173 158 M170 211 L169 194"
        fill="none"
        stroke="#82d6fd"
        stroke-width="14"
        stroke-linecap="round"/>
    </g>
  </defs>

  <rect x="0" y="0" width="1800" height="1200" fill="#e9e9e9"/>

  <g transform="translate(40,40)">
    <rect class="frame" x="0" y="0" width="520" height="520"/>
    <text class="label" x="26" y="44">01</text>
    <text class="sub" x="74" y="44">solid strokes, no mask</text>
    <rect x="48" y="74" width="424" height="404" fill="url(#checker)"/>
    <use xlink:href="#solid_arrow_pair"/>
  </g>

  <g transform="translate(640,40)">
    <rect class="frame" x="0" y="0" width="520" height="520"/>
    <text class="label" x="26" y="44">02</text>
    <text class="sub" x="74" y="44">dashed round caps</text>
    <rect x="48" y="74" width="424" height="404" fill="url(#checker)"/>
    <use xlink:href="#dash_round_curve"/>
  </g>

  <g transform="translate(1240,40)">
    <rect class="frame" x="0" y="0" width="520" height="520"/>
    <text class="label" x="26" y="44">03</text>
    <text class="sub" x="74" y="44">dashed butt caps</text>
    <rect x="48" y="74" width="424" height="404" fill="url(#checker)"/>
    <use xlink:href="#dash_butt_curve"/>
  </g>

  <g transform="translate(40,620)">
    <rect class="frame" x="0" y="0" width="520" height="520"/>
    <text class="label" x="26" y="44">04</text>
    <text class="sub" x="74" y="44">invert-alpha mask + multi-subpath marks</text>
    <rect x="48" y="74" width="424" height="404" fill="url(#checker)"/>
    <g mask="url(#invertAlphaMask)" transform="translate(48,74)">
      <use xlink:href="#multi_subpath_marks"/>
    </g>
    <g transform="translate(48,74)" opacity="0.18">
      <use xlink:href="#triMaskShape"/>
    </g>
  </g>

  <g transform="translate(640,620)">
    <rect class="frame" x="0" y="0" width="520" height="520"/>
    <text class="label" x="26" y="44">05</text>
    <text class="sub" x="74" y="44">ordinary alpha mask + dashed round</text>
    <rect x="48" y="74" width="424" height="404" fill="url(#checker)"/>
    <g mask="url(#circleAlphaMask)" transform="translate(48,74)">
      <use xlink:href="#dash_round_curve"/>
      <path d="M70 286 L305 246" fill="none" stroke="#82d6fd" stroke-width="18" stroke-linecap="round"/>
      <circle cx="190" cy="182" r="118" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
      <circle cx="225" cy="160" r="42" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
    </g>
  </g>

  <g transform="translate(1240,620)">
    <rect class="frame" x="0" y="0" width="520" height="520"/>
    <text class="label" x="26" y="44">06</text>
    <text class="sub" x="74" y="44">mixed solid + dashed regression</text>
    <rect x="48" y="74" width="424" height="404" fill="url(#checker)"/>
    <g transform="translate(48,74)">
      <use xlink:href="#solid_arrow_pair"/>
      <use xlink:href="#multi_subpath_marks"/>
      <path
        d="M100 120 C125 126 150 132 174 138 C196 144 220 154 248 172"
        fill="none"
        stroke="#82d6fd"
        stroke-width="12"
        stroke-linecap="round"
        stroke-dasharray="22 16"/>
    </g>
  </g>
</svg>
